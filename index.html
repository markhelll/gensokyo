  jpn_gen_03:{lesson:[{w:"reimu",t:"魔理沙、『意外』と『以外』、読み方が同じだからいつも迷うんだよね…。",v:"魔理沙、いがい、と、いがい、読み方が同じだからいつも迷うんだよね。"},{w:"marisa",t:"こういう、読み方は同じで意味が違う言葉を『同音異義語』って呼ぶんだ。意味から考えれば、もう迷わなくなるぜ。",v:"こういう、読み方は同じで意味が違う言葉を同音異義語って呼ぶんだ。意味から考えれば、もう迷わなくなるぜ。"},{w:"reimu",t:"それぞれの意味、教えて！",v:"それぞれの意味、教えて！"},{w:"marisa",t:"『意外』は『思いがけないこと』、驚きを表す言葉だ。『以外』は『〜を除いて』、範囲を表す言葉だぜ。",v:"意外は、思いがけないこと、驚きを表す言葉だ。以外は、〜を除いて、範囲を表す言葉だぜ。"},{w:"reimu",t:"漢字を見て区別するコツはある？",v:"漢字を見て区別するコツはある？"},{w:"marisa",t:"あるぜ。『意』という字は『心』に関係する意味を持つ。だから『意外』は『心が予想してなかった』ってイメージだ。",v:"あるぜ。意という字は心に関係する意味を持つ。だから意外は、心が予想してなかった、ってイメージだ。"},{w:"reimu",t:"『以外』の『以』は？",v:"以外の以は？"},{w:"marisa",t:"『以』は『〜より』『〜を基準にして』という意味を持つ字だ。『これ以外』は『これを基準にして、それを除く』ってイメージだぜ。",v:"以は、〜より、〜を基準にして、という意味を持つ字だ。これ以外は、これを基準にして、それを除く、ってイメージだぜ。"},{w:"reimu",t:"漢字そのものの意味から考えればいいんだね。他にも紛らわしい言葉ってある？",v:"漢字そのものの意味から考えればいいんだね。他にも紛らわしい言葉ってある？"},{w:"marisa",t:"慣用句にも、意味を誤解されやすいものが多いぜ。例えば『気が置けない』だ。",v:"慣用句にも、意味を誤解されやすいものが多いぜ。例えば、気が置けない、だ。"},{w:"reimu",t:"『気が置けない』って、なんとなく『油断できない』っていう意味な気がしてた。",v:"気が置けない、って、なんとなく油断できない、っていう意味な気がしてた。"},{w:"marisa",t:"そう思う人が多いんだが、実は逆だ。正しい意味は『遠慮がいらない、気をつかわなくていい親しい間柄』なんだぜ。",v:"そう思う人が多いんだが、実は逆だ。正しい意味は、遠慮がいらない、気をつかわなくていい親しい間柄、なんだぜ。"},{w:"reimu",t:"見た目の印象と、実際の意味が逆になってる言葉があるんだね…気をつけなきゃ。",v:"見た目の印象と、実際の意味が逆になってる言葉があるんだね。気をつけなきゃ。"},{w:"marisa",t:"そうだ。同じ理由で『役不足』も誤解されやすいぜ。これは『力不足』とは正反対の意味なんだ。",v:"そうだ。同じ理由で役不足も誤解されやすいぜ。これは力不足とは正反対の意味なんだ。"},{w:"reimu",t:"正反対？『役不足』は力が足りないことだと思ってた。",v:"正反対？役不足は力が足りないことだと思ってた。"},{w:"marisa",t:"よくある勘違いだ。『役不足』の正しい意味は『実力に対して、与えられた役目が軽すぎること』。実力が余ってるってことなんだぜ。",v:"よくある勘違いだ。役不足の正しい意味は、実力に対して、与えられた役目が軽すぎること。実力が余ってるってことなんだぜ。"},{w:"reimu",t:"四字熟語も覚えるのが大変そうだけど、何かいい方法ある？",v:"四字熟語も覚えるのが大変そうだけど、何かいい方法ある？"},{w:"marisa",t:"由来（できた背景）とセットで覚えるのがおすすめだぜ。例えば『一期一会』は、お茶の世界（茶道）から来た言葉だ。",v:"由来、できた背景、とセットで覚えるのがおすすめだぜ。例えば一期一会は、お茶の世界、茶道から来た言葉だ。"},{w:"reimu",t:"どういう由来なの？",v:"どういう由来なの？"},{w:"marisa",t:"お茶会での一回一回の出会いを『一生に一度しかない、大切な出会い』だと考えて、心を込めて向き合うっていう考え方なんだぜ。",v:"お茶会での一回一回の出会いを、一生に一度しかない、大切な出会い、だと考えて、心を込めて向き合うっていう考え方なんだぜ。"},{w:"reimu",t:"由来を知ると、言葉の意味も覚えやすくなるね！",v:"由来を知ると、言葉の意味も覚えやすくなるね！"},{w:"marisa",t:"そうだ。特に『気が置けない』『役不足』みたいに、誤解されやすい言葉は試験で狙われやすい。正しい意味を由来込みで覚えておけよ。",v:"そうだ。特に、気が置けない、役不足、みたいに、誤解されやすい言葉は試験で狙われやすい。正しい意味を由来込みで覚えておけよ。"}],quiz:[{q:"思いがけないこと、を表すのは？",cs:["意外","以外","異界","威海"],a:0,f:"意外、が『思いがけない』。意は心を表す字だぜ。",d:1},{q:"『一期一会』の意味は？",cs:["一生に一度の出会い","毎日会う","一度きりの失敗","集合する"],a:0,f:"茶道由来で、その出会いは一生に一度と心得て大切にする意味だぜ。",d:1},{q:"『推敲』の意味は？",cs:["文章を練り直す","急いで書く","暗記する","破棄する"],a:0,f:"詩人が字を『推す』か『敲く』か悩んだ故事から、文章を練り直す意味だぜ。",d:1},{q:"『気が置けない』の正しい意味は？",cs:["遠慮がいらない","油断できない","気が合わない","怒っている"],a:0,f:"気をつかわなくていい親しい間柄。油断できないは誤用だぜ。",d:2},{q:"『役不足』の正しい意味は？",cs:["実力に対し役目が軽すぎる","力が足りない","休む","失敗する"],a:0,f:"能力が高いのに役が軽いこと。力不足とは正反対だから注意だぜ。",d:2},{q:"『五里霧中』の意味は？",cs:["見通しが立たない","霧が晴れる","五里歩く","集中する"],a:0,f:"深い霧の中のように、方向や見通しが全く立たない状態だぜ。",d:2},{q:"『他山の石』の意味は？",cs:["他人の失敗を自分の教訓にする","他人を見下す","石を投げる","協力する"],a:0,f:"よその山の石も自分を磨く役に立つ。他人の言動を成長の糧にする意味だぜ。",d:3},{q:"『情けは人の為ならず』の意味は？",cs:["親切は巡って自分に返る","情けは人のためにならない","厳しくすべき","無関心がよい"],a:0,f:"人への親切は巡り巡って自分に返るという意味。冷たくする意味ではないぜ。",d:3}]},
  jpn_ko_02:{lesson:[{w:"reimu",t:"魔理沙、古文の助動詞って種類が多すぎて、覚えられる気がしないよ…。",v:"魔理沙、古文の助動詞って種類が多すぎて、覚えられる気がしないよ。"},{w:"marisa",t:"一気に全部覚えようとするとパンクするぜ。今日は特によく出る3つ、『ず』『む』『べし』だけに絞って説明するからな。",v:"一気に全部覚えようとするとパンクするぜ。今日は特によく出る3つ、ず、む、べし、だけに絞って説明するからな。"},{w:"reimu",t:"3つだけなら頑張れそう！まずは『ず』から教えて。",v:"3つだけなら頑張れそう！まずはず、から教えて。"},{w:"marisa",t:"『ず』は『打消』の助動詞だ。意味はシンプルに『〜ない』、否定を表すぜ。",v:"ずは打消の助動詞だ。意味はシンプルに〜ない、否定を表すぜ。"},{w:"reimu",t:"例文があると分かりやすいな。",v:"例文があると分かりやすいな。"},{w:"marisa",t:"『咲かず』なら『咲かない』だ。現代語の『〜ぬ』『〜ん』につながる言葉だから、感覚的にもイメージしやすいだろ？",v:"咲かず、なら、咲かない、だ。現代語の、〜ぬ、〜ん、につながる言葉だから、感覚的にもイメージしやすいだろ？"},{w:"reimu",t:"確かに『知らぬ』とか『分からん』って今でも使うもんね。『ず』はわかった！次の『む』は？",v:"確かに、知らぬ、とか、分からん、って今でも使うもんね。ずはわかった！次のむは？"},{w:"marisa",t:"『む』は意味が2つある。『推量』（〜だろう）と『意志』（〜しよう）だ。",v:"むは意味が2つある。推量、〜だろう、と、意志、〜しよう、だ。"},{w:"reimu",t:"2つもあったら、どっちの意味か分からなくなりそう…。",v:"2つもあったら、どっちの意味か分からなくなりそう。"},{w:"marisa",t:"そこは文脈で見分けるしかないんだ。主語が自分（私）なら『意志』、主語が他人や自然現象なら『推量』になることが多いぜ。",v:"そこは文脈で見分けるしかないんだ。主語が自分、私なら意志、主語が他人や自然現象なら推量になることが多いぜ。"},{w:"reimu",t:"『行かむ』が私の話なら『行こう』、誰か他の人の話なら『行くだろう』ってことだね。",v:"行かむ、が私の話なら、行こう、誰か他の人の話なら、行くだろう、ってことだね。"},{w:"marisa",t:"その通りだ。主語が誰かをまず確認する癖をつけろよ。最後は一番厄介な『べし』だ。",v:"その通りだ。主語が誰かをまず確認する癖をつけろよ。最後は一番厄介なべしだ。"},{w:"reimu",t:"なんで厄介なの？",v:"なんで厄介なの？"},{w:"marisa",t:"『べし』には、推量・意志・当然・命令・可能・適当と、なんと6つも意味があるんだ。",v:"べしには、推量、意志、当然、命令、可能、適当と、なんと6つも意味があるんだ。"},{w:"reimu",t:"6つ！？どうやって見分けるの？",v:"6つ！？どうやって見分けるの？"},{w:"marisa",t:"これも完全に文脈判断だ。例えば『死ぬべし』なら、状況から考えて『当然・確信』、つまり『死ぬに違いない』の意味になることが多いぜ。",v:"これも完全に文脈判断だ。例えば死ぬべしなら、状況から考えて当然、確信、つまり死ぬに違いない、の意味になることが多いぜ。"},{w:"reimu",t:"全部のパターンを一度に覚えるのは無理そうだから、まず『どんな意味があるか』を知っておいて、文章を読むときに当てはめていくのがいいのかな。",v:"全部のパターンを一度に覚えるのは無理そうだから、まず、どんな意味があるか、を知っておいて、文章を読むときに当てはめていくのがいいのかな。"},{w:"marisa",t:"いい姿勢だ。最初から完璧に見分けられなくていい。『ず』は打消、『む』は推量か意志、『べし』は複数の意味がある、とまず知ることが第一歩だぜ。",v:"いい姿勢だ。最初から完璧に見分けられなくていい。ずは打消、むは推量か意志、べしは複数の意味がある、とまず知ることが第一歩だぜ。"}],quiz:[{q:"助動詞『ず』の意味は？",cs:["打消","過去","推量","完了"],a:0,f:"ず、は打消で『〜ない』。現代語のぬ・んにあたるぜ。",d:1},{q:"助動詞『む』の意味は？",cs:["推量・意志","打消","過去","断定"],a:0,f:"む、は『〜だろう(推量)』『〜しよう(意志)』。文脈で判断するぜ。",d:1},{q:"『べし』に無い意味は？",cs:["打消","推量","当然","命令"],a:0,f:"べし、は推量・意志・当然・命令・可能・適当。打消の意味はないぜ。",d:1},{q:"『咲かず』の意味は？",cs:["咲かない","咲いた","咲くだろう","咲け"],a:0,f:"ず、は打消だから『咲かない』。否定の意味だぜ。",d:2},{q:"『行かむ』の意味の一つは？",cs:["行こう(意志)","行かない","行った","行くな"],a:0,f:"む、の意志の用法で『行こう』。推量なら『行くだろう』だぜ。",d:2},{q:"『ず』の連体形は？",cs:["ぬ","ず","ね","ざり"],a:0,f:"ず、は特殊活用。連体形は『ぬ』になるぜ。",d:2},{q:"『べし』の活用の種類は？",cs:["形容詞型(ク活用)","動詞型","名詞型","副詞型"],a:0,f:"べし、はべく・べく・べし・べき…と形容詞のように活用するぜ。",d:3},{q:"『死ぬべし』の『べし』の意味は？",cs:["当然・確信","可能","適当","禁止"],a:0,f:"文脈から『死ぬに違いない』という当然・確信の意味になるぜ。",d:3}]},
  jpn_ko_03:{lesson:[{w:"reimu",t:"魔理沙、『係り結び』って言葉、聞いたことあるんだけど、結局何のことなの？",v:"魔理沙、係り結び、って言葉、聞いたことあるんだけど、結局何のことなの？"},{w:"marisa",t:"古文だけにある特別なルールだ。文の中に『特定の助詞』があると、文の終わり方の形が変わるんだぜ。",v:"古文だけにある特別なルールだ。文の中に特定の助詞があると、文の終わり方の形が変わるんだぜ。"},{w:"reimu",t:"普通の文だと終わり方は決まってるんじゃないの？",v:"普通の文だと終わり方は決まってるんじゃないの？"},{w:"marisa",t:"そうなんだ。普通の文は『終止形』っていう形で終わる。だが、ある助詞があると、終止形じゃなく『連体形』に変わるんだぜ。",v:"そうなんだ。普通の文は終止形っていう形で終わる。だが、ある助詞があると、終止形じゃなく連体形に変わるんだぜ。"},{w:"reimu",t:"その『ある助詞』って何？",v:"その、ある助詞、って何？"},{w:"marisa",t:"『ぞ・なむ・や・か』の4つだ。これらを『係助詞』と呼ぶ。文の途中にこの4つのどれかがあったら要注意だぜ。",v:"ぞ、なむ、や、かの4つだ。これらを係助詞と呼ぶ。文の途中にこの4つのどれかがあったら要注意だぜ。"},{w:"reimu",t:"実際の例で見てみたいな。",v:"実際の例で見てみたいな。"},{w:"marisa",t:"いいぜ。普通なら『花咲く』（咲くは終止形）だ。だが『花ぞ咲く』にすると、咲くの形が連体形に変わるんだ。",v:"いいぜ。普通なら花咲く、咲くは終止形だ。だが花ぞ咲く、にすると、咲くの形が連体形に変わるんだ。"},{w:"reimu",t:"終止形も連体形も『咲く』で同じ形に見えるけど…。",v:"終止形も連体形も咲く、で同じ形に見えるけど。"},{w:"marisa",t:"動詞によっては同じ形に見えることもあるが、形容詞や助動詞だと、はっきり形が変わって見えるものも多いぜ。今は『ぞが文末に影響を与えてる』という仕組みを理解すればいい。",v:"動詞によっては同じ形に見えることもあるが、形容詞や助動詞だと、はっきり形が変わって見えるものも多いぜ。今は、ぞが文末に影響を与えてる、という仕組みを理解すればいい。"},{w:"reimu",t:"『こそ』も係助詞の仲間だって聞いたことあるけど。",v:"こそ、も係助詞の仲間だって聞いたことあるけど。"},{w:"marisa",t:"その通り、『こそ』も係助詞の1つだ。でも『こそ』だけは特別で、文末を『已然形』っていう別の形にするんだぜ。",v:"その通り、こそも係助詞の1つだ。でもこそだけは特別で、文末を已然形っていう別の形にするんだぜ。"},{w:"reimu",t:"『ぞ・なむ・や・か』は連体形、『こそ』だけ已然形ってことね。なんで『こそ』だけ違うの？",v:"ぞ、なむ、や、かは連体形、こそだけ已然形ってことね。なんで、こそだけ違うの？"},{w:"marisa",t:"昔からそう決まってるルールとして覚えるしかないぜ。むしろ『こそだけ特別、他は連体形』と覚えれば整理しやすいだろ。",v:"昔からそう決まってるルールとして覚えるしかないぜ。むしろ、こそだけ特別、他は連体形、と覚えれば整理しやすいだろ。"},{w:"reimu",t:"文の中に『ぞ・なむ・や・か・こそ』を見つけたら、文末の形に注目する、ってことだね。",v:"文の中に、ぞ、なむ、や、か、こそ、を見つけたら、文末の形に注目する、ってことだね。"},{w:"marisa",t:"そうだ。係助詞を見つけることが第一歩、文末の形をチェックするのが第二歩。この2段階で古文の文を読み解いていくんだぜ。",v:"そうだ。係助詞を見つけることが第一歩、文末の形をチェックするのが第二歩。この2段階で古文の文を読み解いていくんだぜ。"}],quiz:[{q:"連体形で結ぶ係助詞は？",cs:["ぞ・なむ・や・か","こそ","は・も","のみ"],a:0,f:"ぞ・なむ・や・かは文末を連体形にする係助詞だぜ。",d:1},{q:"『こそ』が結ぶ活用形は？",cs:["已然形","連体形","終止形","連用形"],a:0,f:"こそ、だけは例外で文末を已然形にするぜ。",d:1},{q:"主語を示す格助詞は？",cs:["が・の","を","に","と"],a:0,f:"が、の、が主格(〜が)を表す。のは連体修飾にも使うぜ。",d:1},{q:"係り結びの法則とは？",cs:["係助詞で文末の活用形が変わる","語順が変わる","主語が省略される","敬語になる"],a:0,f:"係助詞に応じて文末が連体形か已然形に変化する決まりだぜ。",d:2},{q:"『花ぞ咲く』の『咲く』の活用形は？",cs:["連体形","終止形","已然形","未然形"],a:0,f:"係助詞ぞを受けて連体形になっているぜ。",d:2},{q:"未然形+『ば』の意味は？",cs:["仮定(もし〜なら)","確定(〜ので)","逆接","並列"],a:0,f:"未然形+ばは『もし〜なら』の仮定条件だぜ。",d:2},{q:"已然形+『ば』の意味は？",cs:["確定(〜ので/〜と)","仮定","逆接のみ","禁止"],a:0,f:"已然形+ばは『〜ので』『〜すると』の確定条件。未然形+ばと区別が重要だぜ。",d:3},{q:"終助詞『なむ』の意味は？",cs:["他への願望(〜してほしい)","強調","疑問","詠嘆"],a:0,f:"未然形+なむは『〜してほしい』という他者への願望。係助詞のなむと別物だぜ。",d:3}]},
  jpn_ko_04:{lesson:[{w:"reimu",t:"魔理沙、古文の動詞の活用、種類が多くて、もう混乱してきたよ…。",v:"魔理沙、古文の動詞の活用、種類が多くて、もう混乱してきたよ。"},{w:"marisa",t:"確かに名前だけ見ると9種類もあって怖く感じるが、実はほとんどが同じ仕組みで、規則的に変化してるだけなんだぜ。",v:"確かに名前だけ見ると9種類もあって怖く感じるが、実はほとんどが同じ仕組みで、規則的に変化してるだけなんだぜ。"},{w:"reimu",t:"規則的ってどういうこと？",v:"規則的ってどういうこと？"},{w:"marisa",t:"日本語の五十音には『ア・イ・ウ・エ・オ』の段があるだろ。動詞は、決まったパターンでこの段を移動しながら変化するんだ。",v:"日本語の五十音には、ア、イ、ウ、エ、オ、の段があるだろ。動詞は、決まったパターンでこの段を移動しながら変化するんだ。"},{w:"reimu",t:"実際の例で見てみたいな。",v:"実際の例で見てみたいな。"},{w:"marisa",t:"『書く』を見てみるぜ。か・き・く・く・け・け、と変化する。これはア・イ・ウ・ウ・エ・エの4つの段を使ってるんだ。",v:"書く、を見てみるぜ。か、き、く、く、け、け、と変化する。これはア、イ、ウ、ウ、エ、エの4つの段を使ってるんだ。"},{w:"reimu",t:"ア・イ・ウ・エの『4つ』だから『四段活用』って名前なんだね！",v:"ア、イ、ウ、エの4つだから四段活用って名前なんだね！"},{w:"marisa",t:"その通り！名前の由来がわかると、覚えやすくなるだろ。同じように『上二段』『下二段』っていう活用もあるんだぜ。",v:"その通り！名前の由来がわかると、覚えやすくなるだろ。同じように上二段、下二段っていう活用もあるんだぜ。"},{w:"reimu",t:"二段ってことは、2つの段だけを使うってこと？",v:"二段ってことは、2つの段だけを使うってこと？"},{w:"marisa",t:"そうだ。上二段は『イ段とウ段』、下二段は『ウ段とエ段』を使う。『上』『下』は、ウ段から見て使う段が上か下か、ってイメージだぜ。",v:"そうだ。上二段はイ段とウ段、下二段はウ段とエ段を使う。上、下は、ウ段から見て使う段が上か下か、ってイメージだぜ。"},{w:"reimu",t:"四段、上二段、下二段、どれも『どの段を使うか』で名前がついてるんだね。規則がわかれば、そんなに怖くないかも。",v:"四段、上二段、下二段、どれも、どの段を使うか、で名前がついてるんだね。規則がわかれば、そんなに怖くないかも。"},{w:"marisa",t:"いい感覚だ。ただ、規則的じゃない『変格活用』っていうグループもある。これだけは別物として覚える必要があるぜ。",v:"いい感覚だ。ただ、規則的じゃない変格活用っていうグループもある。これだけは別物として覚える必要があるぜ。"},{w:"reimu",t:"変格活用には、どんな動詞があるの？",v:"変格活用には、どんな動詞があるの？"},{w:"marisa",t:"カ変は『来』のみ、サ変は『す』『おはす』、ナ変は『死ぬ』『往ぬ』、ラ変は『あり』など、それぞれ単語の数がとても少ないぜ。",v:"カ変は、来、のみ、サ変は、す、おはす、ナ変は、死ぬ、往ぬ、ラ変は、あり、など、それぞれ単語の数がとても少ないぜ。"},{w:"reimu",t:"数が少ないなら、規則を考えるより、単語そのものを覚えた方が早そうだね。",v:"数が少ないなら、規則を考えるより、単語そのものを覚えた方が早そうだね。"},{w:"marisa",t:"その通りだ。変格活用は『例外的な単語のグループ』として丸ごと覚える。規則活用は『段の動き』で理解する。この2つの作戦を分けるのがコツだぜ。",v:"その通りだ。変格活用は、例外的な単語のグループ、として丸ごと覚える。規則活用は、段の動き、で理解する。この2つの作戦を分けるのがコツだぜ。"},{w:"reimu",t:"規則的なものは仕組みで理解、特別なものは単語ごと暗記、ってことだね！",v:"規則的なものは仕組みで理解、特別なものは単語ごと暗記、ってことだね！"}],quiz:[{q:"『書く』の活用の種類は？",cs:["四段活用","上二段","下二段","カ変"],a:0,f:"か・き・く・く・け・けとア〜エ段で変化する四段活用だぜ。",d:1},{q:"カ変動詞は？",cs:["来","す","死ぬ","あり"],a:0,f:"カ変は『来(く)』ただ一語。これだけは丸暗記だぜ。",d:1},{q:"サ変動詞は？",cs:["す・おはす","来","あり","死ぬ"],a:0,f:"サ変は『す』『おはす』の2語だけだぜ。",d:1},{q:"ラ変動詞に含まれるのは？",cs:["あり","来","す","書く"],a:0,f:"ラ変は『あり・をり・はべり・いますがり』の4語だぜ。",d:2},{q:"ナ変動詞は？",cs:["死ぬ・往ぬ","来","す","あり"],a:0,f:"ナ変は『死ぬ』『往ぬ(去ぬ)』の2語だぜ。",d:2},{q:"四段活用の未然形の語尾は？",cs:["ア段","イ段","ウ段","エ段"],a:0,f:"書か(ず)のようにア段。未然形は打消のずに続くぜ。",d:2},{q:"上二段活用の特徴は？",cs:["イ段とウ段で活用","ア段中心","エ段中心","変化なし"],a:0,f:"起く(おく)のようにイ段とウ段の2段で活用するぜ。",d:3},{q:"ラ変が特殊な理由は？",cs:["終止形がウ段でなくイ段(り)","語尾がない","二語のみ","活用しない"],a:0,f:"普通終止形はウ段だが、ラ変は『あり』とイ段で終わるのが特殊だぜ。",d:3}]},
  his_01:{lesson:[{w:"reimu",t:"魔理沙、縄文時代と弥生時代って名前は知ってるけど、何がどう違うの？",v:"魔理沙、縄文時代と弥生時代って名前は知ってるけど、何がどう違うの？"},{w:"marisa",t:"一番の違いは『どうやって食べ物を手に入れていたか』だ。縄文時代と弥生時代、それぞれ見ていくぜ。",v:"一番の違いは、どうやって食べ物を手に入れていたか、だ。縄文時代と弥生時代、それぞれ見ていくぜ。"},{w:"reimu",t:"縄文時代はどうやって食べ物を得てたの？",v:"縄文時代はどうやって食べ物を得てたの？"},{w:"marisa",t:"縄文時代は『狩猟・採集』だ。動物を狩ったり、木の実や貝を採ったりして暮らしてたんだぜ。",v:"縄文時代は狩猟採集だ。動物を狩ったり、木の実や貝を採ったりして暮らしてたんだぜ。"},{w:"reimu",t:"狩りや採集だと、食べ物が取れる量はその日によって変わりそうだね。",v:"狩りや採集だと、食べ物が取れる量はその日によって変わりそうだね。"},{w:"marisa",t:"そうだ。だから縄文時代は『その日その日で食べる』暮らしが中心だった。この時代を特徴づける道具が『縄文土器』だ。",v:"そうだ。だから縄文時代は、その日その日で食べる、暮らしが中心だった。この時代を特徴づける道具が縄文土器だ。"},{w:"reimu",t:"縄文土器って、名前からして縄の模様がついてるの？",v:"縄文土器って、名前からして縄の模様がついてるの？"},{w:"marisa",t:"その通り。縄を転がしてつけた模様が特徴の土器だ。住居は地面を掘ってつくる『竪穴住居』が中心だったぜ。",v:"その通り。縄を転がしてつけた模様が特徴の土器だ。住居は地面を掘ってつくる竪穴住居が中心だったぜ。"},{w:"reimu",t:"じゃあ弥生時代になると、何が変わるの？",v:"じゃあ弥生時代になると、何が変わるの？"},{w:"marisa",t:"一番大きな変化は『稲作』が大陸から伝わってきたことだ。米を自分たちで育てて作れるようになったんだぜ。",v:"一番大きな変化は稲作が大陸から伝わってきたことだ。米を自分たちで育てて作れるようになったんだぜ。"},{w:"reimu",t:"狩りで取るのと、稲作で作るのとでは、何がそんなに違うの？",v:"狩りで取るのと、稲作で作るのとでは、何がそんなに違うの？"},{w:"marisa",t:"大きな違いは『蓄えられる』ことだ。米は収穫してしばらく保存できるから、食料を貯められるようになったんだぜ。",v:"大きな違いは蓄えられることだ。米は収穫してしばらく保存できるから、食料を貯められるようになったんだぜ。"},{w:"reimu",t:"食料を貯められるようになると、何が起きるの？",v:"食料を貯められるようになると、何が起きるの？"},{w:"marisa",t:"『たくさん貯められる人』と『あまり貯められない人』の差が生まれる。これが貧富の差、つまり身分の違いにつながったんだぜ。",v:"たくさん貯められる人と、あまり貯められない人の差が生まれる。これが貧富の差、つまり身分の違いにつながったんだぜ。"},{w:"reimu",t:"食べ物の貯蓄が、社会の身分にまで影響するんだね。",v:"食べ物の貯蓄が、社会の身分にまで影響するんだね。"},{w:"marisa",t:"そうだ。身分が生まれると、人々をまとめる指導者が現れ、やがて『むら』や『くに』という、まとまった集団ができていったんだぜ。",v:"そうだ。身分が生まれると、人々をまとめる指導者が現れ、やがて、むら、や、くに、という、まとまった集団ができていったんだぜ。"},{w:"reimu",t:"稲作が、ただの食生活の変化じゃなくて、社会の仕組みまで変えたんだね！じゃあ奈良時代はどんな時代なの？",v:"稲作が、ただの食生活の変化じゃなくて、社会の仕組みまで変えたんだね！じゃあ奈良時代はどんな時代なの？"},{w:"marisa",t:"奈良時代は710年に『平城京』という都に移ってから始まる。中国の制度を真似た『律令制』っていう仕組みで国を治めてたんだぜ。",v:"奈良時代は710年に平城京という都に移ってから始まる。中国の制度を真似た律令制っていう仕組みで国を治めてたんだぜ。"},{w:"reimu",t:"奈良時代の象徴的なものといえば？",v:"奈良時代の象徴的なものといえば？"},{w:"marisa",t:"聖武天皇が造らせた『東大寺の大仏』だ。仏教の力で国を守ろうという考えで、巨大な大仏を建てたんだぜ。",v:"聖武天皇が造らせた東大寺の大仏だ。仏教の力で国を守ろうという考えで、巨大な大仏を建てたんだぜ。"},{w:"reimu",t:"狩猟採集の縄文、稲作で身分ができた弥生、そして律令制と大仏の奈良。それぞれの時代の特徴がつながって見えてきたよ！",v:"狩猟採集の縄文、稲作で身分ができた弥生、そして律令制と大仏の奈良。それぞれの時代の特徴がつながって見えてきたよ！"}],quiz:[{q:"縄文時代の主な生活は？",cs:["狩猟・採集","稲作中心","工業","商業"],a:0,f:"狩りや木の実の採集が中心。まだ米作りは広まっていないぜ。",d:1},{q:"稲作が広まった時代は？",cs:["弥生時代","縄文時代","古墳時代","奈良時代"],a:0,f:"弥生時代に大陸から稲作が伝わり生活が一変したぜ。",d:1},{q:"平城京に都が移ったのは何年？",cs:["710年","794年","645年","1192年"],a:0,f:"710年、奈良の平城京。『なんと(710)立派な平城京』で覚えるぜ。",d:1},{q:"弥生時代に伝わった金属器は？",cs:["青銅器・鉄器","土器のみ","石器のみ","ガラス"],a:0,f:"青銅器(祭り用)と鉄器(道具用)が一緒に伝わったぜ。",d:2},{q:"大化の改新(645年)の中心人物は？",cs:["中大兄皇子・中臣鎌足","聖徳太子","蘇我馬子","桓武天皇"],a:0,f:"中大兄皇子と中臣鎌足が蘇我氏を倒し天皇中心の国を目指したぜ。",d:2},{q:"律令制の基本法典は？",cs:["大宝律令","御成敗式目","武家諸法度","十七条憲法"],a:0,f:"701年制定の大宝律令。律は刑法、令は行政法にあたるぜ。",d:2},{q:"墾田永年私財法(743年)の影響は？",cs:["私有地が拡大し荘園が生まれた","公地公民が強化","身分が廃止","遷都した"],a:0,f:"開墾した土地の私有を認めたため、貴族や寺社の荘園が広がったぜ。",d:3},{q:"聖武天皇が造らせたのは？",cs:["東大寺の大仏","法隆寺","平等院","金閣"],a:0,f:"仏教の力で国を安定させようと東大寺の大仏を造ったぜ。",d:3}]},
  his_02:{lesson:[{w:"reimu",t:"魔理沙、藤原氏ってすごく権力を持ってたって聞くけど、どうやって権力を握ったの？",v:"魔理沙、藤原氏ってすごく権力を持ってたって聞くけど、どうやって権力を握ったの？"},{w:"marisa",t:"かなり巧妙な方法を使ったんだぜ。まず、自分の娘を天皇のお妃にするんだ。",v:"かなり巧妙な方法を使ったんだぜ。まず、自分の娘を天皇のお妃にするんだ。"},{w:"reimu",t:"娘を天皇のお妃にすると、何がいいの？",v:"娘を天皇のお妃にすると、何がいいの？"},{w:"marisa",t:"娘と天皇の間に子どもが生まれて、その子が次の天皇になれば、藤原氏は『天皇のおじいちゃん』になるんだぜ。",v:"娘と天皇の間に子どもが生まれて、その子が次の天皇になれば、藤原氏は天皇のおじいちゃんになるんだぜ。"},{w:"reimu",t:"天皇のおじいちゃんになると、何が変わるの？",v:"天皇のおじいちゃんになると、何が変わるの？"},{w:"marisa",t:"おじいちゃんとして天皇に意見を言える立場になるから、実質的に政治の実権を握れるんだ。これを『外戚政策』と呼ぶぜ。",v:"おじいちゃんとして天皇に意見を言える立場になるから、実質的に政治の実権を握れるんだ。これを外戚政策と呼ぶぜ。"},{w:"reimu",t:"具体的に、藤原氏はどういう役職に就いたの？",v:"具体的に、藤原氏はどういう役職に就いたの？"},{w:"marisa",t:"天皇がまだ子どもで幼いときは『摂政』、天皇が大人になった後は『関白』という役職で、政治を代わりに動かしたんだぜ。",v:"天皇がまだ子どもで幼いときは摂政、天皇が大人になった後は関白という役職で、政治を代わりに動かしたんだぜ。"},{w:"reimu",t:"摂政と関白、どっちも『天皇の代わりに政治をする』役職なんだね。",v:"摂政と関白、どっちも天皇の代わりに政治をする役職なんだね。"},{w:"marisa",t:"そうだ。この、藤原氏が摂政・関白として政治を独占した仕組みを『摂関政治』と呼ぶ。全盛期を作ったのが藤原道長だぜ。",v:"そうだ。この、藤原氏が摂政、関白として政治を独占した仕組みを摂関政治と呼ぶ。全盛期を作ったのが藤原道長だぜ。"},{w:"reimu",t:"藤原道長って、どれくらいすごい権力を持ってたの？",v:"藤原道長って、どれくらいすごい権力を持ってたの？"},{w:"marisa",t:"『この世をば我が世とぞ思ふ』という有名な歌を詠んでるぜ。『この世は、まるで自分の世界だ』という意味だ。",v:"この世をば我が世とぞ思ふ、という有名な歌を詠んでるぜ。この世は、まるで自分の世界だ、という意味だ。"},{w:"reimu",t:"自分の世だと言いきってしまうほど、自信に満ちてたんだね。この時代、文化はどんな様子だったの？",v:"自分の世だと言いきってしまうほど、自信に満ちてたんだね。この時代、文化はどんな様子だったの？"},{w:"marisa",t:"この時代、それまで続けてきた『遣唐使』（中国に使者を送ること）をやめたんだ。すると、独自の文化が育っていったんだぜ。",v:"この時代、それまで続けてきた遣唐使、中国に使者を送ることをやめたんだ。すると、独自の文化が育っていったんだぜ。"},{w:"reimu",t:"中国の影響が減ったから、日本らしい文化が生まれたってことね。",v:"中国の影響が減ったから、日本らしい文化が生まれたってことね。"},{w:"marisa",t:"そうだ。これを『国風文化』と呼ぶ。この時代に『かな文字』が生まれて、源氏物語や枕草子のような名作が書かれたんだぜ。",v:"そうだ。これを国風文化と呼ぶ。この時代にかな文字が生まれて、源氏物語や枕草子のような名作が書かれたんだぜ。"},{w:"reimu",t:"藤原氏が外戚として権力を握り、その安定した時代に国風文化が花開いた、ってつながりが見えてきたよ！",v:"藤原氏が外戚として権力を握り、その安定した時代に国風文化が花開いた、ってつながりが見えてきたよ！"}],quiz:[{q:"摂関政治を行った一族は？",cs:["藤原氏","平氏","源氏","蘇我氏"],a:0,f:"藤原氏が摂政・関白として政治を独占したぜ。",d:1},{q:"かな文字で書かれた長編物語は？",cs:["源氏物語","古事記","日本書紀","万葉集"],a:0,f:"紫式部の源氏物語。世界最古級の長編小説とも言われるぜ。",d:1},{q:"清少納言の随筆は？",cs:["枕草子","徒然草","方丈記","源氏物語"],a:0,f:"枕草子。『春はあけぼの』で有名な随筆だぜ。",d:1},{q:"摂政と関白の違いは？",cs:["天皇が幼少時か成人後か","軍人か文官か","男か女か","中央か地方か"],a:0,f:"摂政は天皇が幼い時、関白は成人後に天皇を補佐する役だぜ。",d:2},{q:"藤原氏の権力の源は？",cs:["天皇の外戚になる","軍事力","貿易","宗教"],a:0,f:"娘を天皇に嫁がせ、生まれた子の祖父として実権を握ったぜ。",d:2},{q:"国風文化の特徴は？",cs:["日本独自の文化","中国をそのまま模倣","西洋風","武家風"],a:0,f:"遣唐使停止後、唐の文化を消化して日本風に発展させたぜ。",d:2},{q:"『この世をば〜』と詠んだ人物は？",cs:["藤原道長","藤原頼通","菅原道真","平清盛"],a:0,f:"全盛を誇った藤原道長。満月に自分の権勢を重ねた歌だぜ。",d:3},{q:"浄土信仰を背景に建てられたのは？",cs:["平等院鳳凰堂","東大寺","法隆寺","金閣"],a:0,f:"道長の子・頼通が建てた平等院鳳凰堂。極楽浄土を表した建築だぜ。",d:3}]},
  his_03:{lesson:[{w:"reimu",t:"魔理沙、鎌倉幕府ってどうやってできたの？",v:"魔理沙、鎌倉幕府ってどうやってできたの？"},{w:"marisa",t:"源頼朝という武士が、ライバルだった平氏を壇ノ浦の戦いで滅ぼして、1192年に『征夷大将軍』という地位について開いたんだ。",v:"源頼朝という武士が、ライバルだった平氏を壇ノ浦の戦いで滅ぼして、1192年に征夷大将軍という地位について開いたんだ。"},{w:"reimu",t:"征夷大将軍って、どういう立場なの？",v:"征夷大将軍って、どういう立場なの？"},{w:"marisa",t:"武士の中で一番上に立つ、最高指導者の地位だ。これより前は、貴族（天皇のまわりの人たち）が政治の中心だったんだぜ。",v:"武士の中で一番上に立つ、最高指導者の地位だ。これより前は、貴族、天皇のまわりの人たちが政治の中心だったんだぜ。"},{w:"reimu",t:"つまり鎌倉幕府は、初めて武士が政治の中心になった、ってことだね。",v:"つまり鎌倉幕府は、初めて武士が政治の中心になった、ってことだね。"},{w:"marisa",t:"その通りだ。これ以降、約700年もの間、武士が政治を動かす『武家政治』が続くことになるんだぜ。",v:"その通りだ。これ以降、約700年もの間、武士が政治を動かす武家政治が続くことになるんだぜ。"},{w:"reimu",t:"将軍と、その下にいる武士たちの関係って、どうなってたの？",v:"将軍と、その下にいる武士たちの関係って、どうなってたの？"},{w:"marisa",t:"『御恩と奉公』という関係だ。将軍が武士に『領地』を与える、これが御恩。武士は戦場で命がけで戦う、これが奉公だぜ。",v:"御恩と奉公という関係だ。将軍が武士に領地を与える、これが御恩。武士は戦場で命がけで戦う、これが奉公だぜ。"},{w:"reimu",t:"土地をもらう代わりに、命をかけて戦う、っていうギブアンドテイクの関係なんだね。",v:"土地をもらう代わりに、命をかけて戦う、っていうギブアンドテイクの関係なんだね。"},{w:"marisa",t:"そうだ。土地を通じたこの主従関係が、鎌倉時代の武士社会を支える土台になってたんだぜ。",v:"そうだ。土地を通じたこの主従関係が、鎌倉時代の武士社会を支える土台になってたんだぜ。"},{w:"reimu",t:"頼朝が亡くなった後は、どうなったの？",v:"頼朝が亡くなった後は、どうなったの？"},{w:"marisa",t:"頼朝の妻の実家、北条氏が『執権』という役職について、実際の権力を握るようになったんだ。これを『執権政治』と呼ぶぜ。",v:"頼朝の妻の実家、北条氏が執権という役職について、実際の権力を握るようになったんだ。これを執権政治と呼ぶぜ。"},{w:"reimu",t:"将軍じゃなくて、執権が実権を持つようになったんだね。",v:"将軍じゃなくて、執権が実権を持つようになったんだね。"},{w:"marisa",t:"そうだ。この執権政治の時代に、『元寇』という大きな出来事が起きる。中国大陸の元という国が、2回にわたって日本に攻めてきたんだ。",v:"そうだ。この執権政治の時代に、元寇という大きな出来事が起きる。中国大陸の元という国が、2回にわたって日本に攻めてきたんだ。"},{w:"reimu",t:"日本はどうやって元の襲来から守ったの？",v:"日本はどうやって元の襲来から守ったの？"},{w:"marisa",t:"執権の北条時宗が中心になって、2度とも撃退に成功したんだぜ。",v:"執権の北条時宗が中心になって、2度とも撃退に成功したんだぜ。"},{w:"reimu",t:"撃退に成功したのに、なんで幕府はその後衰えていくの？",v:"撃退に成功したのに、なんで幕府はその後衰えていくの？"},{w:"marisa",t:"ここがポイントだ。元寇は『敵を追い返した』戦いで、新しい土地を獲得したわけじゃない。だから武士たちに与えられる『御恩』の土地が足りなかったんだぜ。",v:"ここがポイントだ。元寇は、敵を追い返した、戦いで、新しい土地を獲得したわけじゃない。だから武士たちに与えられる御恩の土地が足りなかったんだぜ。"},{w:"reimu",t:"命をかけて戦ったのに、ご褒美の土地がもらえなかったってこと？",v:"命をかけて戦ったのに、ご褒美の土地がもらえなかったってこと？"},{w:"marisa",t:"そうだ。『奉公』はしたのに『御恩』が返ってこない。これで御家人たちの不満が高まって、幕府の力が弱まっていったんだぜ。",v:"そうだ。奉公はしたのに御恩が返ってこない。これで御家人たちの不満が高まって、幕府の力が弱まっていったんだぜ。"},{w:"reimu",t:"『御恩と奉公』のバランスが崩れたことが、幕府が衰える原因になったんだね！",v:"御恩と奉公のバランスが崩れたことが、幕府が衰える原因になったんだね！"}],quiz:[{q:"鎌倉幕府を開いたのは？",cs:["源頼朝","平清盛","北条時宗","足利尊氏"],a:0,f:"源頼朝が1192年に征夷大将軍となり開いたぜ。",d:1},{q:"将軍と御家人の関係は？",cs:["御恩と奉公","売買","親子","師弟"],a:0,f:"土地を与える御恩、命がけで働く奉公の主従関係だぜ。",d:1},{q:"頼朝の死後に実権を握った一族は？",cs:["北条氏","足利氏","藤原氏","平氏"],a:0,f:"頼朝の妻・北条政子の実家、北条氏が執権政治を行ったぜ。",d:1},{q:"執権という役職は？",cs:["将軍を補佐し実権を握る","天皇","軍の総大将","地方官"],a:0,f:"将軍を補佐する立場ながら、実質的に幕府を動かしたぜ。",d:2},{q:"1221年の承久の乱で敗れたのは？",cs:["後鳥羽上皇","北条義時","源頼朝","足利尊氏"],a:0,f:"幕府打倒を狙った後鳥羽上皇が敗れ、幕府の力が強まったぜ。",d:2},{q:"御成敗式目を定めたのは？",cs:["北条泰時","源頼朝","北条時宗","足利尊氏"],a:0,f:"1232年、北条泰時が武士独自の法律を定めたぜ。",d:2},{q:"元寇(2度)を退けた執権は？",cs:["北条時宗","北条泰時","北条義時","源頼朝"],a:0,f:"北条時宗。文永の役と弘安の役を暴風雨もあって退けたぜ。",d:3},{q:"元寇後に幕府が衰えた理由は？",cs:["防衛戦で恩賞の土地が与えられず御家人が不満","戦に負けた","天皇が倒した","財政黒字"],a:0,f:"防衛戦のため新たな領地が得られず、御家人に恩賞を与えられなかったぜ。",d:3}]},
  his_04:{lesson:[{w:"reimu",t:"魔理沙、室町幕府って誰が開いたの？",v:"魔理沙、室町幕府って誰が開いたの？"},{w:"marisa",t:"足利尊氏という武士だ。1338年に征夷大将軍になって、京都に幕府を開いたんだぜ。",v:"足利尊氏という武士だ。1338年に征夷大将軍になって、京都に幕府を開いたんだぜ。"},{w:"reimu",t:"室町幕府で一番栄えた時期はいつ？",v:"室町幕府で一番栄えた時期はいつ？"},{w:"marisa",t:"3代将軍の足利義満の時代だ。あの有名な『金閣』を建てたのも義満だぜ。",v:"3代将軍の足利義満の時代だ。あの有名な金閣を建てたのも義満だぜ。"},{w:"reimu",t:"義満は他にどんなことをしたの？",v:"義満は他にどんなことをしたの？"},{w:"marisa",t:"中国の『明』という国と貿易をして、お金を儲けたんだ。これを『勘合貿易』と呼ぶぜ。",v:"中国の明という国と貿易をして、お金を儲けたんだ。これを勘合貿易と呼ぶぜ。"},{w:"reimu",t:"『勘合』ってどういう意味なの？",v:"勘合ってどういう意味なの？"},{w:"marisa",t:"『勘合』っていうのは、合い札みたいなものだ。当時、海賊（倭寇と呼ばれた）が貿易船になりすますことが問題になってたんだぜ。",v:"勘合っていうのは、合い札みたいなものだ。当時、海賊、倭寇と呼ばれた、が貿易船になりすますことが問題になってたんだぜ。"},{w:"reimu",t:"その合い札で、海賊と正式な船を見分けたってこと？",v:"その合い札で、海賊と正式な船を見分けたってこと？"},{w:"marisa",t:"その通り！正式な貿易船だけが勘合を持っていて、これを提示しないと貿易できない仕組みにしたんだ。だから『勘合貿易』と呼ばれるぜ。",v:"その通り！正式な貿易船だけが勘合を持っていて、これを提示しないと貿易できない仕組みにしたんだ。だから勘合貿易と呼ばれるぜ。"},{w:"reimu",t:"義満の時代が全盛期だったんだね。その後はどうなるの？",v:"義満の時代が全盛期だったんだね。その後はどうなるの？"},{w:"marisa",t:"時代が進んで、8代将軍の足利義政のころに『応仁の乱』という大きな戦が起こるんだ。これが室町幕府の大きな転換点になるぜ。",v:"時代が進んで、8代将軍の足利義政のころに応仁の乱という大きな戦が起こるんだ。これが室町幕府の大きな転換点になるぜ。"},{w:"reimu",t:"応仁の乱って、何が原因で起きたの？",v:"応仁の乱って、何が原因で起きたの？"},{w:"marisa",t:"将軍の跡継ぎを誰にするかで対立が起こり、それが大きな戦争に発展したんだ。戦いの場になった京都は、焼け野原になってしまったぜ。",v:"将軍の跡継ぎを誰にするかで対立が起こり、それが大きな戦争に発展したんだ。戦いの場になった京都は、焼け野原になってしまったぜ。"},{w:"reimu",t:"京都が焼けるほどの大きな戦だったんだね。幕府の力にも影響したの？",v:"京都が焼けるほどの大きな戦だったんだね。幕府の力にも影響したの？"},{w:"marisa",t:"大きく影響したぜ。応仁の乱をきっかけに、幕府の力は一気に弱まっていったんだ。",v:"大きく影響したぜ。応仁の乱をきっかけに、幕府の力は一気に弱まっていったんだ。"},{w:"reimu",t:"幕府の力が弱まると、地方はどうなるの？",v:"幕府の力が弱まると、地方はどうなるの？"},{w:"marisa",t:"幕府に頼らず、各地で実力のある者が、上の立場の者を倒して成り上がっていく動きが広がったんだ。これを『下剋上』と呼ぶぜ。",v:"幕府に頼らず、各地で実力のある者が、上の立場の者を倒して成り上がっていく動きが広がったんだ。これを下剋上と呼ぶぜ。"},{w:"reimu",t:"『下剋上』が広がった結果、どんな時代になるの？",v:"下剋上が広がった結果、どんな時代になるの？"},{w:"marisa",t:"各地に『戦国大名』と呼ばれる実力者が現れて、それぞれが領地を広げようと争い合う『戦国時代』が始まるんだぜ。",v:"各地に戦国大名と呼ばれる実力者が現れて、それぞれが領地を広げようと争い合う戦国時代が始まるんだぜ。"},{w:"reimu",t:"義満の全盛期から、応仁の乱を経て、下剋上の戦国時代へ。室町時代の流れがつながって見えるよ！",v:"義満の全盛期から、応仁の乱を経て、下剋上の戦国時代へ。室町時代の流れがつながって見えるよ！"}],quiz:[{q:"室町幕府を開いたのは？",cs:["足利尊氏","足利義満","源頼朝","織田信長"],a:0,f:"足利尊氏が1338年に京都で開いたぜ。",d:1},{q:"金閣を建てたのは？",cs:["足利義満","足利義政","足利尊氏","北条氏"],a:0,f:"3代義満。豪華な金閣は室町文化の全盛を象徴するぜ。",d:1},{q:"銀閣を建てたのは？",cs:["足利義政","足利義満","足利尊氏","織田信長"],a:0,f:"8代義政。質素で落ち着いた東山文化を代表するぜ。",d:1},{q:"義満が明と行った貿易は？",cs:["勘合貿易","南蛮貿易","朱印船貿易","出島貿易"],a:0,f:"勘合符で正式船と倭寇を区別した勘合貿易だぜ。",d:2},{q:"応仁の乱(1467年)の影響は？",cs:["戦国時代の始まり","幕府の安定","天皇の復権","鎖国"],a:0,f:"将軍の跡継ぎ争いから大乱になり、幕府が弱まって戦国時代へ突入したぜ。",d:2},{q:"下剋上とは？",cs:["下の者が実力で上の者を倒す","身分が固定","主従の強化","平和維持"],a:0,f:"家臣が主君を、低い身分が高い身分を実力で倒す風潮だぜ。",d:2},{q:"室町期の農民の自治組織『惣』とは？",cs:["農民が運営する自治的な村","武士団","商人組合","寺院"],a:0,f:"惣は農民が寄合で物事を決める自治的な村のことだぜ。",d:3},{q:"鉄砲伝来(1543年)の場所は？",cs:["種子島","長崎","堺","博多"],a:0,f:"種子島に漂着したポルトガル人が鉄砲を伝えたぜ。戦法が一変したんだ。",d:3}]},
  his_05:{lesson:[{w:"reimu",t:"魔理沙、江戸幕府ってすごく長く続いたんでしょ？どうやって全国を支配し続けたの？",v:"魔理沙、江戸幕府ってすごく長く続いたんでしょ？どうやって全国を支配し続けたの？"},{w:"marisa",t:"開いたのは徳川家康、1603年だ。江戸幕府がすごいのは『大名（地方の領主）をどう配置するか』をよく考えてたことなんだぜ。",v:"開いたのは徳川家康、1603年だ。江戸幕府がすごいのは、大名、地方の領主をどう配置するか、をよく考えてたことなんだぜ。"},{w:"reimu",t:"大名にも種類があったの？",v:"大名にも種類があったの？"},{w:"marisa",t:"3種類に分けてたぜ。徳川家の親戚である『親藩』、昔から徳川家に仕えてた『譜代』、関ヶ原の戦いの後に従った『外様』だ。",v:"3種類に分けてたぜ。徳川家の親戚である親藩、昔から徳川家に仕えてた譜代、関ヶ原の戦いの後に従った外様だ。"},{w:"reimu",t:"この3つで、何か扱いが違ったの？",v:"この3つで、何か扱いが違ったの？"},{w:"marisa",t:"信頼度が違うから、配置も変えたんだ。一番信頼度の低い『外様』は、江戸から遠い場所に置かれたぜ。",v:"信頼度が違うから、配置も変えたんだ。一番信頼度の低い外様は、江戸から遠い場所に置かれたぜ。"},{w:"reimu",t:"なんで遠くに置くの？",v:"なんで遠くに置くの？"},{w:"marisa",t:"江戸から遠ければ、もし反乱を起こしても、すぐに江戸に攻め込まれる心配が少ない。江戸幕府にとって安全な配置ってわけだぜ。",v:"江戸から遠ければ、もし反乱を起こしても、すぐに江戸に攻め込まれる心配が少ない。江戸幕府にとって安全な配置ってわけだぜ。"},{w:"reimu",t:"配置以外にも、大名を抑える工夫があったの？",v:"配置以外にも、大名を抑える工夫があったの？"},{w:"marisa",t:"あるぜ。『参勤交代』という制度だ。大名は1年おきに、自分の領地と江戸を往復しなきゃいけなかったんだ。",v:"あるぜ。参勤交代という制度だ。大名は1年おきに、自分の領地と江戸を往復しなきゃいけなかったんだ。"},{w:"reimu",t:"ただの引っ越しなら、そんなに大変じゃない気がするけど…。",v:"ただの引っ越しなら、そんなに大変じゃない気がするけど。"},{w:"marisa",t:"実際は大行列を組んで移動するから、すごくお金がかかるんだ。さらに江戸での生活費もかさむ。これで大名の財力をどんどん削っていったんだぜ。",v:"実際は大行列を組んで移動するから、すごくお金がかかるんだ。さらに江戸での生活費もかさむ。これで大名の財力をどんどん削っていったんだぜ。"},{w:"reimu",t:"お金を使わせることで、大名が反乱を起こす力を持てないようにしてたんだね。",v:"お金を使わせることで、大名が反乱を起こす力を持てないようにしてたんだね。"},{w:"marisa",t:"そうだ。配置の工夫と参勤交代、この2つが江戸幕府の長期安定を支えた知恵だぜ。",v:"そうだ。配置の工夫と参勤交代、この2つが江戸幕府の長期安定を支えた知恵だぜ。"},{w:"reimu",t:"江戸時代の身分制度ってどうなってたの？",v:"江戸時代の身分制度ってどうなってたの？"},{w:"marisa",t:"『士農工商』という区分があった。武士、農民、職人、商人の順だ。一番上に立つ支配層は武士だったぜ。",v:"士農工商という区分があった。武士、農民、職人、商人の順だ。一番上に立つ支配層は武士だったぜ。"},{w:"reimu",t:"年貢（税金のようなもの）は何で払ってたの？",v:"年貢、税金のようなもの、は何で払ってたの？"},{w:"marisa",t:"主に『米』で払ったんだ。大名の領地の大きさも『石高』、つまり『米がどれだけ取れるか』で表していたぜ。",v:"主に米で払ったんだ。大名の領地の大きさも石高、つまり米がどれだけ取れるか、で表していたぜ。"},{w:"reimu",t:"大名の配置・参勤交代・身分制度、いろんな仕組みが組み合わさって、長い安定が生まれたんだね！",v:"大名の配置、参勤交代、身分制度、いろんな仕組みが組み合わさって、長い安定が生まれたんだね！"}],quiz:[{q:"江戸幕府を開いたのは？",cs:["徳川家康","徳川家光","織田信長","豊臣秀吉"],a:0,f:"徳川家康が1603年に征夷大将軍となり開いたぜ。",d:1},{q:"大名を統制した制度は？",cs:["参勤交代","刀狩   world_01:{lesson:[{w:"reimu",t:"魔理沙、『四大文明』ってよく聞くけど、どこで生まれたの？",v:"魔理沙、四大文明ってよく聞くけど、どこで生まれたの？"},{w:"marisa",t:"メソポタミア、エジプト、インダス、中国の4つだ。この4つには、共通点が1つあるんだぜ。何だと思う？",v:"メソポタミア、エジプト、インダス、中国の4つだ。この4つには、共通点が1つあるんだぜ。何だと思う？"},{w:"reimu",t:"うーん…全部暖かそうな場所、とかかな？",v:"うーん、全部暖かそうな場所、とかかな？"},{w:"marisa",t:"惜しいが、ちょっと違うぜ。正解は『どれも大きな川の流域』ってことなんだ。",v:"惜しいが、ちょっと違うぜ。正解は、どれも大きな川の流域、ってことなんだ。"},{w:"reimu",t:"具体的にはどんな川なの？",v:"具体的にはどんな川なの？"},{w:"marisa",t:"エジプトはナイル川、メソポタミアはチグリス川とユーフラテス川、インダスはインダス川、中国は黄河だ。",v:"エジプトはナイル川、メソポタミアはチグリス川とユーフラテス川、インダスはインダス川、中国は黄河だ。"},{w:"reimu",t:"なんで、わざわざ川の近くに人が集まったの？",v:"なんで、わざわざ川の近くに人が集まったの？"},{w:"marisa",t:"川は2つの大切なものを運んでくるんだ。1つは生きるために必要な『水』、もう1つは農業に役立つ『肥えた土』だぜ。",v:"川は2つの大切なものを運んでくるんだ。1つは生きるために必要な水、もう1つは農業に役立つ肥えた土だぜ。"},{w:"reimu",t:"肥えた土があると、何がいいの？",v:"肥えた土があると、何がいいの？"},{w:"marisa",t:"作物がよく育つんだ。だから川の近くでは農業がうまくいって、たくさんの食料が作れたんだぜ。",v:"作物がよく育つんだ。だから川の近くでは農業がうまくいって、たくさんの食料が作れたんだぜ。"},{w:"reimu",t:"食料がたくさんあると、人もたくさん集まりそうだね。",v:"食料がたくさんあると、人もたくさん集まりそうだね。"},{w:"marisa",t:"その通りだ。たくさんの人が集まって、力を合わせて生活していくうちに、まとまった『文明』が育っていったんだぜ。",v:"その通りだ。たくさんの人が集まって、力を合わせて生活していくうちに、まとまった文明が育っていったんだぜ。"},{w:"reimu",t:"文明が発達すると、他にどんなものが生まれたの？",v:"文明が発達すると、他にどんなものが生まれたの？"},{w:"marisa",t:"『文字』が生まれたんだぜ。人が増えて社会が複雑になると、記録を残す必要が出てくるからな。",v:"文字が生まれたんだぜ。人が増えて社会が複雑になると、記録を残す必要が出てくるからな。"},{w:"reimu",t:"それぞれの文明で、違う文字が生まれたの？",v:"それぞれの文明で、違う文字が生まれたの？"},{w:"marisa",t:"そうだ。メソポタミアでは『楔形文字』、エジプトでは『象形文字』、中国では『甲骨文字』が生まれたぜ。",v:"そうだ。メソポタミアでは楔形文字、エジプトでは象形文字、中国では甲骨文字が生まれたぜ。"},{w:"reimu",t:"楔形文字って、どんな文字なの？",v:"楔形文字って、どんな文字なの？"},{w:"marisa",t:"粘土の板に、くさび（先がとがった棒）を押し付けて書いた文字だ。形がくさびに似てるから、楔形文字って呼ばれてるんだぜ。",v:"粘土の板に、くさび、先がとがった棒を押し付けて書いた文字だ。形がくさびに似てるから、楔形文字って呼ばれてるんだぜ。"},{w:"reimu",t:"大きな川が、農業も人の集まりも、文字の発明までも引き起こしたんだね！",v:"大きな川が、農業も人の集まりも、文字の発明までも引き起こしたんだね！"},{w:"marisa",t:"その通り。『川→農業→人口増加→文明→文字』っていう流れを押さえれば、4つの文明をまとめて理解できるぜ。",v:"その通り。川、農業、人口増加、文明、文字、っていう流れを押さえれば、4つの文明をまとめて理解できるぜ。"}],quiz:[{q:"エジプト文明が栄えた川は？",cs:["ナイル川","インダス川","黄河","チグリス川"],a:0,f:"ナイル川。定期的な氾濫が肥えた土をもたらしたぜ。",d:1},{q:"メソポタミア文明の文字は？",cs:["楔形文字","象形文字","甲骨文字","アル
