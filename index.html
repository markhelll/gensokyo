<script>
// React/ReactDOM/Babelの読み込み失敗・タイムアウトを検知して、
// 無言で固まり続けないようにエラーメッセージを表示するウォッチドッグ
(function(){
  function showError(msg){
    var sp = document.querySelector("#loading .spin");
    var txt = document.getElementById("loading");
    var box = document.getElementById("loading-error");
    if(!box) return;
    if(sp) sp.style.display = "none";
    box.style.display = "block";
    box.innerHTML = msg;
  }
  window.addEventListener("error", function(e){
    if(e && e.target && e.target.tagName === "SCRIPT"){
      showError(
        "読み込みに失敗しました（ネット接続、または広告ブロッカー/コンテンツブロッカーが原因の可能性があります）。<br><br>" +
        "・Wi-Fi/モバイルデータを切り替えて再読み込み<br>" +
        "・Safariのコンテンツブロッカーを一時OFF<br>" +
        "・別のブラウザで開く<br><br>" +
        "を試してください。"
      );
    }
  }, true);
  setTimeout(function(){
    if(typeof window.React === "undefined" || typeof window.ReactDOM === "undefined"){
      showError(
        "読み込みが完了しません。ネット接続が必要なアプリです。<br><br>" +
        "・Wi-Fi/モバイルデータを切り替えて再読み込み<br>" +
        "・Safariのコンテンツブロッカーを一時OFF<br>" +
        "・別のブラウザで開く<br><br>" +
        "を試してください。"
      );
    }
  }, 8000);
})();

math1_01:[{q:"展開と因数分解、どっちがどっちか混乱する",a:"展開は『かっこを開いてバラす』、因数分解は『かっこの形にまとめ直す』だ。展開は前に進む、因数分解は逆戻り、と覚えとけ。"},{q:"因数分解で2つの数が見つけられない",a:"『かけて最後の数・足して真ん中の数』になるペアを探すんだ。まずかけ算で候補を全部書き出して、その中から足し算が合うものを選べばいいぜ。"},{q:"(x+3)²を展開したら答えが合わない",a:"(x+3)²はx²+6x+9だ。x²+9だけにすると真ん中の2×3×x=6xを忘れてる。『2乗は3項になる』と覚えとけ。"},{q:"2x²+7x+3みたいに頭に数字があると解けない",a:"たすき掛けを使うんだ。2x²は2xとx、3は1と3に分けて、斜めにかけて足したら7xになる組合せを探す。(2x+1)(x+3)が答えだぜ。"},{q:"x²−9はどう因数分解するの？",a:"これは『2乗−2乗』の形だ。a²−b²=(a+b)(a−b)を使って(x+3)(x−3)になる。真ん中の項がない時はこれを疑え。"}],
math1_02:[{q:"√の中をどこまで簡単にすればいいか分からない",a:"中身に平方数(4,9,16,25…)が隠れてないか探すんだ。見つからなくなったらそこで完成だぜ。"},{q:"有理化って何のためにやるの？",a:"分母にルートがあると計算しづらいからだ。分母分子に同じルートをかけて、分母を整数にすると後がラクになるぜ。"},{q:"√8と√18の引き算ができない",a:"先に両方を簡単にしろ。√8=2√2、√18=3√2、中身が同じ√2になったから2√2−3√2=−√2だ。中身を揃えるのが先だぜ。"},{q:"(√5+√2)(√5−√2)が面倒くさい",a:"これは和と差の積だから(√5)²−(√2)²=5−2=3だ。展開せずに『2乗−2乗』で一発で出せるぜ。"},{q:"分母が√3−1のときの有理化が分からない",a:"分母分子に(√3+1)をかけるんだ。符号を逆にしたものをかけると分母がルートなしになる。これが2項の有理化のコツだぜ。"}],
math1_03:[{q:"不等号の向きをいつ変えるか忘れる",a:"負の数をかける・割るときだけ向きが逆になる。それ以外は方程式と全く同じだ。『マイナスで割った？』を毎回チェックしろ。"},{q:"≦と<の違いが分からない",a:"≦は『その数も含む』、<は『含まない』だ。≦には下に線があるだろ、それが『イコールも含む』印だぜ。"},{q:"連立不等式の答え方が分からない",a:"両方を満たす『重なる範囲』が答えだ。x>1かつx<4なら、1と4の間の1<x<4になる。数直線に書くと一目で分かるぜ。"},{q:"|x|<3みたいな絶対値の不等式が苦手",a:"|x|<3は『−3より大きく3より小さい』、つまり−3<x<3だ。絶対値が『〜より小さい』なら間にはさむ、と覚えろ。"},{q:"−2x+1>5でつまずく",a:"まず1を移項して−2x>4、次に−2で割るとき向きが逆になってx<−2だ。マイナスで割る瞬間だけ要注意だぜ。"}],
math1_05:[{q:"平方完成のやり方が覚えられない",a:"y=(x−●)²+▲ の形を目指すんだ。この形になれば頂点が(●,▲)とすぐ読める。まずは頂点を出すための変形だと思え。"},{q:"最大か最小か、どっち答えるか迷う",a:"x²の前がプラスなら下に凸=頂点が最小、マイナスなら上に凸=頂点が最大だ。お椀の向きで判断しろ。"},{q:"y=x²−2xの最小値の出し方が分からない",a:"平方完成してy=(x−1)²−1にする。頂点が(1,−1)だから最小値は−1だ。まず頂点の形に変えるのが鉄則だぜ。"},{q:"範囲がある問題(0≦x≦3など)が難しい",a:"頂点が範囲の中にあるか確認しろ。中にあれば頂点が最小、端っこの値も計算して最大を探す。グラフを書けば迷わないぜ。"},{q:"y=−x²+4xの最大値が出せない",a:"上に凸(山型)だから頂点が最大だ。平方完成でy=−(x−2)²+4、頂点(2,4)だから最大値は4だぜ。"}],
math1_06:[{q:"分散の計算手順がごちゃごちゃになる",a:"順番は『①平均を出す→②各データ−平均(偏差)→③偏差を2乗→④その平均』だ。この4ステップを毎回同じ順でやれ。"},{q:"分散と標準偏差の違いは？",a:"標準偏差は分散の正の平方根だ。分散は単位が2乗されてるから、√で元の単位に戻したのが標準偏差だぜ。"},{q:"中央値と平均値の違いが分からない",a:"平均は全部足して割った値、中央値は小さい順に並べた真ん中の値だ。極端な値があると平均はズレるが中央値はブレにくいぜ。"},{q:"最頻値って何？",a:"いちばん多く出てくる値のことだ。3,3,5,7なら3が2回で最頻値。データの中で『常連』の値だと思えばいいぜ。"},{q:"相関係数が何を表すか分からない",a:"2つのデータの関係の強さを−1〜1で表す数だ。1に近いと右上がりの強い関係、0に近いと関係が薄い、と読むぜ。"}],
eng_02:[{q:"不定詞の3つの用法、見分け方が分からない",a:"訳して一番自然なものを選べ。『〜すること』なら名詞的、『〜するための』なら形容詞的、『〜するために』なら副詞的だ。"},{q:"なんでいつもtoの後ろが原形なの？",a:"不定詞はそういうルールだからだ。to＋動詞の原形(変化させない形)、これはセットで固定だと覚えとけ。"},{q:"something to drinkのto drinkは何用法？",a:"形容詞的用法だ。『飲むための何か』とsomethingを後ろから説明してる。名詞のすぐ後ろのto〜は説明役だと思え。"},{q:"too...to doの意味が取れない",a:"『〜すぎて…できない』だ。too hot to drinkなら『熱すぎて飲めない』。tooとtoがセットで否定の意味になるぜ。"},{q:"It is easy to swim.のItって何？",a:"形だけの主語(仮主語)で、訳さない。本当の主語はto swimの方だ。『泳ぐことは簡単だ』が意味だぜ。"}],
eng_03:[{q:"不定詞と動名詞、どっちを使えばいいか分からない",a:"動詞ごとに決まってる。enjoy/finish/stopは動名詞、want/hope/decideは不定詞だ。前置詞の後ろは必ず動名詞、これだけは例外なしだぜ。"},{q:"動名詞と現在進行形のing、同じ形で混乱する",a:"形は同じだが役割が違う。動名詞は『〜すること』という名詞、進行形は『〜している』という動作だ。文の中での働きで見分けろ。"},{q:"stop to doとstop doingの違いが分からない",a:"stop doingは『〜するのをやめる』、stop to doは『〜するために立ち止まる』だ。ingはやめる、to doは目的、と区別しろ。"},{q:"look forward to のあとが原形じゃダメなの？",a:"このtoは前置詞だから後ろは動名詞だ。look forward to seeingが正しい。不定詞のtoと紛らわしいが別物だぜ。"},{q:"動名詞が主語のとき動詞は単数？複数？",a:"単数扱いだ。Reading is fun.のように、動名詞の主語にはisやwasを使う。『〜すること』は1つのことだからな。"}],
eng_04:[{q:"whoとwhichの使い分けが分からない",a:"先行詞(説明される名詞)が人ならwho、物ならwhich。迷ったら人にも物にも使えるthatでいいぜ。"},{q:"先行詞ってどれのこと？",a:"関係代名詞のすぐ前にある、説明を受ける名詞のことだ。『〜な人/物』の『人/物』にあたる部分だぜ。"},{q:"目的格の関係代名詞が省略できるのが分からない",a:"the book (which) I boughtのように、後ろに主語＋動詞が続くときは省略できる。『物＋私が〜した』の形なら消せるぜ。"},{q:"whoseの使い方が分からない",a:"所有を表す関係代名詞だ。the boy whose dog is bigで『犬が大きいその少年』。『〜の』にあたる部分をつなぐぜ。"},{q:"コンマ+whichは普通のwhichと何が違う？",a:"非制限用法といって、先行詞に補足説明を付け加える使い方だ。コンマがあると『ちなみに〜』とおまけ情報を足す感じだぜ。"}],
eng_05:[{q:"受動態の作り方が安定しない",a:"骨組みは『be動詞＋過去分詞』だけだ。『される側』を主語にして、動詞を過去分詞に変える。時制はbe動詞だけいじればいい。"},{q:"過去分詞の形がうろ覚え",a:"不規則動詞は暗記するしかないが、規則動詞は−edをつけるだけだ。write→writtenみたいな不規則は出るたびに覚え直せ。"},{q:"能動態を受動態に変える手順が分からない",a:"目的語を主語に前へ出す→動詞をbe＋過去分詞に→元の主語をbyの後ろに置く。He makes it.→It is made by him.だぜ。"},{q:"be interestedの後ろの前置詞を間違える",a:"be interested in〜だ。inを使う。受動態の形だが『〜に興味がある』という決まった言い方として覚えとけ。"},{q:"助動詞がつく受動態の形は？",a:"助動詞＋be＋過去分詞だ。can be doneで『〜されうる』。助動詞の後ろは必ずbeの原形が入るのがポイントだぜ。"}],
eng_06:[{q:"erをつけるかmoreをつけるか迷う",a:"短い語は語尾に−er(taller)、長い語は前にmore(more beautiful)だ。tall/bigみたいに短ければer、beautifulみたいに長ければmoreだぜ。"},{q:"最上級にtheをつけ忘れる",a:"『一番』はグループの中で1つに決まるから、必ずtheがつく。the tallest、the most〜と、theをセットで覚えとけ。"},{q:"as tall asの意味が分からない",a:"『同じくらい背が高い』だ。as〜asで2つが同程度であることを表す。間には変化させない元の形(原級)が入るぜ。"},{q:"the+比較級, the+比較級って何？",a:"『〜すればするほど…』だ。The harder you study, the better.で『勉強するほど良くなる』。2つセットで覚えろ。"},{q:"比較級を強めたいときmuchを置く場所は？",a:"比較級の直前だ。much tallerで『ずっと背が高い』。veryは比較級には使えない、強調はmuchだと覚えとけ。"}],
eng_07:[{q:"仮定法はなぜ過去形を使うの？",a:"時間が過去ってことじゃなく、『現実から距離をとってる(=ありえない)』という感覚を過去形で表してるんだ。"},{q:"主語がIなのにwereになるのが変",a:"仮定法では主語が何でもwereを使うのが原則だ。これは特別ルールだから、理屈抜きで覚えとけ。"},{q:"I wishの後ろがなぜ過去形なの？",a:"今かなわない願望を表すからだ。I wish I were taller.で『背が高ければなあ』。現実と違う願いは過去形で表すぜ。"},{q:"仮定法過去完了って何が違うの？",a:"過去の事実と逆のことを言う形だ。If I had studied, I would have passed.で『勉強してたら受かったのに』。過去の後悔だぜ。"},{q:"ifを省略できるって本当？",a:"本当だ。Ifを消して主語と動詞をひっくり返す。Were I you,〜で『もし私が君なら』。少し硬い言い方になるぜ。"}],
jpn_gen_01:[{q:"筆者の主張がどこにあるか分からない",a:"『しかし』の後と『つまり』の後に注目しろ。逆接の後に本音、『つまり』の後にまとめが来やすいんだ。"},{q:"具体例で読むのが止まってしまう",a:"具体例は説明の材料にすぎない。読んだら『つまり何が言いたい？』と問いかけて、抽象的なまとめに戻る癖をつけろ。"},{q:"対比構造って何に気をつければいいの？",a:"『Aに対してB』と2つを比べてる箇所を見抜くんだ。筆者はどちらを推してるか、対比の中に主張が隠れてることが多いぜ。"},{q:"『ゆえに』はどういう時に出てくる？",a:"前の内容が理由で、後ろが結論のときだ。『ゆえに』の後ろは筆者の言いたい結論が来やすいから印をつけとけ。"},{q:"筆者がわざわざ反対意見を書くのはなぜ？",a:"反対意見を一度出してから否定して、自分の主張を強く見せるためだ。『確かに〜。しかし〜』の後半が本音だぜ。"}],
jpn_gen_02:[{q:"登場人物の気持ちが読み取れない",a:"気持ちは直接書かれにくい。『行動』『表情・しぐさ』『情景描写』の3つの手がかりを集めて推理するんだ。"},{q:"なんで景色の描写が気持ちと関係あるの？",a:"作者は景色を借りて心を表すことが多いんだ。晴れ=晴れやか、冷たい雨=沈んだ心、みたいにな。"},{q:"直喩と隠喩の違いが分からない",a:"『ようだ』を使うのが直喩、使わずに例えるのが隠喩だ。『花のようだ』は直喩、『君は花だ』は隠喩だぜ。"},{q:"擬人法って何？",a:"人でないものを人みたいに表す技法だ。『風がささやく』みたいにな。風は本当はささやかないだろ、それが擬人法だぜ。"},{q:"心情の変化を捉えるコツは？",a:"出来事の前と後で気持ちがどう動いたかを追え。『きっかけの出来事→心の変化』をセットで押さえると変化が見えるぜ。"}],
jpn_gen_03:[{q:"同音異義語の漢字をいつも間違える",a:"漢字そのものの意味から考えろ。『意外』の意は心、『以外』の以は基準。意味で結びつければ迷わなくなるぜ。"},{q:"慣用句の意味を逆に覚えてた",a:"『気が置けない』=遠慮いらない、『役不足』=役が軽すぎる、みたいに印象と逆のものは試験で狙われる。正しい意味を意識して覚え直せ。"},{q:"『一期一会』の意味は？",a:"一生に一度の出会いを大切にする、という意味だ。茶道から来た言葉で、その時その場の縁を大事にする心構えだぜ。"},{q:"『情けは人の為ならず』を誤解してた",a:"『情けをかけるのは結局自分のためになる』が正しい意味だ。『甘やかすのは本人のためにならない』は誤りだぜ。"},{q:"『他山の石』ってどういう意味？",a:"他人の良くない言動も自分を磨く材料にできる、という意味だ。手本ではなく『反面教師』寄りの言葉だから使い方に注意だぜ。"}],
jpn_ko_02:[{q:"助動詞が多すぎて覚えられない",a:"一気にやるな。まず『ず＝打消』『む＝推量か意志』『べし＝意味が複数』の3つだけ押さえろ。それから増やせばいい。"},{q:"『む』が推量か意志か分からない",a:"主語を見ろ。主語が自分(私)なら意志『〜しよう』、他人や自然なら推量『〜だろう』になりやすいぜ。"},{q:"『べし』の意味が多すぎて覚えられない",a:"推量・意志・可能・当然・命令・適当の6つだが、まず『〜にちがいない(推量)』『〜すべきだ(当然)』の2つを軸に覚えろ。文脈で選ぶぜ。"},{q:"『咲かず』の意味は？",a:"『咲かない』だ。『ず』は打消で、現代語の『ない』にあたる。未然形につくのがポイントだぜ。"},{q:"『ず』の連体形が『ぬ』なのが紛らわしい",a:"『ず』は活用するんだ。連体形は『ぬ』、已然形は『ね』になる。『咲かぬ花』の『ぬ』も打消だと見抜けるようにしろ。"}],
jpn_ko_03:[{q:"係り結びが何なのか分からない",a:"『ぞ・なむ・や・か・こそ』があると文末の形が変わる、古文だけの決まりだ。まずこの助詞を文中で見つけることが第一歩だぜ。"},{q:"こそだけ結びが違うのが覚えにくい",a:"『こそ』だけ已然形、他の4つは連体形だ。『こそだけ特別』と覚えれば整理しやすいぜ。"},{q:"未然形+ばと已然形+ばで意味が違うの？",a:"違うぞ。未然形+ばは『もし〜なら(仮定)』、已然形+ばは『〜ので(確定)』だ。同じ『ば』でも前の形で意味が変わるぜ。"},{q:"『花ぞ咲く』の咲くが終止形じゃないのはなぜ？",a:"『ぞ』があるから係り結びで連体形になってるんだ。普通なら終止形『咲く』だが、ぞ・なむ等があると連体形で結ぶぜ。"},{q:"係り結びは何のためにあるの？",a:"強調や疑問を表すためだ。『ぞ・なむ・こそ』は強調、『や・か』は疑問。文に気持ちを乗せる仕組みだと思えばいいぜ。"}],
jpn_ko_04:[{q:"活用の種類が9個もあって無理",a:"規則的なものは『どの段を使うか』で名前がついてる(四段=ア〜エ段)。仕組みで理解すれば怖くないぜ。"},{q:"変格活用が覚えられない",a:"変格は単語数がすごく少ない。カ変=来、サ変=す・おはす、みたいに単語ごと丸暗記したほうが早いぜ。"},{q:"カ変・サ変って具体的に何の動詞？",a:"カ変は『来(く)』1語だけ、サ変は『す』『おはす』だ。数が少ないから単語ごと丸暗記したほうが早いぜ。"},{q:"四段活用の見分け方は？",a:"打消の『ず』をつけてみろ。直前がア段の音(咲かず=か)になれば四段活用だ。『ず』をつけて何段になるかで活用を判定するんだぜ。"},{q:"ラ変が特殊なのはどこ？",a:"普通の動詞は終止形がウ段で終わるが、ラ変は『あり』のように終止形が『り』(イ段)で終わる。そこが例外的なんだぜ。"}],
his_01:[{q:"縄文と弥生の違いが曖昧",a:"食べ物の得方が違う。縄文=狩猟採集(その日暮らし)、弥生=稲作(蓄えられる)。稲作が身分の差を生んだのがポイントだ。"},{q:"年号がなかなか覚えられない",a:"語呂で覚えろ。平城京710年は『なんと(710)立派な平城京』だ。語呂にすると一気に覚えやすくなるぜ。"},{q:"大化の改新は誰がやったの？",a:"中大兄皇子と中臣鎌足だ。蘇我氏を倒して、天皇中心の国づくりを始めた改革だぜ。645年、『むしご(645)ろし』で覚えとけ。"},{q:"墾田永年私財法で何が変わったの？",a:"開墾した土地を永久に私有していいことになった。これで公地公民が崩れて、貴族や寺が私有地(荘園)を増やしていったんだぜ。"},{q:"聖武天皇が大仏を造らせた理由は？",a:"伝染病や反乱で世が乱れ、仏教の力で国を守ろうとしたんだ。東大寺の大仏がそれだぜ。"}],
his_02:[{q:"藤原氏がなぜ権力を持てたのか分からない",a:"娘を天皇のお妃にして、生まれた子が天皇になると『天皇の祖父』になれる。この外戚政策で実権を握ったんだ。"},{q:"摂政と関白の違いがあいまい",a:"摂政は天皇が幼いとき、関白は天皇が成人した後の補佐役だ。どっちも天皇の代わりに政治を動かす役だぜ。"},{q:"国風文化ってどんな文化？",a:"遣唐使をやめた後、日本独自に発展した文化だ。かな文字が生まれ、源氏物語や枕草子が書かれた。和風の貴族文化だぜ。"},{q:"『この世をば〜』は誰の歌？",a:"藤原道長だ。『この世は自分のためにあるようだ』と全盛期の権力を詠んだ歌で、摂関政治のピークを象徴してるぜ。"},{q:"清少納言と紫式部がごっちゃになる",a:"清少納言は随筆『枕草子』、紫式部は物語『源氏物語』だ。『少納言=随筆、式部=物語』とセットで覚えろ。"}],
his_03:[{q:"御恩と奉公がどっちがどっちか分からない",a:"御恩=将軍が土地を与える、奉公=武士が命がけで戦う。土地をもらう見返りに戦う、というギブアンドテイクだ。"},{q:"元寇に勝ったのに幕府が弱るのが謎",a:"防衛戦だから新しい土地が手に入らず、戦った武士に与える御恩(土地)が足りなかったんだ。だから不満が高まったんだぜ。"},{q:"承久の乱は誰が誰に負けたの？",a:"後鳥羽上皇が幕府(北条氏)に挑んで負けた戦いだ。これで幕府の力が朝廷を上回るようになったんだぜ。"},{q:"執権って何をする役職？",a:"将軍を補佐して実際に政治を動かす役だ。源氏の将軍が途絶えた後、北条氏がこの執権の地位を握って実権を持ったぜ。"},{q:"御成敗式目って何？",a:"武士のための初めての法律だ。北条泰時が定めて、御家人の土地争いなどを裁く基準にした。武家社会のルールブックだぜ。"}],
his_04:[{q:"金閣と銀閣、どっちが誰か混乱する",a:"金閣=3代義満(全盛期)、銀閣=8代義政(東山文化)だ。『金が先、銀が後』『義満→義政』とセットで覚えろ。"},{q:"応仁の乱が何でそんなに重要なの？",a:"将軍の跡継ぎ争いが大乱になって京都が焼け、幕府が一気に弱まった。これがきっかけで下剋上の戦国時代が始まるんだ。"},{q:"日明貿易(勘合貿易)の勘合って何？",a:"正式な貿易船と倭寇(海賊)を区別するための合い札だ。義満がこれを使って明と貿易し、大きな利益を得たぜ。"},{q:"惣(そう)ってどんな組織？",a:"室町時代の農民の自治組織だ。村のことを村人みんなで話し合って決めた。農民が力をつけてきた表れだぜ。"},{q:"鉄砲はどこに伝わったの？",a:"種子島だ。1543年、ポルトガル人が漂着して伝えた。この後の戦い方を大きく変えた出来事だぜ。"}],
his_05:[{q:"なぜ外様大名を遠くに置いたの？",a:"信頼度が低いからだ。江戸から遠ければ反乱を起こしてもすぐ攻め込まれない。幕府にとって安全な配置なんだぜ。"},{q:"参勤交代って何のためにあるの？",a:"大名に往復と江戸滞在で金を使わせ、反乱する力を持てないようにするためだ。お金を削るのが本当の狙いだぜ。"},{q:"鎖国でも貿易できた場所は？",a:"長崎の出島だ。オランダと中国とは交易を続けた。鎖国は『完全に閉じた』のでなく、窓口を絞った状態だと思えばいいぜ。"},{q:"武家諸法度は何のための法律？",a:"大名を統制するためのルールだ。城を勝手に修理するな、無断で結婚するな、などを定めて反乱を防いだんだぜ。"},{q:"江戸時代の身分はどう分かれてた？",a:"武士・百姓・町人などに分かれてた。武士が支配層で、年貢を納める百姓が人口の大半を占めてたぜ。"}],
world_01:[{q:"4つの文明と川がごちゃごちゃになる",a:"エジプト=ナイル川、メソポタミア=ティグリス・ユーフラテス、インダス文明=インダス川、中国=黄河。文明と川をセットで覚えろ。"},{q:"なんで川のそばに文明ができたの？",a:"川の近くは水があって農業ができ、人が集まれるからだ。だから古代文明は大きな川の流域に生まれたんだぜ。"},{q:"メソポタミアの文字って何？",a:"くさび形文字だ。粘土板に葦のペンで刻んだ。ハンムラビ法典もこの文字で記されてるぜ。"},{q:"ハンムラビ法典で有名なのは何文明？",a:"メソポタミア文明だ。『目には目を』で知られる、復讐の程度を定めた古い法律だぜ。"},{q:"中国最古の文字は？",a:"甲骨文字だ。亀の甲羅や獣の骨に刻まれた。占いの記録に使われ、今の漢字のルーツになってるぜ。"}],
world_02:[{q:"ポリスって何のこと？",a:"古代ギリシャの都市国家のことだ。アテネやスパルタみたいに、都市1つが独立した国として機能してたんだぜ。"},{q:"アテネの民主政が今と違うらしいけど？",a:"市民が直接参加する『直接民主政』だった。ただし参加できたのは成人男性市民だけで、女性や奴隷は除かれてたんだ。"},{q:"アテネとスパルタはどう違うの？",a:"アテネは民主政で文化的、スパルタは軍事重視の厳しい教育で有名だ。同じギリシャでも正反対の性格だったぜ。"},{q:"ローマで帝政を始めたのは誰？",a:"オクタウィアヌス(アウグストゥス)だ。共和政から皇帝が治める帝政へ移した最初の人物だぜ。"},{q:"ローマ法が後世に与えた影響は？",a:"ヨーロッパの法律の土台になった。今の法制度の考え方の多くがローマ法に源を持ってるんだぜ。"}],
world_03:[{q:"イスラム教の基本がよく分からない",a:"開祖はムハンマド、聖典はコーランだ。この2つはセットでよく問われるから確実に押さえろ。"},{q:"十字軍は何のために行ったの？",a:"キリスト教の聖地エルサレムをイスラム勢力から取り戻すためだ。宗教をめぐる遠征だったんだぜ。"},{q:"イスラム世界が発展させた学問は？",a:"数学・天文学・医学などだ。特に数字(アラビア数字)や代数学が有名で、後にヨーロッパへ伝わったぜ。"},{q:"封建制の主従関係ってどんな仕組み？",a:"主君が土地を与え、家臣が忠誠と軍事奉仕で返す関係だ。日本の御恩と奉公とよく似た仕組みだぜ。"},{q:"アラビア数字って本当はどこ生まれ？",a:"元はインドで生まれた数字だ。それをイスラム世界が取り入れ発展させ、ヨーロッパに伝えたから『アラビア数字』と呼ばれるぜ。"}],
world_04:[{q:"ルネサンスって結局なんなの？",a:"古代ギリシャ・ローマを手本に『人間らしさ』を見直した文化運動だ。イタリアで始まったのがポイントだぜ。"},{q:"宗教改革とルネサンスがごっちゃになる",a:"ルネサンス=文化・芸術の動き、宗教改革=ルター達による教会への批判運動だ。別物として分けて覚えろ。"},{q:"活版印刷を発明したのは誰？",a:"グーテンベルクだ。これで本が大量に作れるようになり、宗教改革の考えが一気に広まる助けになったぜ。"},{q:"地動説を唱えたのは誰？",a:"コペルニクスだ。地球が太陽の周りを回るという説で、当時の常識をひっくり返した。後にガリレオが支持したぜ。"},{q:"ルターは何を批判したの？",a:"教会が販売した『免罪符』を批判したんだ。お金で罪が許されるのはおかしい、と。これが宗教改革の口火だぜ。"}],
world_05:[{q:"革命がいくつもあって年号が混乱する",a:"アメリカ独立宣言1776年、フランス革命1789年だ。アメリカが先、フランスが後、と順番で覚えれば整理できるぜ。"},{q:"フランス革命のスローガンが覚えにくい",a:"『自由・平等・友愛(博愛)』の3つだ。3点セットでリズムよく口に出して覚えるといいぜ。"},{q:"名誉革命では何が決まったの？",a:"国王より議会が上、という原則だ。流血なく王を交代させ、権利の章典で議会の力を確立した。だから『名誉』革命だぜ。"},{q:"市民革命を支えた思想は何？",a:"啓蒙思想だ。ロックやルソーが『人は生まれながら自由・平等』と説き、それが革命の理論的な支えになったぜ。"},{q:"ナポレオンは何をした人？",a:"フランス革命後に権力を握り、法の下の平等を定めたナポレオン法典を作った。ヨーロッパ各地に革命の理念を広げたぜ。"}],
world_06:[{q:"産業革命がなぜそんなに大事なの？",a:"手作業から機械生産に変わって、社会全体が大きく変わったからだ。イギリスで蒸気機関を動力に始まったんだぜ。"},{q:"帝国主義って何が目的なの？",a:"工業で作った製品の市場や原料を求めて、列強が植民地を広げた動きだ。産業革命の続きとして起きたんだぜ。"},{q:"産業革命で最初に発展した産業は？",a:"綿工業(繊維産業)だ。機械で布を大量生産できるようになったのが始まり。そこから他の産業へ広がったぜ。"},{q:"産業革命が生んだ社会問題は？",a:"労働者の長時間労働や児童労働、都市の環境悪化だ。便利になった一方で、貧富の差や公害が深刻になったんだぜ。"},{q:"帝国主義で列強はどこへ進出した？",a:"アジアやアフリカだ。原料と市場を求めて植民地にした。これが後の対立や戦争の火種にもなったぜ。"}],
geo_01:[{q:"緯度と経度がどっちがどっちか分からない",a:"緯度=赤道からの南北の位置、経度=本初子午線からの東西の位置だ。『緯度は横線、経度は縦線』で覚えろ。"},{q:"時差の計算が苦手",a:"経度15度ごとに1時間ずれる。2地点の経度の差を15で割れば時差が出るぜ。東に行くほど時間が進むのもポイントだ。"},{q:"時差の計算の具体的なやり方は？",a:"2地点の経度差を15で割る。経度差90度なら90÷15=6時間の時差だ。東にある方が時間が進んでるぜ。"},{q:"日本の標準時の経度は？",a:"東経135度だ。兵庫県明石市を通る線で、ここを基準に日本の時刻が決まってる。覚えておくと時差問題が解けるぜ。"},{q:"日付変更線って何？",a:"だいたい経度180度を通る線だ。これを東から西へ越えると日付が1日進む。地球の時刻の『つなぎ目』だぜ。"}],
geo_02:[{q:"気候帯がたくさんあって覚えられない",a:"まず『暑い(熱帯)・乾く(乾燥帯)・温かい(温帯)・寒い(冷帯・寒帯)』の大枠で掴め。細かい区分は後からでいい。"},{q:"日本がどの気候帯か分からない",a:"日本の大部分は温帯だ。四季がはっきりしていて、夏は暑く冬は寒い、これが温帯の特徴だぜ。"},{q:"気候区分は何で決まるの？",a:"気温と降水量の2つが2大要素だ。この組み合わせで熱帯・乾燥帯・温帯…と分けられてるぜ。"},{q:"地中海性気候の特徴は？",a:"夏に乾いて冬に雨が降るのが特徴だ。オリーブやぶどうの栽培に向いてる。普通と逆で夏に乾くのがポイントだぜ。"},{q:"熱帯雨林気候ってどんな所？",a:"一年中高温多湿で、毎日のようにスコールが降る。背の高い密林が広がる。アマゾンや東南アジアが代表だぜ。"}],
geo_03:[{q:"日本の地形の特徴が漠然としてる",a:"国土の約4分の3が山地で、川は短くて急、というのが日本の地形の核だ。平地が少ないのがポイントだぜ。"},{q:"季節風(モンスーン)がよく分からない",a:"季節で向きが変わる風だ。夏は海から湿った風、冬は大陸から乾いた風が吹く。これが日本の四季に影響してるんだぜ。"},{q:"リアス海岸って何？",a:"複雑に入り組んだ海岸のことだ。山地が海に沈んでできる。良い漁港になるが、津波が高くなりやすい弱点もあるぜ。"},{q:"扇状地と三角州の違いは？",a:"扇状地は川が山から平地に出る所、三角州は川が海に注ぐ河口にできる。山ぎわか河口か、で区別しろ。"},{q:"日本海側が冬に雪が多いのはなぜ？",a:"冬の北西の季節風が、日本海の水分を含んで山にぶつかり大雪を降らせるんだ。だから日本海側は豪雪地帯になるぜ。"}],
geo_04:[{q:"農業の種類が多くて区別できない",a:"『何を作るか・どう組み合わせるか』で分けろ。稲作=アジア、酪農=乳製品、遊牧=移動、混合農業=作物＋家畜、と特徴で覚えるんだ。"},{q:"なんでアジアで稲作が盛んなの？",a:"モンスーンの雨で水が豊富だからだ。米は水をたくさん使う作物だから、雨の多いアジアに向いてるんだぜ。"},{q:"プランテーション農業って何？",a:"熱帯で単一の作物を大規模に栽培する農業だ。コーヒーやゴムなど。植民地時代に作られた仕組みが多いぜ。"},{q:"地中海式農業の作物は？",a:"オリーブ・ぶどう・小麦などだ。夏の乾燥に強い作物を育てる。地中海性気候とセットで覚えるといいぜ。"},{q:"混合農業ってどんな農業？",a:"作物の栽培と家畜の飼育を組み合わせた農業だ。ヨーロッパで発達した。両方やることで土地を効率よく使えるぜ。"}],
civics_01:[{q:"憲法の三大原則が覚えられない",a:"『国民主権・基本的人権の尊重・平和主義』の3つだ。この3点セットを丸ごと覚えとけ、必ず出るぜ。"},{q:"国民主権ってどういう意味？",a:"政治を決める力(主権)が国民にある、という原則だ。王様や一部の人でなく、みんなが決める仕組みだぜ。"},{q:"憲法第25条は何を保障してる？",a:"健康で文化的な最低限度の生活を営む権利、つまり生存権だ。社会保障の土台になってる大事な条文だぜ。"},{q:"憲法での天皇の地位は？",a:"日本国と国民統合の『象徴』だ。政治の権力は持たず、国事行為だけを行う。主権は国民にあるのが原則だぜ。"},{q:"国民の三大義務は何？",a:"教育を受けさせる義務・勤労の義務・納税の義務だ。権利だけでなく義務もセットで定められてるぜ。"}],
civics_02:[{q:"三権がどれを担当するか混乱する",a:"立法=国会(法律を作る)、行政=内閣(法律を実行)、司法=裁判所(法律で裁く)だ。作る・実行・裁く、で覚えろ。"},{q:"なんで三権を分けるの？",a:"権力が1つに集中すると暴走するからだ。3つに分けてお互いを監視させ、暴走を防ぐ仕組みなんだぜ。"},{q:"内閣総理大臣は誰が決めるの？",a:"国会が指名する。国会議員の中から選ばれるんだ。国民が直接選ぶアメリカの大統領とはここが違うぜ。"},{q:"違憲審査権って何？",a:"法律が憲法に反してないかを裁判所が判断する権限だ。特に最高裁は『憲法の番人』と呼ばれるぜ。"},{q:"内閣不信任が決議されるとどうなる？",a:"内閣は10日以内に総辞職するか、衆議院を解散するかのどちらかだ。国会と内閣が緊張関係にある仕組みだぜ。"}],
civics_03:[{q:"価格がどう決まるのか分からない",a:"『需要(欲しい人)』と『供給(売る量)』で決まる。欲しい人が増えれば上がり、品物が余れば下がるんだ。"},{q:"需要と供給、言葉が紛らわしい",a:"需要=買いたい側、供給=売る側だ。『需』は求める、『供』は差し出す、と漢字の意味で覚えるといいぜ。"},{q:"インフレーションって何？",a:"物の値段が全体的に上がり続けることだ。同じ1000円で買える量が減る。お金の価値が下がる現象だと思えばいいぜ。"},{q:"独占の何が問題なの？",a:"競争相手がいないと、企業が価格を勝手に高く設定できてしまう。消費者が損するから独占禁止法で規制してるんだぜ。"},{q:"需要曲線はなぜ右下がり？",a:"値段が高いほど買う人が減り、安いほど増えるからだ。価格と需要量が逆に動くので右下がりになるんだぜ。"}],
civics_04:[{q:"国連の略語が多くて混乱する",a:"PKO=平和維持活動、ODA=政府開発援助だ。略語は『何の頭文字か』をセットで覚えると忘れにくいぜ。"},{q:"安全保障理事会って何がすごいの？",a:"国連の中で平和に関する強い決定権を持つ機関だ。常任理事国5か国には拒否権があるのがポイントだぜ。"},{q:"常任理事国の拒否権って何？",a:"重要な決定を1国でも反対すれば否決できる権利だ。米・英・仏・露・中の5か国が持つ。これで決定が止まることもあるぜ。"},{q:"WHOって何の略？",a:"世界保健機関だ。感染症対策など、世界の健康に関わる活動をする国連の専門機関だぜ。"},{q:"国連総会の議決の特徴は？",a:"全ての加盟国が1国1票を持つ。大国も小国も票は同じ重さだ。ここが拒否権のある安保理と違うところだぜ。"}],
phy_01:[{q:"速さと加速度の違いが分からない",a:"速さ=どれだけ速く動くか、加速度=速さがどれだけ変化するか、だ。加速度は『速さの変わり具合』だぜ。"},{q:"v-tグラフの傾きが何を表すか忘れる",a:"v-t(速さ-時間)グラフの傾きは加速度だ。傾きが急なほど速さの変化が大きい=加速度が大きいぜ。"},{q:"加速度の単位がよく分からない",a:"m/s²(メートル毎秒毎秒)だ。1秒ごとに速さが何m/s変わるか、を表す。速さの変化の割合だと思えばいいぜ。"},{q:"v-tグラフの面積は何を表すの？",a:"進んだ距離だ。グラフの傾きが加速度、囲む面積が距離。傾きと面積で別々の量が読めるのがポイントだぜ。"},{q:"初速0で加速度2、3秒後の速度は？",a:"v=加速度×時間で2×3=6m/sだ。初速0なら単純にかけ算でいい。公式に当てはめるだけだぜ。"}],
phy_02:[{q:"運動方程式F=maの使い方が分からない",a:"力=質量×加速度だ。3つのうち2つが分かれば残り1つが出る。問題で何が与えられてるか確認して当てはめろ。"},{q:"作用反作用と慣性がごちゃごちゃ",a:"慣性=動いてる物はそのまま動き続ける性質、作用反作用=押したら同じ力で押し返される、だ。別の法則だぜ。"},{q:"電車の急発進で体が倒れるのはなぜ？",a:"慣性だ。体は止まったままでいようとするのに、電車だけ動くから取り残されて後ろに倒れる。これが慣性の法則だぜ。"},{q:"ニュートン(N)を基本単位で表すと？",a:"kg·m/s²だ。F=maから質量(kg)×加速度(m/s²)なので、力の単位はこうなる。式から単位が作れるぜ。"},{q:"摩擦力はどっち向きにはたらく？",a:"物が動こうとする向きと逆だ。進もうとするのを邪魔する方向にはたらく。だから動きを止める働きをするぜ。"}],
phy_03:[{q:"仕事の意味が日常語とずれてて混乱",a:"物理の仕事は『力×動かした距離』だ。力を入れても動かなければ仕事はゼロ。日常の『働く』とは別物だぜ。"},{q:"運動エネルギーと位置エネルギーの違いは？",a:"運動エネルギー=動いてる物が持つ、位置エネルギー=高い所にある物が持つ、だ。動きか高さかで区別しろ。"},{q:"力学的エネルギー保存則って何？",a:"運動エネルギーと位置エネルギーの合計が一定に保たれる、という法則だ。摩擦がなければ高さと速さで入れ替わるだけだぜ。"},{q:"振り子の最下点で最大になるのは？",a:"運動エネルギー(=速さ)だ。一番低い所で位置エネルギーが最小になり、その分が運動エネルギーに変わってるんだぜ。"},{q:"仕事率(1秒あたりの仕事)って何？",a:"単位時間にする仕事の量だ。単位はワット(W)。同じ仕事でも速くやるほど仕事率が大きいぜ。"}],
phy_04:[{q:"波の公式v=fλが覚えにくい",a:"速さ=振動数×波長だ。『はやさ＝しんどうすう×はちょう』とリズムで覚えろ。3つのうち2つから残りが出るぜ。"},{q:"振動数と波長がどっちか分からない",a:"振動数=1秒に何回振動するか(単位Hz)、波長=波1個分の長さ、だ。回数か長さか、で区別しろ。"},{q:"音を伝えるのは何？",a:"空気などの物質(媒質)だ。だから真空では音は伝わらない。波は何かを揺らして伝わるものだと覚えとけ。"},{q:"光が水中で曲がる現象の名前は？",a:"屈折だ。光が違う物質に斜めに入ると進む向きが変わる。水に入れた棒が曲がって見えるのもこれだぜ。"},{q:"音が高いとき振動数はどうなる？",a:"大きくなる。振動数が多いほど高い音、少ないほど低い音だ。Hz(ヘルツ)の数字が大きいと高音だぜ。"}],
chem_01:[{q:"原子の構造がイメージできない",a:"中心に原子核(陽子＋中性子)、その周りを電子が回ってる。原子番号=陽子の数だと押さえとけ。"},{q:"周期表をどう見ればいいの？",a:"元素を原子番号順に並べた表だ。まず『原子番号順に並んでる』ことだけ分かれば十分、細かいのは後でいいぜ。"},{q:"質量数ってどう求めるの？",a:"陽子の数＋中性子の数だ。電子は軽すぎて数えない。原子核に詰まっている粒の合計だと思えばいいぜ。"},{q:"同位体って何？",a:"陽子の数は同じだけど中性子の数が違う原子どうしだ。同じ元素なのに重さが少し違う仲間、ってことだぜ。"},{q:"周期表の縦と横の呼び方は？",a:"縦の列が『族』、横の行が『周期』だ。同じ族(縦)は似た性質を持つ。最外殻電子の数が同じだからだぜ。"}],
chem_02:[{q:"結合の種類が区別できない",a:"イオン結合=プラスとマイナスが引き合う、共有結合=電子を共有、金属結合=金属同士。何で結びつくかで見分けろ。"},{q:"食塩が何結合か覚えられない",a:"塩化ナトリウム(食塩)はイオン結合だ。ナトリウムイオン(＋)と塩化物イオン(−)が引き合ってるんだぜ。"},{q:"金属が電気を通すのはなぜ？",a:"金属の中を自由に動ける電子(自由電子)があるからだ。この電子が動いて電気を運ぶ。金属結合の特徴だぜ。"},{q:"水分子は何結合？",a:"共有結合だ。水素と酸素が電子を共有して結びついてる。HとOが手をつなぎ合ってるイメージだぜ。"},{q:"ダイヤモンドが硬いのはなぜ？",a:"炭素原子が共有結合で立体的にびっしりつながってるからだ。この強い結合の網のおかげで、とても硬いんだぜ。"}],
chem_04:[{q:"化学反応式の係数の付け方が分からない",a:"矢印の左右で各原子の数を同じにするんだ。原子は消えたり生まれたりしないから、両辺の数を合わせる必要があるぜ。"},{q:"なんで係数をつけるの？",a:"反応の前後で原子の総数は変わらないからだ。数を合わせるために、分子の個数(係数)を調整するんだぜ。"},{q:"2H₂+O₂→2H₂Oで水素は両辺何個？",a:"左は2H₂で水素原子4個、右は2H₂Oで4個。ちゃんと両辺4個で揃ってる。これが係数を合わせるってことだぜ。"},{q:"反応の前後で保存されるものは？",a:"原子の種類と数だ。原子は消えも増えもしない。だから矢印の左右で各原子の数が必ず同じになるんだぜ。"},{q:"気体の発生を示す記号は？",a:"上向きの矢印(↑)だ。沈殿なら下向き(↓)。反応式で何が出てくるかを示す印として使うぜ。"}],
chem_05:[{q:"酸性・塩基性とpHの関係が分からない",a:"pH7が中性、それより小さいと酸性、大きいと塩基性だ。数字が7から離れるほど性質が強くなるぜ。"},{q:"酸と塩基が出すイオンが覚えられない",a:"酸は水素イオン(H⁺)、塩基は水酸化物イオン(OH⁻)を出す。酸=H⁺、塩基=OH⁻でセットで覚えろ。"},{q:"酸と塩基が反応すると何ができる？",a:"塩(えん)と水ができる。これを中和という。酸のH⁺と塩基のOH⁻が結びついて水になるんだぜ。"},{q:"BTB溶液の色の変化が覚えられない",a:"酸性で黄色、中性で緑、塩基性で青だ。『黄→緑→青』と酸性側から覚えろ。リトマス紙とは別物だから注意な。"},{q:"塩酸の化学式は？",a:"HClだ。水素(H)と塩素(Cl)からなる。水に溶けてH⁺を出すから酸性を示すんだぜ。"}],
bio_02:[{q:"DNAの塩基の組み合わせが覚えられない",a:"AとT、GとCが必ずペアになる。『A-T、G-C』この2組だけだ。決まった相手としかくっつかないぜ。"},{q:"DNAの構造がイメージできない",a:"2本の鎖がねじれた『二重らせん』だ。はしごをねじったような形で、段の部分が塩基のペアになってるんだぜ。"},{q:"DNAの正式名称は？",a:"デオキシリボ核酸だ。長いから普通はDNAと略す。生き物の設計図が書かれた物質だと思えばいいぜ。"},{q:"DNAが複製される仕組みは？",a:"二重らせんがほどけて、それぞれが鋳型になり相手の鎖を新しく作る。AはTを、GはCを呼んで対を作るんだぜ。"},{q:"DNAからタンパク質ができる流れは？",a:"DNA→(転写)→RNA→(翻訳)→タンパク質だ。設計図を写し取って、それをもとに部品を組み立てる流れだぜ。"}],
bio_03:[{q:"恒常性(ホメオスタシス)って何？",a:"体内の状態を一定に保つ働きだ。体温や血糖値が大きく変わらないように調節してる仕組みのことだぜ。"},{q:"血糖値を上げる・下げるホルモンが混乱する",a:"下げるのはインスリン1つだけ。上げるのは複数ある。『下げるのはインスリン』とまず押さえれば整理しやすいぜ。"},{q:"恒常性を調節する2つの仕組みは？",a:"自律神経とホルモンだ。神経は素早く、ホルモンはゆっくり長く効く。この2つで体内を一定に保ってるぜ。"},{q:"インスリンはどこから出るの？",a:"すい臓だ。すい臓から分泌されて血糖値を下げる。糖尿病はこのインスリンがうまく働かない病気だぜ。"},{q:"交感神経が働くと体はどうなる？",a:"心拍が上がり、興奮・緊張状態になる。『戦うか逃げるか』の体勢だ。逆に副交感神経はリラックス時に働くぜ。"}],
bio_04:[{q:"遷移の流れがイメージできない",a:"裸地→コケや草→低木→森林、と植物が移り変わっていくんだ。最後の安定した状態を極相(クライマックス)と呼ぶぜ。"},{q:"一次遷移と二次遷移の違いは？",a:"一次遷移は何もない裸地から、二次遷移は土が残った状態(山火事の跡など)から始まる。スタート地点が違うんだぜ。"},{q:"陽樹と陰樹の違いは？",a:"陽樹は日光が大好きで明るい所で育つ、陰樹は日陰でも育つ。遷移が進むと、最後は陰樹の森(極相)に落ち着くぜ。"},{q:"二次遷移が一次より速いのはなぜ？",a:"土や種、根が残ってるからだ。一からじゃなく途中からスタートできるので、森に戻るのが早いんだぜ。"},{q:"一次遷移の最初に現れるのは？",a:"地衣類やコケだ。岩だけの裸地でも生きられる丈夫な生き物。これらが土を作り、次の植物の道を開くんだぜ。"}],
bio_05:[{q:"生産者・消費者・分解者がごちゃごちゃ",a:"生産者=光合成で有機物を作る(植物)、消費者=食べる(動物)、分解者=死がいを分解(菌類)。役割で覚えろ。"},{q:"生態系のエネルギーはどこから来るの？",a:"元をたどると全部『太陽の光』だ。植物が光合成で取り込み、それを食べる動物へと受け渡されていくんだぜ。"},{q:"食物連鎖でエネルギーはどう流れる？",a:"生産者→草食動物→肉食動物、と一方向に流れる。食べる・食べられるの関係でエネルギーが受け渡されるんだぜ。"},{q:"生産者と消費者、数が多いのは？",a:"下にいる生産者ほど数や量が多い。植物がたくさんあって、それを食べる動物は少なめ。ピラミッド型になるんだぜ。"},{q:"炭素はどんな形で循環するの？",a:"二酸化炭素として大気と生物の間をめぐる。光合成で取り込まれ、呼吸で吐き出される。ぐるぐる回ってるんだぜ。"}],
phy_05:[{q:"電流と電圧の違いがピンとこない",a:"水で例えろ。電流=水が流れる量、電圧=水を押し出す力(圧力)、抵抗=流れにくさだ。電気を水の流れだと思えば分かりやすいぜ。"},{q:"V=IRをどう使い分けるか分からない",a:"求めたいものに合わせて式を変形しろ。電流ならI=V/R、抵抗ならR=V/Iだ。元はV=IR一本、それを割って変形するだけだぜ。"},{q:"直列回路の電流の特徴は？",a:"どこでも同じ大きさだ。一本道だから途中で電流が増減しない。電圧の方は各抵抗で分け合うことになるぜ。"},{q:"電力ってどう求めるの？",a:"電力=電圧×電流(P=VI)だ。単位はワット(W)。電気がどれだけ仕事をするかの勢いを表すぜ。"},{q:"電流2A、抵抗3Ωの電圧は？",a:"V=IRで2×3=6Vだ。オームの法則に数字を当てはめるだけ。3つのうち2つ分かれば残りが出るぜ。"}]
};

var UNIT_DATA={
  math1_01:{lesson:[{w:"reimu",t:"魔理沙、(x+3)(x−2) って書いてあるんだけど、これ何をすればいいの？",v:"魔理沙、エックスプラス3かけるエックスマイナス2って書いてあるんだけど、これ何をすればいいの？"},{w:"marisa",t:"まずはxの説明からだな。xは『まだ分かってない数』を表す文字だ。1でも5でも、何が入るか決まってない数の代わりに使うんだぜ。",v:"まずはエックスの説明からだな。エックスはまだ分かってない数を表す文字だ。1でも5でも、何が入るか決まってない数の代わりに使うんだぜ。"},{w:"reimu",t:"数の代わりの文字、ってことね。じゃあ (x+3) は？",v:"数の代わりの文字、ってことね。じゃあエックスプラス3は？"},{w:"marisa",t:"『xに3を足した数』って意味だ。(x+3)(x−2) は、その2つのかたまりを『かけ算』しろって言ってるんだぜ。",v:"エックスに3を足した数って意味だ。エックスプラス3かけるエックスマイナス2は、その2つのかたまりをかけ算しろって言ってるんだぜ。"},{w:"reimu",t:"かけ算か。でも普通の数のかけ算と違って、かっこが2つあるよ？",v:"かけ算か。でも普通の数のかけ算と違って、かっこが2つあるよ？"},{w:"marisa",t:"いいところに気づいたな。こういう時は『前のかっこの中の数を1つずつ、後ろのかっこの中の数すべてにかける』んだ。これを『展開』っていうぜ。",v:"いいところに気づいたな。こういう時は前のかっこの中の数を1つずつ、後ろのかっこの中の数すべてにかける。これを展開っていうぜ。"},{w:"reimu",t:"1つずつ全部にかける…ちょっとゆっくりやってみて。",v:"1つずつ全部にかける、ちょっとゆっくりやってみて。"},{w:"marisa",t:"いいぜ。前のかっこには x と +3 がある。まずxの方からだ。x×x=x²（エックスの2乗）、x×(−2)=−2x。",v:"いいぜ。前のかっこにはエックスとプラス3がある。まずエックスの方からだ。エックスかけるエックスはエックスの2乗、エックスかけるマイナス2はマイナス2エックス。"},{w:"reimu",t:"x² って何？",v:"エックスの2乗って何？"},{w:"marisa",t:"x×x、つまり同じ数を2回かけたって意味だ。3²なら3×3=9だろ。x²はそれの文字バージョンだぜ。",v:"エックスかけるエックス、つまり同じ数を2回かけたって意味だ。3の2乗なら3かける3で9だろ。エックスの2乗はそれの文字バージョンだぜ。"},{w:"reimu",t:"なるほど！次は+3の方ね。",v:"なるほど！次はプラス3の方ね。"},{w:"marisa",t:"そうだ。3×x=3x、3×(−2)=−6。これで4つの答えが出たぜ：x²、−2x、3x、−6。",v:"そうだ。3かけるエックスは3エックス、3かけるマイナス2はマイナス6。これで4つの答えが出たぜ。エックスの2乗、マイナス2エックス、3エックス、マイナス6。"},{w:"reimu",t:"4つも出てくるんだ。これ全部使うの？",v:"4つも出てくるんだ。これ全部使うの？"},{w:"marisa",t:"使うぜ。出てきた4つを全部プラスでつなげる：x²−2x+3x−6。最後にもう一つだけ作業があるんだ。",v:"使うぜ。出てきた4つを全部プラスでつなげる。エックスの2乗マイナス2エックスプラス3エックスマイナス6。最後にもう一つだけ作業があるんだ。"},{w:"reimu",t:"−2x と 3x、なんか似てるね。",v:"マイナス2エックスと3エックス、なんか似てるね。"},{w:"marisa",t:"そこだ！xが1個ついてる項どうしは、まとめて計算できる。−2x+3x=1x、つまりxだ。これを『同じ仲間の項をまとめる』って言うんだぜ。",v:"そこだ！エックスが1個ついてる項どうしは、まとめて計算できる。マイナス2エックスプラス3エックスはプラス1エックス、つまりエックスだ。これを同じ仲間の項をまとめるって言うんだぜ。"},{w:"reimu",t:"じゃあ答えは x²+x−6 ってこと？",v:"じゃあ答えはエックスの2乗プラスエックスマイナス6ってこと？"},{w:"marisa",t:"正解だ！(x+3)(x−2) を展開すると x²+x−6 になる。よくできたな。",v:"正解だ！エックスプラス3かけるエックスマイナス2を展開すると、エックスの2乗プラスエックスマイナス6になる。よくできたな。"},{w:"reimu",t:"展開はわかった！じゃあ『因数分解』っていうのは？",v:"展開はわかった！じゃあ因数分解っていうのは？"},{w:"marisa",t:"今やった展開の、ちょうど逆の作業だ。x²+x−6 みたいな形から、元の (x+3)(x−2) を見つけ出すんだぜ。",v:"今やった展開の、ちょうど逆の作業だ。エックスの2乗プラスエックスマイナス6みたいな形から、元のエックスプラス3かけるエックスマイナス2を見つけ出すんだぜ。"},{w:"reimu",t:"逆から探すなんて難しそう…。",v:"逆から探すなんて難しそう。"},{w:"marisa",t:"コツがあるから大丈夫だ。最後の数(−6)に注目する。『かけて−6になる2つの数』をいくつか考えてみるんだ。",v:"コツがあるから大丈夫だ。最後の数、マイナス6に注目する。かけてマイナス6になる2つの数をいくつか考えてみるんだ。"},{w:"reimu",t:"1と−6、2と−3、3と−2…色々あるね。",v:"1とマイナス6、2とマイナス3、3とマイナス2、色々あるね。"},{w:"marisa",t:"その中から、足すと真ん中の数(+1)になる組を選ぶ。3と−2を足すと1になるだろ？だから答えは+3と−2だ。",v:"その中から、足すと真ん中の数プラス1になる組を選ぶ。3とマイナス2を足すと1になるだろ。だから答えはプラス3とマイナス2だ。"},{w:"reimu",t:"見つけた2つの数を、そのままかっこに入れればいいの？",v:"見つけた2つの数を、そのままかっこに入れればいいの？"},{w:"marisa",t:"その通り！(x+3)(x−2)、さっき展開する前の形にちゃんと戻ったぜ。展開と因数分解は表と裏みたいな関係なんだ。",v:"その通り！エックスプラス3かけるエックスマイナス2、さっき展開する前の形にちゃんと戻ったぜ。展開と因数分解は表と裏みたいな関係なんだ。"},{w:"reimu",t:"よく出てくる形を覚えておくと早そうだね。",v:"よく出てくる形を覚えておくと早そうだね。"},{w:"marisa",t:"そうだ。(a+b)²=a²+2ab+b² と (a+b)(a−b)=a²−b² の2つは特によく出る。今は『そういう形がある』ってだけ覚えておけば十分だぜ。",v:"そうだ。エープラスビーの2乗と、和と差の積の2つは特によく出る。今はそういう形があるってだけ覚えておけば十分だぜ。"},{w:"reimu",t:"最初は難しく見えたけど、1つずつ順番にやればできそう！",v:"最初は難しく見えたけど、1つずつ順番にやればできそう！"},{w:"marisa",t:"その通りだ。焦らず『1つずつ全部にかける』『仲間をまとめる』を繰り返すだけだぜ。慣れたら問題にチャレンジしてみろ。",v:"その通りだ。焦らず1つずつ全部にかける、仲間をまとめるを繰り返すだけだぜ。慣れたら問題にチャレンジしてみろ。"}],quiz:[{q:"(x+1)(x+2) を展開すると？",cs:["x²+3x+2","x²+2x+1","x²+x+2","x²+3x+1"],a:0,f:"前のかっこのx,1を、後ろのx,2それぞれにかける。x²+2x+x+2となり、xの項をまとめてx²+3x+2だぜ。",d:1},{q:"(x+5)(x−5) を展開すると？",cs:["x²−25","x²+25","x²−10x+25","x²+10x"],a:0,f:"+5と−5みたいに『同じ数のプラスとマイナス』のペアは、真ん中の項が消えてx²−25だけになるんだ。",d:1},{q:"(x+3)² を展開すると？",cs:["x²+6x+9","x²+9","x²+3x+9","x²+6x+3"],a:0,f:"(x+3)²は(x+3)(x+3)と同じ。2×x×3=6xが中央項。x²+6x+9だぜ。²だけ足すミスに注意だ。",d:1},{q:"x²+5x+6 を因数分解すると？",cs:["(x+2)(x+3)","(x+1)(x+6)","(x−2)(x−3)","(x+5)(x+1)"],a:0,f:"かけて+6、足して+5になる2数を探す。2と3だ。だから(x+2)(x+3)だぜ。",d:2},{q:"x²−7x+12 を因数分解すると？",cs:["(x−3)(x−4)","(x+3)(x+4)","(x−2)(x−6)","(x−1)(x−12)"],a:0,f:"かけて+12、足して−7。両方マイナスの−3と−4だ。符号に注意して(x−3)(x−4)だぜ。",d:2},{q:"x²−9 を因数分解すると？",cs:["(x+3)(x−3)","(x−3)²","(x+9)(x−1)","(x+3)²"],a:0,f:"9=3²だからa²−b²の形。(x+3)(x−3)だ。2乗の差は和と差の積になるぜ。",d:2},{q:"2x²+7x+3 を因数分解すると？",cs:["(2x+1)(x+3)","(2x+3)(x+1)","(x+1)(x+3)","(2x+7)(x+3)"],a:0,f:"たすき掛けを使う。2xと1、xと3を組むと、2x×3+1×x=7xで中央項に一致。(2x+1)(x+3)だぜ。",d:3},{q:"x²+2xy+y²−1 を因数分解すると？",cs:["(x+y+1)(x+y−1)","(x+y)²のみ","(x+1)(y−1)","(x+y−1)²"],a:0,f:"x²+2xy+y²=(x+y)²とまとめる。すると(x+y)²−1²で和と差の積。(x+y+1)(x+y−1)だぜ。",d:3},{q:"(2x+1)(3x−4) を展開すると？",cs:["6x²−5x−4","6x²+5x−4","6x²−5x+4","5x²−5x−4"],a:0,f:"2x×3x=6x²、2x×(−4)=−8x、1×3x=3x、1×(−4)=−4。−8x+3x=−5xをまとめて6x²−5x−4だぜ。",d:3},{q:"x²−x−12 を因数分解すると？",cs:["(x−4)(x+3)","(x+4)(x−3)","(x−2)(x+6)","(x−6)(x+2)"],a:0,f:"かけて−12、足して−1になる2数は−4と+3。だから(x−4)(x+3)だぜ。符号違いの組を慌てず探すんだ。",d:3}]},
  math1_02:{lesson:[{w:"reimu",t:"魔理沙、√12 ってこの記号、そもそも何なの？",v:"魔理沙、ルート12ってこの記号、そもそも何なの？"},{w:"marisa",t:"√（ルート）は『2回かけたらその数になる、プラスの数』を表す記号だ。√9なら、2回かけて9になる数、つまり3だぜ。",v:"ルートは、2回かけたらその数になる、プラスの数を表す記号だ。ルート9なら、2回かけて9になる数、つまり3だぜ。"},{w:"reimu",t:"3×3=9だから√9=3、ってことね。じゃあ√12は？",v:"3かける3は9だからルート9は3、ってことね。じゃあルート12は？"},{w:"marisa",t:"12は『2回かけてちょうど12になる、きれいな数』が無いんだ。だから√12のままが正確な答えになる。",v:"12は2回かけてちょうど12になる、きれいな数が無いんだ。だからルート12のままが正確な答えになる。"},{w:"reimu",t:"じゃあ√12ってこれ以上どうしようもないの？",v:"じゃあルート12ってこれ以上どうしようもないの？"},{w:"marisa",t:"いや、もっと『簡単な形』にはできるんだ。12を『きれいな数×残り』に分けるのがコツだぜ。12=4×3だな。",v:"いや、もっと簡単な形にはできるんだ。12をきれいな数かける残りに分けるのがコツだぜ。12は4かける3だな。"},{w:"reimu",t:"4は2×2だから、さっき言ってた『きれいな数』だね。",v:"4は2かける2だから、さっき言ってたきれいな数だね。"},{w:"marisa",t:"その通り！これを『平方数』って呼ぶぜ。√4=2だから、この2だけルートの外に出してやれる。",v:"その通り！これを平方数って呼ぶぜ。ルート4は2だから、この2だけルートの外に出してやれる。"},{w:"reimu",t:"外に出すって、どういうこと？",v:"外に出すって、どういうこと？"},{w:"marisa",t:"√12=√4×√3=2×√3=2√3 ってことだ。4の部分だけ『2』という普通の数になって、ルートの前に出てくるんだぜ。",v:"ルート12はルート4かけるルート3、イコール2かけるルート3、イコール2ルート3ってことだ。4の部分だけ普通の数の2になって、ルートの前に出てくるんだぜ。"},{w:"reimu",t:"だから √12 = 2√3 になるのね！平方数を見つけるのがポイントなんだ。",v:"だからルート12イコール2ルート3になるのね！平方数を見つけるのがポイントなんだ。"},{w:"marisa",t:"そうだ。4,9,16,25…が平方数だ。ルートの中にこれらの数が隠れてないか探す癖をつけろよ。",v:"そうだ。4、9、16、25が平方数だ。ルートの中にこれらの数が隠れてないか探す癖をつけろよ。"},{w:"reimu",t:"わかった！次は何を勉強するの？",v:"わかった！次は何を勉強するの？"},{w:"marisa",t:"今度は分母にルートがある場合だ。例えば 1/√2 。このままだと計算しにくいから『有理化』するんだぜ。",v:"今度は分母にルートがある場合だ。例えば1分のルート2。このままだと計算しにくいから有理化するんだぜ。"},{w:"reimu",t:"有理化って何？",v:"有理化って何？"},{w:"marisa",t:"分母のルートを消して、整数にする操作だ。分母と分子の両方に同じ√2をかけるんだぜ。",v:"分母のルートを消して、整数にする操作だ。分母と分子の両方に同じルート2をかけるんだぜ。"},{w:"reimu",t:"両方に同じ数をかけたら、値は変わらないままなんだよね？",v:"両方に同じ数をかけたら、値は変わらないままなんだよね？"},{w:"marisa",t:"そうだ。分数は分母と分子に同じ数をかけても大きさは変わらない。1/√2 × √2/√2 = √2/2 になるぜ。",v:"そうだ。分数は分母と分子に同じ数をかけても大きさは変わらない。1分のルート2かけるルート2分のルート2はルート2分の2になるぜ。"},{w:"reimu",t:"分母が√2×√2=2になって、整数になった！",v:"分母がルート2かけるルート2で2になって、整数になった！"},{w:"marisa",t:"そういうことだ。分母が整数になると、その後の計算が楽になるんだぜ。これが有理化のメリットだ。",v:"そういうことだ。分母が整数になると、その後の計算が楽になるんだぜ。これが有理化のメリットだ。"},{w:"reimu",t:"ルートの計算は『中の平方数を見つけて外に出す』と『分母のルートをなくす』が基本ってことね！",v:"ルートの計算は、中の平方数を見つけて外に出す、と、分母のルートをなくす、が基本ってことね！"},{w:"marisa",t:"完璧な理解だ。この2つさえ押さえれば、ルートの計算問題はだいたい解けるようになるぜ。",v:"完璧な理解だ。この2つさえ押さえれば、ルートの計算問題はだいたい解けるようになるぜ。"}],quiz:[{q:"√8 を簡単にすると？",cs:["2√2","4√2","2√4","8"],a:0,f:"8=4×2と分ける。√4=2を外に出して2√2だ。平方数の4を見つけるのがコツだぜ。",d:1},{q:"√18 を簡単にすると？",cs:["3√2","2√3","9√2","3√3"],a:0,f:"18=9×2、√9=3を外に出して3√2だ。9が平方数だと気づけるかがポイントだぜ。",d:1},{q:"√2×√3 は？",cs:["√6","√5","6","√23"],a:0,f:"√a×√b=√(ab)の公式。√2×√3=√6だ。中身どうしをかけるんだぜ。",d:1},{q:"1/√3 を有理化すると？",cs:["√3/3","√3","1/3","3/√3"],a:0,f:"分母分子に√3をかける。分子は√3、分母は√3×√3=3。だから√3/3だぜ。",d:2},{q:"√50−√18 は？",cs:["2√2","√32","8√2","√68"],a:0,f:"√50=5√2、√18=3√2。同じ√2どうしなので5√2−3√2=2√2だ。ルートを揃えるのが鍵だぜ。",d:2},{q:"(√5+√2)(√5−√2) は？",cs:["3","7","√10","√3"],a:0,f:"和と差の積=(√5)²−(√2)²=5−2=3だ。ルートが2乗で外れるのが気持ちいいぜ。",d:2},{q:"2/(√3−1) を有理化すると？",cs:["√3+1","√3−1","2√3","(√3+1)/2"],a:0,f:"分母分子に(√3+1)をかける。分母は(√3)²−1²=3−1=2。分子は2(√3+1)。約分して√3+1だぜ。",d:3},{q:"√(7+2√10) を簡単にすると？",cs:["√5+√2","√7+√2","√10+1","√5+√3"],a:0,f:"二重根号だ。7=5+2、2√10=2√(5×2)と見ると(√5+√2)²の形。だから√5+√2だぜ。",d:3}]},
  math1_03:{lesson:[{w:"reimu",t:"魔理沙、2x+3<7 の『<』ってどういう意味？",v:"魔理沙、2エックスプラス3小なり7の小なりってどういう意味？"},{w:"marisa",t:"『<』は不等号だ。『左の方が右より小さい』って意味だぜ。2x+3<7は『2x+3は7より小さい』ってことだ。",v:"小なりは不等号だ。左の方が右より小さいって意味だぜ。2エックスプラス3小なり7は、2エックスプラス3は7より小さい、ってことだ。"},{w:"reimu",t:"イコールじゃなくて、範囲を表してるんだね。",v:"イコールじゃなくて、範囲を表してるんだね。"},{w:"marisa",t:"そうだ。これを『不等式』と呼ぶ。普通の方程式（イコールの式）とほとんど同じやり方で解けるぜ。",v:"そうだ。これを不等式と呼ぶ。普通の方程式、イコールの式とほとんど同じやり方で解けるぜ。"},{w:"reimu",t:"方程式のときは、移項してxだけにしたよね。",v:"方程式のときは、移項してエックスだけにしたよね。"},{w:"marisa",t:"その通り。まず+3を右に移項する。移項は『反対側に移すとき符号が反転する』ってルールだったな。",v:"その通り。まずプラス3を右に移項する。移項は反対側に移すとき符号が反転する、ってルールだったな。"},{w:"reimu",t:"だから 2x<7−3、つまり2x<4になるのね。",v:"だから2エックス小なり7マイナス3、つまり2エックス小なり4になるのね。"},{w:"marisa",t:"次は両辺を2で割る。xの前についてる数（係数）を消して、x単独の形にするんだ。x<2が答えだ。",v:"次は両辺を2で割る。エックスの前についてる数、係数を消して、エックス単独の形にするんだ。エックス小なり2が答えだ。"},{w:"reimu",t:"ここまでは方程式と全く同じ手順だったね。",v:"ここまでは方程式と全く同じ手順だったね。"},{w:"marisa",t:"そうだ。でも不等式には方程式に無い『注意点』が1つだけある。これがすごく重要だ。",v:"そうだ。でも不等式には方程式に無い注意点が1つだけある。これがすごく重要だ。"},{w:"reimu",t:"注意点？教えて！",v:"注意点？教えて！"},{w:"marisa",t:"負の数をかけたり、負の数で割ったりするときだけ、不等号の向きがひっくり返るんだ。",v:"負の数をかけたり、負の数で割ったりするときだけ、不等号の向きがひっくり返るんだ。"},{w:"reimu",t:"ひっくり返るって、<が>になるってこと？",v:"ひっくり返るって、小なりが大なりになるってこと？"},{w:"marisa",t:"そうだ。例えば −2x<4 を解くとき、両辺を−2で割る。すると x>−2 と、向きが逆になるんだぜ。",v:"そうだ。例えばマイナス2エックス小なり4を解くとき、両辺をマイナス2で割る。するとエックス大なりマイナス2と、向きが逆になるんだぜ。"},{w:"reimu",t:"なんでひっくり返るの？感覚的に納得したいな。",v:"なんでひっくり返るの？感覚的に納得したいな。"},{w:"marisa",t:"数直線で考えるとわかりやすいぜ。3>2 は正しいよな。両辺に−1をかけると −3 と −2 になる。",v:"数直線で考えるとわかりやすいぜ。3大なり2は正しいよな。両辺にマイナス1をかけるとマイナス3とマイナス2になる。"},{w:"reimu",t:"−3 と −2 なら、−3の方が小さいよね。数直線だと左にあるから。",v:"マイナス3とマイナス2なら、マイナス3の方が小さいよね。数直線だと左にあるから。"},{w:"marisa",t:"その通り！3>2 だったのに、マイナスをかけたら −3<−2 に変わった。これが『負の数をかけると向きが逆になる』正体だ。",v:"その通り！3大なり2だったのに、マイナスをかけたらマイナス3小なりマイナス2に変わった。これが負の数をかけると向きが逆になる正体だ。"},{w:"reimu",t:"なるほど、プラスの世界とマイナスの世界で『大きい・小さい』が逆転するんだね！",v:"なるほど、プラスの世界とマイナスの世界で大きい小さいが逆転するんだね！"},{w:"marisa",t:"いい理解だ。だから不等式を解くときは『今、負の数をかけたか・割ったか』を毎回チェックする癖をつけろよ。",v:"いい理解だ。だから不等式を解くときは、今、負の数をかけたか割ったかを毎回チェックする癖をつけろよ。"},{w:"reimu",t:"プラスの数をかける・割るときは向きそのまま、マイナスのときだけ逆。覚えた！",v:"プラスの数をかける、割るときは向きそのまま、マイナスのときだけ逆。覚えた！"}],quiz:[{q:"x+3<8 を解くと？",cs:["x<5","x>5","x<11","x>11"],a:0,f:"+3を右に移項してx<8−3=5。正の操作だけだから向きはそのままだぜ。",d:1},{q:"2x>6 を解くと？",cs:["x>3","x<3","x>12","x>6"],a:0,f:"両辺を正の数2で割る。x>3だ。正で割るときは向きは変わらないぜ。",d:1},{q:"−x<2 を解くと？",cs:["x>−2","x<−2","x>2","x<2"],a:0,f:"両辺に−1をかける(負の操作)。向きが逆転してx>−2だ。ここが最重要ポイントだぜ。",d:1},{q:"3x−1≦5 を解くと？",cs:["x≦2","x≧2","x≦4","x≦6"],a:0,f:"−1を移項して3x≦6、両辺を3で割ってx≦2だ。等号付きはそのまま残すぜ。",d:2},{q:"−2x+1>5 を解くと？",cs:["x<−2","x>−2","x<2","x>2"],a:0,f:"1を移項して−2x>4。負の−2で割るので向きが逆転、x<−2だぜ。",d:2},{q:"2(x−1)<x+3 を解くと？",cs:["x<5","x>5","x<1","x<4"],a:0,f:"展開して2x−2<x+3。xを左、数を右に集めてx<5だ。かっこを先に開くんだぜ。",d:2},{q:"連立 x>1 かつ x<4 の範囲は？",cs:["1<x<4","x>4","x<1","すべての実数"],a:0,f:"両方を同時に満たす範囲を数直線で考える。重なる部分が1<x<4だぜ。",d:3},{q:"|x|<3 を解くと？",cs:["−3<x<3","x<3","x>−3","x>3"],a:0,f:"絶対値が3未満=原点から距離3以内。だから−3<x<3だ。|x|<aは−a<x<aだぜ。",d:3}]},
  math1_05:{lesson:[{w:"reimu",t:"魔理沙、二次関数の『最大・最小』って、そもそも何を求めてるの？",v:"魔理沙、二次関数の最大最小って、そもそも何を求めてるの？"},{w:"marisa",t:"二次関数のグラフは『放物線』っていう、お椀みたいな形をしてる。その一番低い点か一番高い点を探すのが最大・最小だぜ。",v:"二次関数のグラフは放物線っていう、お椀みたいな形をしてる。その一番低い点か一番高い点を探すのが最大最小だぜ。"},{w:"reimu",t:"お椀の底とか、お椀をひっくり返した形の頂点ってことね。",v:"お椀の底とか、お椀をひっくり返した形の頂点ってことね。"},{w:"marisa",t:"そうだ。その一番低い・高い点を『頂点』と呼ぶ。まずこの頂点を見つけるのが最初の作業だぜ。",v:"そうだ。その一番低い、高い点を頂点と呼ぶ。まずこの頂点を見つけるのが最初の作業だぜ。"},{w:"reimu",t:"頂点はどうやって見つけるの？",v:"頂点はどうやって見つけるの？"},{w:"marisa",t:"『平方完成』っていう変形を使う。y=x²−4x+1 を y=(x−2)²−3 の形に変えるんだ。",v:"平方完成っていう変形を使う。ワイイコールエックス2乗マイナス4エックスプラス1を、ワイイコールエックスマイナス2の2乗マイナス3の形に変えるんだ。"},{w:"reimu",t:"y=(x−2)²−3 になると、何がわかるの？",v:"ワイイコールエックスマイナス2の2乗マイナス3になると、何がわかるの？"},{w:"marisa",t:"この形になれば、頂点の座標が(2,−3)だってすぐわかるんだ。かっこの中の数の符号を逆にしたものがx座標、最後の数がy座標だぜ。",v:"この形になれば、頂点の座標が2、マイナス3だってすぐわかるんだ。かっこの中の数の符号を逆にしたものがエックス座標、最後の数がワイ座標だぜ。"},{w:"reimu",t:"頂点がわかったら、それが最大か最小かはどう決まるの？",v:"頂点がわかったら、それが最大か最小かはどう決まるの？"},{w:"marisa",t:"グラフの形を見るんだ。x²の前の数（係数）がプラスなら『下に凸』、お椀型で頂点が一番低い点になる。だから頂点が最小値だぜ。",v:"グラフの形を見るんだ。エックスの2乗の前の数、係数がプラスなら下に凸、お椀型で頂点が一番低い点になる。だから頂点が最小値だぜ。"},{w:"reimu",t:"逆にマイナスだったら？",v:"逆にマイナスだったら？"},{w:"marisa",t:"『上に凸』、お椀をひっくり返した形になって、頂点が一番高い点になる。この場合は頂点が最大値だぜ。",v:"上に凸、お椀をひっくり返した形になって、頂点が一番高い点になる。この場合は頂点が最大値だぜ。"},{w:"reimu",t:"y=x²−4x+1 は係数が+1だから下に凸、頂点で最小ってことね。",v:"ワイイコールエックス2乗マイナス4エックスプラス1は係数がプラス1だから下に凸、頂点で最小ってことね。"},{w:"marisa",t:"その通り。頂点(2,−3)で最小値は−3。下に凸のグラフはどんどん上に伸びていくだけだから、最大値は無いんだぜ。",v:"その通り。頂点2、マイナス3で最小値はマイナス3。下に凸のグラフはどんどん上に伸びていくだけだから、最大値は無いんだぜ。"},{w:"reimu",t:"xの範囲が決まっているときは、何か変わるの？",v:"エックスの範囲が決まっているときは、何か変わるの？"},{w:"marisa",t:"変わるぜ。範囲が決まっているときは『頂点の値』と『範囲の両端の値』、両方を比べて一番大きい・小さいものを探すんだ。",v:"変わるぜ。範囲が決まっているときは頂点の値と範囲の両端の値、両方を比べて一番大きい、小さいものを探すんだ。"},{w:"reimu",t:"なんで端っこも調べないといけないの？",v:"なんで端っこも調べないといけないの？"},{w:"marisa",t:"範囲を区切ると、グラフの一部分しか見なくなるからだ。頂点がその範囲の外に出てしまうこともあるんだぜ。",v:"範囲を区切ると、グラフの一部分しか見なくなるからだ。頂点がその範囲の外に出てしまうこともあるんだぜ。"},{w:"reimu",t:"頂点が範囲の中にあるか外にあるかで、調べ方が変わるんだね。",v:"頂点が範囲の中にあるか外にあるかで、調べ方が変わるんだね。"},{w:"marisa",t:"そうだ。だから『まずグラフをざっくり描いてみる』のが一番のコツだぜ。絵にすれば、どこが一番高い・低いか一目でわかる。",v:"そうだ。だからまずグラフをざっくり描いてみるのが一番のコツだぜ。絵にすれば、どこが一番高い、低いか一目でわかる。"},{w:"reimu",t:"平方完成で頂点を出して、グラフを描いて、範囲の端もチェックする。これが最大・最小の手順なんだね！",v:"平方完成で頂点を出して、グラフを描いて、範囲の端もチェックする。これが最大最小の手順なんだね！"}],quiz:[{q:"y=x²の最小値は？",cs:["0","1","−1","なし"],a:0,f:"頂点が原点(0,0)。下に凸なので頂点で最小、最小値は0だぜ。",d:1},{q:"y=x²+2 の最小値は？",cs:["2","0","−2","なし"],a:0,f:"頂点は(0,2)。下に凸で頂点が最小だから最小値は2だぜ。",d:1},{q:"y=−x²の最大値は？",cs:["0","なし","1","−1"],a:0,f:"上に凸の放物線。頂点(0,0)が一番高いので最大値0だ。最小はないぜ。",d:1},{q:"y=(x−1)²+3 の最小値は？",cs:["3","1","4","−3"],a:0,f:"すでに平方完成済み。頂点(1,3)、下に凸なので最小値は3だぜ。",d:2},{q:"y=x²−2x の最小値は？",cs:["−1","0","1","2"],a:0,f:"(x−1)²−1と平方完成。頂点(1,−1)で最小値−1だぜ。",d:2},{q:"y=−x²+4x の最大値は？",cs:["4","2","0","−4"],a:0,f:"−(x−2)²+4と変形。上に凸で頂点(2,4)、最大値4だぜ。",d:2},{q:"0≦x≦3でy=x²−2xの最大値は？",cs:["3","−1","0","9"],a:0,f:"頂点x=1は範囲内で最小。最大は端で比較。x=0でy=0、x=3でy=3。最大は3だぜ。",d:3},{q:"y=x²−2ax(0≦x≦1)で頂点が範囲内になるaの条件は？",cs:["0≦a≦1","a<0","a>1","a=0のみ"],a:0,f:"頂点のx座標はa。これが0≦x≦1の中にある条件は0≦a≦1だぜ。",d:3}]},
  math1_06:{lesson:[{w:"reimu",t:"魔理沙、データの『平均』ってただ足して個数で割るだけだよね？",v:"魔理沙、データの平均ってただ足して個数で割るだけだよね？"},{w:"marisa",t:"そうだ。例えば2,4,6なら、2+4+6=12を3個で割って、平均は4だ。ここは大丈夫だな。",v:"そうだ。例えば2,4,6なら、2足す4足す6は12を3個で割って、平均は4だ。ここは大丈夫だな。"},{w:"reimu",t:"うん、それは簡単。でも平均だけだと足りないことがあるって聞いたよ。",v:"うん、それは簡単。でも平均だけだと足りないことがあるって聞いたよ。"},{w:"marisa",t:"いいところに気づいたな。例えば『3,4,5』と『1,4,7』、どっちも平均は4だ。でも様子は全然違うだろ？",v:"いいところに気づいたな。例えば3,4,5と1,4,7、どっちも平均は4だ。でも様子は全然違うだろ？"},{w:"reimu",t:"確かに。1,4,7の方が数がバラバラに散らばってるね。",v:"確かに。1,4,7の方が数がバラバラに散らばってるね。"},{w:"marisa",t:"その『散らばり具合』を数字で表すのが『分散』だ。平均だけじゃ見えない情報を教えてくれるんだぜ。",v:"その散らばり具合を数字で表すのが分散だ。平均だけじゃ見えない情報を教えてくれるんだぜ。"},{w:"reimu",t:"分散ってどうやって計算するの？",v:"分散ってどうやって計算するの？"},{w:"marisa",t:"まず各データから平均を引く。これを『偏差』っていうんだ。データが平均よりどれだけ離れてるかを表すぜ。",v:"まず各データから平均を引く。これを偏差っていうんだ。データが平均よりどれだけ離れてるかを表すぜ。"},{w:"reimu",t:"偏差を全部足せば、散らばりがわかりそうだね。",v:"偏差を全部足せば、散らばりがわかりそうだね。"},{w:"marisa",t:"それがダメなんだ。偏差にはプラスとマイナスがあって、全部足すと必ず0になっちまう。",v:"それがダメなんだ。偏差にはプラスとマイナスがあって、全部足すと必ず0になっちまう。"},{w:"reimu",t:"なんで0になるの？",v:"なんで0になるの？"},{w:"marisa",t:"平均より大きい分と小さい分が、ちょうど打ち消し合うようにできてるからだ。平均ってそういう性質を持ってるんだぜ。",v:"平均より大きい分と小さい分が、ちょうど打ち消し合うようにできてるからだ。平均ってそういう性質を持ってるんだぜ。"},{w:"reimu",t:"じゃあどうやって散らばりを測るの？",v:"じゃあどうやって散らばりを測るの？"},{w:"marisa",t:"偏差を『2乗』するんだ。2乗すればマイナスもプラスに変わるから、打ち消し合わなくなる。",v:"偏差を2乗するんだ。2乗すればマイナスもプラスに変わるから、打ち消し合わなくなる。"},{w:"reimu",t:"2乗した偏差を、それからどうするの？",v:"2乗した偏差を、それからどうするの？"},{w:"marisa",t:"その平均を取る。これが『分散』の定義だ：偏差を2乗して、それの平均を取ったものだぜ。",v:"その平均を取る。これが分散の定義だ。偏差を2乗して、それの平均を取ったものだぜ。"},{w:"reimu",t:"分散が大きいほど、データはバラバラに散らばってるってことだね。",v:"分散が大きいほど、データはバラバラに散らばってるってことだね。"},{w:"marisa",t:"そうだ。ただ分散には1つ困った点がある。2乗してるから、単位も2乗されちまうんだ。",v:"そうだ。ただ分散には1つ困った点がある。2乗してるから、単位も2乗されちまうんだ。"},{w:"reimu",t:"単位が2乗って、どういうこと？",v:"単位が2乗って、どういうこと？"},{w:"marisa",t:"例えば身長(cm)のデータなら、分散の単位はcm²になっちまう。これだと元のデータと比べづらいだろ。",v:"例えば身長センチメートルのデータなら、分散の単位はセンチメートルの2乗になっちまう。これだと元のデータと比べづらいだろ。"},{w:"reimu",t:"だから元に戻す必要があるんだね。",v:"だから元に戻す必要があるんだね。"},{w:"marisa",t:"そこで分散の正の平方根を取る。これが『標準偏差』だ。2乗を平方根で打ち消して、元の単位に戻すんだぜ。",v:"そこで分散の正の平方根を取る。これが標準偏差だ。2乗を平方根で打ち消して、元の単位に戻すんだぜ。"},{w:"reimu",t:"平均で『真ん中』を見て、分散・標準偏差で『散らばり』を見る。これがデータ分析の基本なんだね！",v:"平均で真ん中を見て、分散、標準偏差で散らばりを見る。これがデータ分析の基本なんだね！"}],quiz:[{q:"2,4,6 の平均は？",cs:["4","3","6","12"],a:0,f:"全部足して個数で割る。(2+4+6)÷3=12÷3=4だぜ。",d:1},{q:"分散が表すものは？",cs:["散らばり具合","最大値","合計","中央値"],a:0,f:"分散はデータが平均からどれだけ離れて散らばっているかを表す値だぜ。",d:1},{q:"標準偏差は分散の何？",cs:["正の平方根","2乗","2倍","逆数"],a:0,f:"分散の正の平方根が標準偏差。2乗で広がった単位を元に戻すんだぜ。",d:1},{q:"1,2,3 の分散は？",cs:["2/3","1","2","3"],a:0,f:"平均は2。偏差は−1,0,1。2乗して1,0,1。平均は(1+0+1)/3=2/3だぜ。",d:2},{q:"中央値とは？",cs:["中央に来る値","平均値","最頻値","最大値"],a:0,f:"データを小さい順に並べたとき真ん中に来る値。極端な値に強いんだぜ。",d:2},{q:"最頻値とは？",cs:["最も多い値","真ん中の値","平均","範囲"],a:0,f:"最も多く現れる値が最頻値(モード)。データの山の位置を表すぜ。",d:2},{q:"相関係数が表すのは？",cs:["2変数の直線的関係","平均の差","分散の和","中央値"],a:0,f:"2つの量の直線的な関係の強さ。−1〜1の値で、1に近いほど強い正の相関だぜ。",d:3},{q:"四分位範囲とは？",cs:["第3四分位−第1四分位","最大−最小","平均±標準偏差","中央値の2倍"],a:0,f:"Q3−Q1のこと。データの中央50%の散らばりを表し、外れ値に強いぜ。",d:3}]},
  mathA_01:{lesson:[{w:"reimu",t:"魔理沙、5人から3人選ぶ方法って何通りあるの？",v:"魔理沙、5人から3人選ぶ方法って何通りあるの？"},{w:"marisa",t:"こういう『何通り？』の問題で一番大事なのは、まず『順番を区別するかどうか』を確認することだぜ。",v:"こういう何通りの問題で一番大事なのは、まず順番を区別するかどうかを確認することだぜ。"},{w:"reimu",t:"順番を区別するかどうかで、何が変わるの？",v:"順番を区別するかどうかで、何が変わるの？"},{w:"marisa",t:"例えば『1位、2位、3位を決める』なら、同じ3人でも順番が違えば別の結果になる。これが『順列』だ。",v:"例えば1位、2位、3位を決めるなら、同じ3人でも順番が違えば別の結果になる。これが順列だ。"},{w:"reimu",t:"逆に、ただ『3人選ぶ』だけなら？",v:"逆に、ただ3人選ぶだけなら？"},{w:"marisa",t:"その場合は誰が1番とか関係ない。選ばれた3人が同じなら、選んだ順番が違っても同じ結果だ。これが『組合せ』だぜ。",v:"その場合は誰が1番とか関係ない。選ばれた3人が同じなら、選んだ順番が違っても同じ結果だ。これが組合せだぜ。"},{w:"reimu",t:"今回の『5人から3人選ぶ』は、ただ選ぶだけだから組合せだね。",v:"今回の5人から3人選ぶは、ただ選ぶだけだから組合せだね。"},{w:"marisa",t:"その通り！組合せは記号Cを使って5C3と書く。これは『5個の中から3個選ぶ組合せの数』って意味だぜ。",v:"その通り！組合せは記号シーを使って5シー3と書く。これは5個の中から3個選ぶ組合せの数って意味だぜ。"},{w:"reimu",t:"5C3 は具体的にどう計算するの？",v:"5シー3は具体的にどう計算するの？"},{w:"marisa",t:"分子に『5から始めて3個分かけた数』、分母に『3の階乗（3×2×1）』を置く。5×4×3を3×2×1で割るんだ。",v:"分子に5から始めて3個分かけた数、分母に3の階乗、3かける2かける1を置く。5かける4かける3を3かける2かける1で割るんだ。"},{w:"reimu",t:"なんで分母で割る必要があるの？",v:"なんで分母で割る必要があるの？"},{w:"marisa",t:"5×4×3=60っていうのは『順番も区別した』数なんだ。同じ3人の選び方が、並び替えの数だけ重複して数えられちまう。",v:"5かける4かける3イコール60っていうのは、順番も区別した数なんだ。同じ3人の選び方が、並び替えの数だけ重複して数えられちまう。"},{w:"reimu",t:"重複してる分を、割って消すってことね。",v:"重複してる分を、割って消すってことね。"},{w:"marisa",t:"そうだ。3人の並び替え方は3!=3×2×1=6通りある。だから60を6で割って、5C3=10通りになるんだぜ。",v:"そうだ。3人の並び替え方は3の階乗、3かける2かける1で6通りある。だから60を6で割って、5シー3イコール10通りになるんだぜ。"},{w:"reimu",t:"じゃあ最初の『順列』、順番を区別する場合はどう計算するの？",v:"じゃあ最初の順列、順番を区別する場合はどう計算するの？"},{w:"marisa",t:"順列は記号Pを使う。5P3=5×4×3=60通りだ。組合せと違って、割る作業をしないぜ。",v:"順列は記号ピーを使う。5ピー3イコール5かける4かける3で60通りだ。組合せと違って、割る作業をしないぜ。"},{w:"reimu",t:"割らない分だけ、順列の方が数が多くなるんだね。",v:"割らない分だけ、順列の方が数が多くなるんだね。"},{w:"marisa",t:"その通り。同じ『5人から3人』でも、順番を区別するかどうかで答えが60通りか10通りか、大きく変わるってわけだ。",v:"その通り。同じ5人から3人でも、順番を区別するかどうかで答えが60通りか10通りか、大きく変わるってわけだ。"},{w:"reimu",t:"問題を見たら、まず『順番が大事か、無関係か』を考えればいいんだね！",v:"問題を見たら、まず順番が大事か、無関係かを考えればいいんだね！"},{w:"marisa",t:"そうだ。『1位2位3位を決める』『部長・副部長を決める』なら順列、『代表3人を選ぶ』『メンバーを選ぶ』なら組合せ。言葉に注目しろよ。",v:"そうだ。1位2位3位を決める、部長副部長を決めるなら順列、代表3人を選ぶ、メンバーを選ぶなら組合せ。言葉に注目しろよ。"}],quiz:[{q:"3個から2個選ぶ組合せは？",cs:["3通り","6通り","2通り","9通り"],a:0,f:"3C2=3×2/(2×1)=3通り。順番を区別しない選び方だぜ。",d:1},{q:"4個を1列に並べる順列は？",cs:["24通り","12通り","4通り","16通り"],a:0,f:"4!=4×3×2×1=24通り。全部並べるときは階乗だぜ。",d:1},{q:"5C2 は？",cs:["10","20","5","25"],a:0,f:"5×4/(2×1)=20/2=10。分子は5から2個、分母は2の階乗だぜ。",d:1},{q:"6P2 は？",cs:["30","15","12","36"],a:0,f:"6P2=6×5=30。順列は大きい方から個数分だけかけるぜ。",d:2},{q:"異なる5冊から3冊選ぶ方法は？",cs:["10通り","60通り","15通り","20通り"],a:0,f:"選ぶだけで順番無関係なので組合せ。5C3=10通りだぜ。",d:2},{q:"0! の値は？",cs:["1","0","なし","∞"],a:0,f:"0!=1と定義されている。組合せの計算で必要になる約束事だぜ。",d:2},{q:"7人を円形に並べる方法は？",cs:["6!通り","7!通り","7通り","6通り"],a:0,f:"円順列は回転して同じものを除くので(n−1)!=6!通りだぜ。",d:3},{q:"同じものを含む順列で割るのは？",cs:["同じ文字の個数の階乗","文字数","2","1"],a:0,f:"例えばAABBなら2!×2!で割る。重複を除くためだぜ。",d:3}]},
  mathA_02:{lesson:[{w:"reimu",t:"魔理沙、『確率』ってそもそも何を計算してるものなの？",v:"魔理沙、確率ってそもそも何を計算してるものなの？"},{w:"marisa",t:"確率は『起こりやすさ』を数字で表したものだ。0なら絶対起きない、1なら絶対起きる。その間の数で表すんだぜ。",v:"確率は起こりやすさを数字で表したものだ。0なら絶対起きない、1なら絶対起きる。その間の数で表すんだぜ。"},{w:"reimu",t:"具体的にはどうやって計算するの？",v:"具体的にはどうやって計算するの？"},{w:"marisa",t:"とてもシンプルだ。『求めたい場合の数』を『全部の場合の数』で割るだけだぜ。",v:"とてもシンプルだ。求めたい場合の数を、全部の場合の数で割るだけだぜ。"},{w:"reimu",t:"例えばサイコロで1が出る確率だと？",v:"例えばサイコロで1が出る確率だと？"},{w:"marisa",t:"サイコロの目は1から6まで、全部で6通り。そのうち『1が出る』のは1通りだけだ。だから1/6だぜ。",v:"サイコロの目は1から6まで、全部で6通り。そのうち1が出るのは1通りだけだ。だから6分の1だぜ。"},{w:"reimu",t:"全部の通りのうち、欲しい通りがどれだけあるか、ってことね。",v:"全部の通りのうち、欲しい通りがどれだけあるか、ってことね。"},{w:"marisa",t:"そうだ。次は『2つのことが同時に起こる』場合だ。例えばコインを2枚投げて、両方表になる確率だぜ。",v:"そうだ。次は2つのことが同時に起こる場合だ。例えばコインを2枚投げて、両方表になる確率だぜ。"},{w:"reimu",t:"1枚が表になる確率は1/2だよね。2枚だとどうなるの？",v:"1枚が表になる確率は2分の1だよね。2枚だとどうなるの？"},{w:"marisa",t:"お互いに影響しない出来事（独立っていうんだ）が『同時に』起こる確率は、それぞれをかけ算するんだ。",v:"お互いに影響しない出来事、独立っていうんだ、が同時に起こる確率は、それぞれをかけ算するんだ。"},{w:"reimu",t:"1/2×1/2=1/4 ってことだね。",v:"2分の1かける2分の1は4分の1ってことだね。"},{w:"marisa",t:"その通り。『同時に』『両方』のときはかけ算、これを覚えとけ。",v:"その通り。同時に、両方のときはかけ算、これを覚えとけ。"},{w:"reimu",t:"じゃあ『どちらか一方』が起こる確率は？",v:"じゃあどちらか一方が起こる確率は？"},{w:"marisa",t:"今度は足し算だ。『AまたはB』が起こる確率は、Aの確率とBの確率を足す。",v:"今度は足し算だ。エーまたはビーが起こる確率は、エーの確率とビーの確率を足す。"},{w:"reimu",t:"足すだけでいいの？何か注意点はある？",v:"足すだけでいいの？何か注意点はある？"},{w:"marisa",t:"あるぜ。AとBが『同時に起こる』ことがある場合、その分を1回多く数えてしまうから、最後に引いてやる必要があるんだ。",v:"あるぜ。エーとビーが同時に起こることがある場合、その分を1回多く数えてしまうから、最後に引いてやる必要があるんだ。"},{w:"reimu",t:"足して、重なった分を引く、ってことね。",v:"足して、重なった分を引く、ってことね。"},{w:"marisa",t:"そうだ。AとBが絶対同時には起きない関係（排反というんだ）なら、引く必要すらなく、ただ足すだけでいいぜ。",v:"そうだ。エーとビーが絶対同時には起きない関係、排反というんだ、なら、引く必要すらなく、ただ足すだけでいいぜ。"},{w:"reimu",t:"もう一つ、『少なくとも1回』っていう問題が苦手なんだけど…。",v:"もう一つ、少なくとも1回っていう問題が苦手なんだけど。"},{w:"marisa",t:"そういうときは『余事象』を使うと一気に楽になるぜ。直接数えるのが大変なときの裏技だ。",v:"そういうときは余事象を使うと一気に楽になるぜ。直接数えるのが大変なときの裏技だ。"},{w:"reimu",t:"余事象って何？",v:"余事象って何？"},{w:"marisa",t:"『求めたいこと』が起こらない確率を先に計算して、1から引くんだ。『少なくとも1回当たる』の余事象は『1回も当たらない』だぜ。",v:"求めたいことが起こらない確率を先に計算して、1から引くんだ。少なくとも1回当たるの余事象は、1回も当たらない、だぜ。"},{w:"reimu",t:"『1回も当たらない』の方が数えやすいんだね！",v:"1回も当たらないの方が数えやすいんだね！"},{w:"marisa",t:"そうだ。『少なくとも』『どれか1つでも』って言葉を見たら、余事象を思い出せよ。直接数えると複雑になりがちだからな。",v:"そうだ。少なくとも、どれか1つでも、って言葉を見たら、余事象を思い出せよ。直接数えると複雑になりがちだからな。"}],quiz:[{q:"コインで表が出る確率は？",cs:["1/2","1/4","1","1/3"],a:0,f:"表と裏の2通りのうち表は1通り。1÷2=1/2だぜ。",d:1},{q:"サイコロで偶数が出る確率は？",cs:["1/2","1/3","1/6","2/3"],a:0,f:"偶数は2,4,6の3通り。3/6=1/2だぜ。",d:1},{q:"サイコロで3以上が出る確率は？",cs:["2/3","1/2","1/3","5/6"],a:0,f:"3,4,5,6の4通り。4/6=2/3だぜ。",d:1},{q:"コイン2枚で両方表の確率は？",cs:["1/4","1/2","1/3","3/4"],a:0,f:"独立な試行はかけ算。1/2×1/2=1/4だぜ。",d:2},{q:"サイコロ2個で出目の和が7の確率は？",cs:["1/6","1/12","1/36","5/36"],a:0,f:"和が7は(1,6)(2,5)…の6通り。全36通りなので6/36=1/6だぜ。",d:2},{q:"余事象の確率の求め方は？",cs:["1−元の確率","元の確率×2","1+元の確率","元の確率/2"],a:0,f:"全体1から元の確率を引く。少なくとも〜の問題で大活躍だぜ。",d:2},{q:"当たり2本ハズレ3本から1本引いて当たる確率は？",cs:["2/5","3/5","1/2","2/3"],a:0,f:"全5本中当たり2本。2/5だぜ。分母は全部の本数だ。",d:3},{q:"条件付き確率P(B|A)の意味は？",cs:["Aが起きた下でBが起きる確率","AとBが同時","AまたはB","Bだけの確率"],a:0,f:"Aが起きたという前提でBが起きる確率。情報が増えた後の確率だぜ。",d:3}]},
  mathA_03:{lesson:[{w:"reimu",t:"魔理沙、三角形の『重心』とか『外心』とか、いろんな『心』が出てきてややこしいよ…。",v:"魔理沙、三角形の重心とか外心とか、いろんな心が出てきてややこしいよ。"},{w:"marisa",t:"一気に覚えようとするとパンクするぜ。1つずつ『何の交点か』で整理していこう。まずは重心からだ。",v:"一気に覚えようとするとパンクするぜ。1つずつ何の交点かで整理していこう。まずは重心からだ。"},{w:"reimu",t:"重心ってどうやって作るの？",v:"重心ってどうやって作るの？"},{w:"marisa",t:"まず『中線』を知らないとな。三角形の頂点と、その向かい側の辺の真ん中（中点）を結んだ線、これが中線だ。",v:"まず中線を知らないとな。三角形の頂点と、その向かい側の辺の真ん中、中点を結んだ線、これが中線だ。"},{w:"reimu",t:"頂点は3つあるから、中線も3本引けるね。",v:"頂点は3つあるから、中線も3本引けるね。"},{w:"marisa",t:"その3本の中線は、必ず1点で交わるんだ。その交わる点を『重心』と呼ぶぜ。",v:"その3本の中線は、必ず1点で交わるんだ。その交わる点を重心と呼ぶぜ。"},{w:"reimu",t:"重心には何か特別な性質があるの？",v:"重心には何か特別な性質があるの？"},{w:"marisa",t:"あるぜ。重心は、それぞれの中線を『頂点側2：辺側1』の比に分けるんだ。これはよく出るから覚えておけよ。",v:"あるぜ。重心は、それぞれの中線を、頂点側2、辺側1の比に分けるんだ。これはよく出るから覚えておけよ。"},{w:"reimu",t:"重心はわかった！次の外心は？",v:"重心はわかった！次の外心は？"},{w:"marisa",t:"外心は『垂直二等分線』の交点だ。1つの辺の真ん中を通って、その辺に垂直に引いた線のことだぜ。",v:"外心は垂直二等分線の交点だ。1つの辺の真ん中を通って、その辺に垂直に引いた線のことだぜ。"},{w:"reimu",t:"これも3辺それぞれにあるから、3本引けるんだね。",v:"これも3辺それぞれにあるから、3本引けるんだね。"},{w:"marisa",t:"そうだ。その3本が交わる点が外心だ。外心は3つの頂点からの距離が全部同じになる、特別な点なんだぜ。",v:"そうだ。その3本が交わる点が外心だ。外心は3つの頂点からの距離が全部同じになる、特別な点なんだぜ。"},{w:"reimu",t:"距離が同じってことは、その点を中心にして円が描けそうだね。",v:"距離が同じってことは、その点を中心にして円が描けそうだね。"},{w:"marisa",t:"いい気づきだ！外心を中心にして、3頂点を通る円が描ける。これを『外接円』と呼ぶんだぜ。",v:"いい気づきだ！外心を中心にして、3頂点を通る円が描ける。これを外接円と呼ぶんだぜ。"},{w:"reimu",t:"じゃあ内心は、それと似たような考え方？",v:"じゃあ内心は、それと似たような考え方？"},{w:"marisa",t:"似てるが、使う線が違う。内心は『角の二等分線』の交点だ。三角形の角を半分に分ける線だぜ。",v:"似てるが、使う線が違う。内心は角の二等分線の交点だ。三角形の角を半分に分ける線だぜ。"},{w:"reimu",t:"3つの角それぞれにあるから、これも3本だね。",v:"3つの角それぞれにあるから、これも3本だね。"},{w:"marisa",t:"その3本が交わるのが内心だ。内心は3つの『辺』からの距離が全部同じになる点なんだぜ。",v:"その3本が交わるのが内心だ。内心は3つの辺からの距離が全部同じになる点なんだぜ。"},{w:"reimu",t:"外心は頂点から等距離、内心は辺から等距離。似てるけど違うんだね。",v:"外心は頂点から等距離、内心は辺から等距離。似てるけど違うんだね。"},{w:"marisa",t:"そこを混同しないことが大事だぜ。内心を中心にすると、3辺すべてに接する円が描ける。これを『内接円』と呼ぶ。",v:"そこを混同しないことが大事だぜ。内心を中心にすると、3辺すべてに接する円が描ける。これを内接円と呼ぶ。"},{w:"reimu",t:"重心・外心・内心、それぞれ何の交点かをセットで覚えればいいんだね！",v:"重心、外心、内心、それぞれ何の交点かをセットで覚えればいいんだね！"},{w:"marisa",t:"その通り。最後に円について1つだけ追加だ。同じ弧に対する『円周角』は、『中心角』のちょうど半分になるんだぜ。",v:"その通り。最後に円について1つだけ追加だ。同じ弧に対する円周角は、中心角のちょうど半分になるんだぜ。"},{w:"reimu",t:"円周角と中心角って何が違うの？",v:"円周角と中心角って何が違うの？"},{w:"marisa",t:"中心角は円の中心から見た角、円周角は円周上の点から見た角だ。同じ弧を見ていても、見る場所が違うんだぜ。",v:"中心角は円の中心から見た角、円周角は円周上の点から見た角だ。同じ弧を見ていても、見る場所が違うんだぜ。"},{w:"reimu",t:"特別な場合もあるって聞いたよ。",v:"特別な場合もあるって聞いたよ。"},{w:"marisa",t:"直径に対する円周角は必ず90°になる。半円だと中心角がちょうど180°だから、その半分で90°になるんだぜ。これは超頻出だ。",v:"直径に対する円周角は必ず90度になる。半円だと中心角がちょうど180度だから、その半分で90度になるんだぜ。これは超頻出だ。"}],quiz:[{q:"三角形の中線が交わる点は？",cs:["重心","外心","内心","垂心"],a:0,f:"中線(頂点と対辺の中点を結ぶ線)の交点が重心だぜ。",d:1},{q:"外接円の中心は？",cs:["外心","内心","重心","垂心"],a:0,f:"3頂点を通る円の中心が外心。3辺の垂直二等分線の交点だぜ。",d:1},{q:"内接円の中心は？",cs:["内心","外心","重心","垂心"],a:0,f:"3辺に接する円の中心が内心。角の二等分線の交点だぜ。",d:1},{q:"重心は中線を頂点側から何対何に分ける？",cs:["2:1","1:1","3:1","1:2"],a:0,f:"頂点側が2、対辺側が1の2:1。重要な比だから暗記だぜ。",d:2},{q:"円周角は中心角の何倍？",cs:["1/2","2","1","1/3"],a:0,f:"同じ弧に対する円周角は中心角のちょうど半分だぜ。",d:2},{q:"外心は何の交点？",cs:["各辺の垂直二等分線","中線","角の二等分線","高さ"],a:0,f:"各辺を垂直に二等分する線の交点。3頂点から等距離だぜ。",d:2},{q:"内心は何の交点？",cs:["角の二等分線","中線","垂直二等分線","高さ"],a:0,f:"3つの内角を二等分する線の交点。3辺から等距離だぜ。",d:3},{q:"直径に対する円周角は？",cs:["90°","60°","45°","120°"],a:0,f:"半円の弧の中心角は180°、その半分で90°。タレスの定理だぜ。",d:3}]},
  mathA_04:{lesson:[{w:"reimu",t:"魔理沙、12と18の『最大公約数』ってどうやって出すの？",v:"魔理沙、12と18の最大公約数ってどうやって出すの？"},{w:"marisa",t:"まず『約数』からだ。約数は『その数を割り切れる数』のこと。12の約数は1,2,3,4,6,12だぜ。",v:"まず約数からだ。約数は、その数を割り切れる数のこと。12の約数は1,2,3,4,6,12だぜ。"},{w:"reimu",t:"じゃあ『公約数』は、2つの数に共通する約数ってこと？",v:"じゃあ公約数は、2つの数に共通する約数ってこと？"},{w:"marisa",t:"その通り。そして公約数の中で『一番大きいもの』が最大公約数だ。これを求める確実な方法が『素因数分解』だぜ。",v:"その通り。そして公約数の中で一番大きいものが最大公約数だ。これを求める確実な方法が素因数分解だぜ。"},{w:"reimu",t:"素因数分解って、数を素数だけのかけ算に分けることだよね。",v:"素因数分解って、数を素数だけのかけ算に分けることだよね。"},{w:"marisa",t:"そうだ。12を分解すると2×2×3、これを2²×3と書く。18を分解すると2×3×3、つまり2×3²だ。",v:"そうだ。12を分解すると2かける2かける3、これを2の2乗かける3と書く。18を分解すると2かける3かける3、つまり2かける3の2乗だ。"},{w:"reimu",t:"分解したあと、どうやって最大公約数を出すの？",v:"分解したあと、どうやって最大公約数を出すの？"},{w:"marisa",t:"両方に『共通して入っている』素数だけを、少ない方の個数で取り出すんだ。",v:"両方に共通して入っている素数だけを、少ない方の個数で取り出すんだ。"},{w:"reimu",t:"12には2が2個、18には2が1個。だから2は1個だけ使うってこと？",v:"12には2が2個、18には2が1個。だから2は1個だけ使うってこと？"},{w:"marisa",t:"その通り！3についても、12には1個、18には2個。少ない方の1個を使う。だから2×3=6が最大公約数だぜ。",v:"その通り！3についても、12には1個、18には2個。少ない方の1個を使う。だから2かける3で6が最大公約数だぜ。"},{w:"reimu",t:"でも数がもっと大きくなったら、素因数分解するの大変そう…。",v:"でも数がもっと大きくなったら、素因数分解するの大変そう。"},{w:"marisa",t:"そういうときのために『ユークリッドの互除法』という便利な方法があるんだぜ。割り算だけで答えが出せる。",v:"そういうときのためにユークリッドの互除法という便利な方法があるんだぜ。割り算だけで答えが出せる。"},{w:"reimu",t:"どういう手順でやるの？",v:"どういう手順でやるの？"},{w:"marisa",t:"大きい数を小さい数で割って、余りを出す。次に『さっきの小さい数』を『その余り』で割る。これを繰り返すんだ。",v:"大きい数を小さい数で割って、余りを出す。次にさっきの小さい数を、その余りで割る。これを繰り返すんだ。"},{w:"reimu",t:"12と18でやってみてくれる？",v:"12と18でやってみてくれる？"},{w:"marisa",t:"いいぜ。18÷12=1余り6。次は12÷6=2余り0。余りが0になったら、その時の『割る数』が最大公約数だ。",v:"いいぜ。18わる12は1余り6。次は12わる6は2余り0。余りが0になったら、その時の割る数が最大公約数だ。"},{w:"reimu",t:"今回は最後に割った数が6だから、最大公約数は6ってことだね。",v:"今回は最後に割った数が6だから、最大公約数は6ってことだね。"},{w:"marisa",t:"その通り！素因数分解と同じ答え6が出たな。互除法は割り算を繰り返すだけだから、大きな数でも機械的にできるのが強みだぜ。",v:"その通り！素因数分解と同じ答え6が出たな。互除法は割り算を繰り返すだけだから、大きな数でも機械的にできるのが強みだぜ。"},{w:"reimu",t:"素因数分解で共通部分を探す方法と、互除法で割り算を繰り返す方法、2つのやり方があるんだね！",v:"素因数分解で共通部分を探す方法と、互除法で割り算を繰り返す方法、2つのやり方があるんだね！"}],quiz:[{q:"8と12の最大公約数は？",cs:["4","2","6","24"],a:0,f:"8=2³、12=2²×3。共通は2²=4。これが最大公約数だぜ。",d:1},{q:"6と9の最大公約数は？",cs:["3","6","9","18"],a:0,f:"6=2×3、9=3²。共通は3だけ。最大公約数は3だぜ。",d:1},{q:"4と6の最小公倍数は？",cs:["12","24","6","2"],a:0,f:"4の倍数4,8,12…と6の倍数6,12…で最初に一致するのが12だぜ。",d:1},{q:"数を素数の積に分けることを？",cs:["素因数分解","因数分解","約分","通分"],a:0,f:"12=2²×3のように素数だけの積にする。最大公約数の基礎だぜ。",d:2},{q:"24と36の最大公約数は？",cs:["12","6","24","72"],a:0,f:"24=2³×3、36=2²×3²。共通は2²×3=12だぜ。",d:2},{q:"互いに素とは？",cs:["最大公約数が1","公倍数がない","素数同士","奇数同士"],a:0,f:"2数の最大公約数が1の関係。共通の素因数を持たないんだぜ。",d:2},{q:"互除法で35と14、35÷14の余りは？",cs:["7","0","21","3"],a:0,f:"35=14×2+7で余り7。次は14÷7=余り0なので最大公約数は7だぜ。",d:3},{q:"nが偶数なら n²は？",cs:["必ず偶数","必ず奇数","素数","0"],a:0,f:"n=2kとおくとn²=4k²で2の倍数。証明問題で使う基本だぜ。",d:3}]},
  eng_02:{lesson:[{w:"reimu",t:"魔理沙、I want to eat. の『to eat』って何の働きをしてるの？",v:"魔理沙、アイウォントトゥーイートのトゥーイートって何の働きをしてるの？"},{w:"marisa",t:"これは『不定詞』っていう形だ。『to』のあとに動詞の『原形』（変化させてないそのままの形）を置くんだぜ。",v:"これは不定詞っていう形だ。トゥーのあとに動詞の原形、変化させてないそのままの形を置くんだぜ。"},{w:"reimu",t:"なんで『不定詞』っていう名前なの？",v:"なんで不定詞っていう名前なの？"},{w:"marisa",t:"主語によって形が『定まらない』動詞のフツーの形（is,am,goesみたいに変化するやつ）と違って、to＋原形はいつも同じ形だからだ。",v:"主語によって形が定まらない動詞のフツーの形、イズ、アム、ゴーズみたいに変化するやつと違って、トゥープラス原形はいつも同じ形だからだ。"},{w:"reimu",t:"形がいつも同じなのは楽そうだね。でも使い方が難しそう…。",v:"形がいつも同じなのは楽そうだね。でも使い方が難しそう。"},{w:"marisa",t:"心配するな。不定詞の使い方（用法）は大きく3つしかない。名詞的・形容詞的・副詞的の3つだ。順番に説明するぜ。",v:"心配するな。不定詞の使い方、用法は大きく3つしかない。名詞的、形容詞的、副詞的の3つだ。順番に説明するぞ。"},{w:"reimu",t:"まず『名詞的用法』から教えて。",v:"まず名詞的用法から教えて。"},{w:"marisa",t:"名詞的用法は『〜すること』っていう意味になる。動詞を『〜すること』という名詞に変身させてるイメージだぜ。",v:"名詞的用法は、〜すること、っていう意味になる。動詞を、〜すること、という名詞に変身させてるイメージだぜ。"},{w:"reimu",t:"例文だと、どんな感じになるの？",v:"例文だと、どんな感じになるの？"},{w:"marisa",t:"To swim is fun. これは『泳ぐことは楽しい』って意味だ。to swimが文の主語、つまり名詞の役割をしてるだろ？",v:"トゥースイムイズファン。これは泳ぐことは楽しいって意味だ。トゥースイムが文の主語、つまり名詞の役割をしてるだろ？"},{w:"reimu",t:"なるほど、『〜すること』が主語になるんだね。次は形容詞的用法？",v:"なるほど、〜すること、が主語になるんだね。次は形容詞的用法？"},{w:"marisa",t:"そうだ。形容詞的用法は『〜するための』という意味になって、すぐ前にある名詞を後ろから説明するんだぜ。",v:"そうだ。形容詞的用法は、〜するための、という意味になって、すぐ前にある名詞を後ろから説明するんだぜ。"},{w:"reimu",t:"後ろから説明するって、日本語と順番が逆ってこと？",v:"後ろから説明するって、日本語と順番が逆ってこと？"},{w:"marisa",t:"そうだ。something to drink なら、somethingという名詞をto drinkが後ろから説明して『飲むための何か』、つまり飲み物になるんだぜ。",v:"そうだ。サムシングトゥードリンクなら、サムシングという名詞をトゥードリンクが後ろから説明して、飲むための何か、つまり飲み物になるんだぜ。"},{w:"reimu",t:"最後の副詞的用法は？",v:"最後の副詞的用法は？"},{w:"marisa",t:"副詞的用法は『〜するために』という意味で、動作の『目的』を説明するときに使うぜ。",v:"副詞的用法は、〜するために、という意味で、動作の目的を説明するときに使うぜ。"},{w:"reimu",t:"例文も教えて！",v:"例文も教えて！"},{w:"marisa",t:"I went to see her. これは『彼女に会うために行った』って意味だ。『なぜ行ったのか』の目的をto seeが説明してるんだぜ。",v:"アイウェントトゥーシーハー。これは彼女に会うために行ったって意味だ。なぜ行ったのかの目的をトゥーシーが説明してるんだぜ。"},{w:"reimu",t:"3つとも『to+動詞』の形は同じなのに、意味が全然違うんだね。",v:"3つともトゥープラス動詞の形は同じなのに、意味が全然違うんだね。"},{w:"marisa",t:"そこが不定詞のポイントだ。形だけ見ても区別できないから、文の中でどう使われてるか（主語・名詞を修飾・目的）を見て判断するしかないんだぜ。",v:"そこが不定詞のポイントだ。形だけ見ても区別できないから、文の中でどう使われてるか、主語、名詞を修飾、目的を見て判断するしかないんだぜ。"},{w:"reimu",t:"日本語に訳すとき『こと』『ための』『ために』のどれが一番自然か考えればいいんだね！",v:"日本語に訳すとき、こと、ための、ために、のどれが一番自然か考えればいいんだね！"}],quiz:[{q:"不定詞の形は？",cs:["to+動詞の原形","to+ing","動詞+ed","be+動詞"],a:0,f:"to＋動詞の原形。原形(変化させない形)を使うのがポイントだぜ。",d:1},{q:"I like to read. の to readの用法は？",cs:["名詞的","形容詞的","副詞的","なし"],a:0,f:"『読むことが好き』。to readが目的語=名詞のはたらきだぜ。",d:1},{q:"something to drink の to drinkは？",cs:["形容詞的","名詞的","副詞的","動名詞"],a:0,f:"『飲むための物』。somethingという名詞を後ろから修飾する形容詞的用法だぜ。",d:1},{q:"I'm glad to see you. のto seeは？",cs:["副詞的(感情の原因)","名詞的","形容詞的","受動"],a:0,f:"『会えて嬉しい』。嬉しい原因を表す副詞的用法だぜ。",d:2},{q:"It is easy to swim. の itは？",cs:["形式主語","代名詞it","強調","be動詞"],a:0,f:"本当の主語はto swim。長いので前にitを置く形式主語だぜ。",d:2},{q:"want+人+to do の意味は？",cs:["人に〜してほしい","自分が〜したい","〜できる","〜すべき"],a:0,f:"I want you to go.で『君に行ってほしい』。人に動作を求める形だぜ。",d:2},{q:"too...to do の意味は？",cs:["〜すぎて…できない","〜するには十分","〜して嬉しい","〜する予定"],a:0,f:"too tired to walkで『疲れすぎて歩けない』。否定の意味になるのが要注意だぜ。",d:3},{q:"how to swim の意味は？",cs:["泳ぎ方","泳ぐこと","泳ぐために","泳ぐ場所"],a:0,f:"疑問詞+to doで『〜の仕方』。how to doは方法を表すぜ。",d:3}]},
  eng_03:{lesson:[{w:"reimu",t:"魔理沙、Swimming is fun. の『Swimming』って、動詞のswimにingがついてるよね？動詞じゃないの？",v:"魔理沙、スイミングイズファンのスイミングって、動詞のスイムにイングがついてるよね？動詞じゃないの？"},{w:"marisa",t:"いい質問だ。確かに元は動詞swimだが、ing形にすることで『名詞』に変身させてるんだ。これを『動名詞』っていうぜ。",v:"いい質問だ。確かに元は動詞スイムだが、イング形にすることで名詞に変身させてるんだ。これを動名詞っていうぜ。"},{w:"reimu",t:"名詞に変身、ってことは文の中で名詞と同じ働きをするの？",v:"名詞に変身、ってことは文の中で名詞と同じ働きをするの？"},{w:"marisa",t:"そうだ。動名詞の意味は『〜すること』。Swimmingなら『泳ぐこと』だ。Swimming is fun.で『泳ぐことは楽しい』になるぜ。",v:"そうだ。動名詞の意味は、〜すること。スイミングなら泳ぐことだ。スイミングイズファンで、泳ぐことは楽しい、になるぜ。"},{w:"reimu",t:"あれ、『〜すること』って、前にやった不定詞の名詞的用法と同じ意味だよね？",v:"あれ、〜すること、って、前にやった不定詞の名詞的用法と同じ意味だよね？"},{w:"marisa",t:"鋭いな。その通り、意味はほとんど同じだ。だから『どっちを使ってもいいんじゃない？』って思うだろ？",v:"鋭いな。その通り、意味はほとんど同じだ。だからどっちを使ってもいいんじゃないって思うだろ？"},{w:"reimu",t:"うん、まさにそう思ってた。",v:"うん、まさにそう思ってた。"},{w:"marisa",t:"でもそこが落とし穴なんだ。実は、動詞によって『この後はto不定詞』『この後は動名詞』っていう決まりがあるんだぜ。",v:"でもそこが落とし穴なんだ。実は、動詞によって、この後はトゥー不定詞、この後は動名詞、っていう決まりがあるんだぜ。"},{w:"reimu",t:"動詞ごとに決まってるなんて、覚えるしかないの…？",v:"動詞ごとに決まってるなんて、覚えるしかないの？"},{w:"marisa",t:"半分はそうだ。でもグループ分けすれば覚えやすくなるぜ。enjoy・finish・stopは動名詞をとる動詞の代表だ。",v:"半分はそうだ。でもグループ分けすれば覚えやすくなるぜ。エンジョイ、フィニッシュ、ストップは動名詞をとる動詞の代表だ。"},{w:"reimu",t:"逆に不定詞をとる動詞は？",v:"逆に不定詞をとる動詞は？"},{w:"marisa",t:"want・hope・decideは不定詞をとる動詞の代表だ。これらは『まだやってない、これからのこと』を表す動詞が多いぜ。",v:"ウォント、ホープ、ディサイドは不定詞をとる動詞の代表だ。これらは、まだやってない、これからのこと、を表す動詞が多いぜ。"},{w:"reimu",t:"enjoyとかfinishは、もう『やってる最中』とか『やり終えた』ことだもんね。",v:"エンジョイとかフィニッシュは、もうやってる最中とか、やり終えたことだもんね。"},{w:"marisa",t:"いい着眼点だ！動名詞は『すでに起きてること・経験』、不定詞は『これから先のこと』をイメージすると覚えやすいぜ。",v:"いい着眼点だ！動名詞は、すでに起きてること、経験、不定詞は、これから先のこと、をイメージすると覚えやすいぜ。"},{w:"reimu",t:"なるほど、ニュアンスで考えればいいんだね。他に確実なルールはある？",v:"なるほど、ニュアンスで考えればいいんだね。他に確実なルールはある？"},{w:"marisa",t:"1つだけ、絶対に例外がないルールがあるぜ。『前置詞の後ろは必ず動名詞』ってルールだ。",v:"1つだけ、絶対に例外がないルールがあるぜ。前置詞の後ろは必ず動名詞、ってルールだ。"},{w:"reimu",t:"前置詞って、atとかinとかofみたいなやつだよね。",v:"前置詞って、アットとかインとかオブみたいなやつだよね。"},{w:"marisa",t:"そうだ。be good at swimmingは『泳ぐことが得意』って意味だ。atの後ろだからswimでもto swimでもなく、必ずswimingになるぜ。",v:"そうだ。ビーグッドアットスイミングは、泳ぐことが得意、って意味だ。アットの後ろだからスイムでもトゥースイムでもなく、必ずスイミングになるぜ。"},{w:"reimu",t:"前置詞の後ろはing、これだけは例外なしで確実に使えるってことね！",v:"前置詞の後ろはイング、これだけは例外なしで確実に使えるってことね！"}],quiz:[{q:"動名詞の形は？",cs:["動詞+ing","to+動詞","動詞+ed","be+動詞"],a:0,f:"動詞のing形。動詞を名詞化して『〜すること』を表すぜ。",d:1},{q:"I enjoy ___.に入るのは？(read)",cs:["reading","to read","read","reads"],a:0,f:"enjoyは動名詞をとる動詞。readingが正解だぜ。to不定詞は不可だ。",d:1},{q:"前置詞の後ろの動詞の形は？",cs:["動名詞(ing)","原形","不定詞","過去形"],a:0,f:"前置詞の直後は必ず動名詞。これは絶対ルールだぜ。",d:1},{q:"finish ___ (do)に入るのは？",cs:["doing","to do","do","done"],a:0,f:"finishは動名詞をとる。doingが正解。『〜し終える』だぜ。",d:2},{q:"be good at ___ (cook)は？",cs:["cooking","to cook","cook","cooked"],a:0,f:"atは前置詞。前置詞の後は動名詞でcookingだぜ。",d:2},{q:"stop to do と stop doing の違いは？",cs:["前者は〜するため立ち止まる/後者は〜をやめる","同じ","両方やめる","両方続ける"],a:0,f:"stop to smokeは『吸うために止まる』、stop smokingは『吸うのをやめる』。全然違うぜ。",d:2},{q:"look forward to ___ (see)は？",cs:["seeing","see","to see","saw"],a:0,f:"このtoは不定詞でなく前置詞。だから後ろは動名詞seeingだぜ。引っかけ問題だ。",d:3},{q:"動名詞が主語のときの動詞は？",cs:["単数扱い","複数扱い","過去形","原形"],a:0,f:"Swimming is fun.のように動名詞主語は単数扱い。isを使うぜ。",d:3}]},
  eng_04:{lesson:[{w:"reimu",t:"魔理沙、『関係代名詞』ってwhoとかwhichとか出てきて、よく分からないんだよね…。",v:"魔理沙、関係代名詞ってフーとかフィッチとか出てきて、よく分からないんだよね。"},{w:"marisa",t:"そんなに難しくないぜ。関係代名詞は『2つの文を1つにつなぐ接着剤』だと思えばいい。実際に2つの文を作るところから見せるぜ。",v:"そんなに難しくないぜ。関係代名詞は、2つの文を1つにつなぐ接着剤、だと思えばいい。実際に2つの文を作るところから見せるぞ。"},{w:"reimu",t:"2つの文って、どんな感じ？",v:"2つの文って、どんな感じ？"},{w:"marisa",t:"I know the man.（私はその男性を知っている）と、He runs fast.（彼は速く走る）。この2文だ。",v:"アイノウザマン、私はその男性を知っている、と、ヒーランズファスト、彼は速く走る。この2文だ。"},{w:"reimu",t:"どちらも『その男性』のことを言ってるね。",v:"どちらも、その男性のことを言ってるね。"},{w:"marisa",t:"そこがポイントだ。2つの文に共通する人や物があるとき、その共通部分（ここではHe）を関係代名詞に置き換えてつなぐんだぜ。",v:"そこがポイントだ。2つの文に共通する人や物があるとき、その共通部分、ここではヒーを関係代名詞に置き換えてつなぐんだぜ。"},{w:"reimu",t:"Heの代わりに何を置くの？",v:"ヒーの代わりに何を置くの？"},{w:"marisa",t:"今回は『人』だからwhoを使う。He runsのHeをwhoに変えて、the manの直後にくっつけるんだ。",v:"今回は人だからフーを使う。ヒーランズのヒーをフーに変えて、ザマンの直後にくっつけるんだ。"},{w:"reimu",t:"I know the man who runs fast. になるってことね。",v:"アイノウザマンフーランズファスト、になるってことね。"},{w:"marisa",t:"その通り！『速く走るその男性を知っている』って意味になる。説明を受けるthe manのことを『先行詞』って呼ぶぜ。",v:"その通り！速く走るその男性を知っている、って意味になる。説明を受けるザマンのことを先行詞って呼ぶぜ。"},{w:"reimu",t:"先行詞は『説明される側』ってことね。じゃあwhoはいつでも使えるの？",v:"先行詞は説明される側ってことね。じゃあフーはいつでも使えるの？"},{w:"marisa",t:"使えるのは先行詞が『人』のときだけだ。先行詞が『物』のときはwhichを使うぜ。",v:"使えるのは先行詞が人のときだけだ。先行詞が物のときはフィッチを使うぜ。"},{w:"reimu",t:"人ならwho、物ならwhich。覚えやすいね。",v:"人ならフー、物ならフィッチ。覚えやすいね。"},{w:"marisa",t:"さらに便利なのがthatだ。thatは人でも物でも、どちらにでも使える万能タイプだぜ。",v:"さらに便利なのがザットだ。ザットは人でも物でも、どちらにでも使える万能タイプだぜ。"},{w:"reimu",t:"迷ったらthatを使えばいいの？",v:"迷ったらザットを使えばいいの？"},{w:"marisa",t:"基本的にはそれでいいぜ。ただテストではwho/whichで答えさせる問題も多いから、先行詞が人か物かを見る習慣はつけといた方がいいな。",v:"基本的にはそれでいいぜ。ただテストではフー、フィッチで答えさせる問題も多いから、先行詞が人か物かを見る習慣はつけといた方がいいな。"},{w:"reimu",t:"whoとwhichの他に、何か特別な形はあるの？",v:"フーとフィッチの他に、何か特別な形はあるの？"},{w:"marisa",t:"whoseがあるぜ。これは『その人の〜』という所有を表すときに使う。the man whose car is redなら『車が赤いその男性』だ。",v:"フーズがあるぜ。これは、その人の〜、という所有を表すときに使う。ザマンフーズカーイズレッドなら、車が赤いその男性、だ。"},{w:"reimu",t:"whoseは『〜の』を表す特別な関係代名詞ってことね。",v:"フーズは、〜の、を表す特別な関係代名詞ってことね。"},{w:"marisa",t:"そうだ。まとめると、先行詞が人ならwho、物ならwhich、迷ったらthat、所有を表すならwhose。これだけ押さえれば基本はOKだぜ。",v:"そうだ。まとめると、先行詞が人ならフー、物ならフィッチ、迷ったらザット、所有を表すならフーズ。これだけ押さえれば基本はオーケーだぜ。"}],quiz:[{q:"人が先行詞の関係代名詞は？",cs:["who","which","what","whose以外"],a:0,f:"先行詞が人のときはwho。the boy whoのように使うぜ。",d:1},{q:"物が先行詞の関係代名詞は？",cs:["which","who","whom","whose"],a:0,f:"先行詞が物のときはwhich。the book whichのように使うぜ。",d:1},{q:"人でも物でも使えるのは？",cs:["that","who","which","what"],a:0,f:"thatは人にも物にも使える万能選手だぜ。",d:1},{q:"the book ___ I bought（目的格）は？",cs:["which","who","whose","what"],a:0,f:"先行詞は物。目的語の働きなのでwhich(またはthat)。目的格は省略も可だぜ。",d:2},{q:"所有を表す関係代名詞は？",cs:["whose","who","which","whom"],a:0,f:"whoseは『〜の』を表す所有格。the man whose carのように使うぜ。",d:2},{q:"先行詞を含む関係代名詞は？",cs:["what","that","which","who"],a:0,f:"what=the thing which。それ自体に先行詞が含まれているぜ。",d:2},{q:"関係代名詞の目的格は省略できる？",cs:["できる","できない","whoのみ","常に必要"],a:0,f:"目的格(which/whom/that)は省略可能。the book I boughtのように消せるぜ。",d:3},{q:"非制限用法(コンマ+which)の特徴は？",cs:["補足説明を加える","限定する","省略する","疑問を表す"],a:0,f:"コンマ付きは情報を付け足すだけで、先行詞を限定しないぜ。",d:3}]},
  eng_05:{lesson:[{w:"reimu",t:"魔理沙、『受動態』って『〜される』って意味だよね？",v:"魔理沙、受動態って、〜される、って意味だよね？"},{w:"marisa",t:"そうだ。まず普通の文（能動態）と比べると分かりやすいぜ。能動態は『〜する』、受動態は『〜される』だ。",v:"そうだ。まず普通の文、能動態と比べると分かりやすいぜ。能動態は、〜する、受動態は、〜される、だ。"},{w:"reimu",t:"動作をする側と、される側の違いってことね。",v:"動作をする側と、される側の違いってことね。"},{w:"marisa",t:"そうだ。実際に文を変身させてみるぜ。Many people read this book.（多くの人がこの本を読む）これが能動態だ。",v:"そうだ。実際に文を変身させてみるぜ。メニーピープルリードジスブック、多くの人がこの本を読む、これが能動態だ。"},{w:"reimu",t:"この文の中で『〜される側』はどれ？",v:"この文の中で〜される側はどれ？"},{w:"marisa",t:"this bookだ。本は『読まれる』側だろ。受動態にするときは、この『される側』を主語に持ってくるんだ。",v:"ジスブックだ。本は読まれる側だろ。受動態にするときは、このされる側を主語に持ってくるんだ。"},{w:"reimu",t:"this bookを主語にすると、文の形はどうなるの？",v:"ジスブックを主語にすると、文の形はどうなるの？"},{w:"marisa",t:"This book is read by many people. になる。動詞のreadはそのままじゃなく『過去分詞』の形にして、be動詞をつけるんだ。",v:"ジスブックイズリードバイメニーピープル、になる。動詞のリードはそのままじゃなく過去分詞の形にして、ビードウシをつけるんだ。"},{w:"reimu",t:"be動詞＋過去分詞、これが受動態の基本の形ってことね。",v:"ビードウシ足す過去分詞、これが受動態の基本の形ってことね。"},{w:"marisa",t:"その通り。byっていう単語も出てきたな。これは『〜によって』という意味で、動作をする人を示してるんだぜ。",v:"その通り。バイっていう単語も出てきたな。これは、〜によって、という意味で、動作をする人を示してるんだぜ。"},{w:"reimu",t:"byはいつも必要なの？",v:"バイはいつも必要なの？"},{w:"marisa",t:"実は、誰がやったか重要じゃないときは省略されることも多いぜ。This book is read.だけでも文として成立するんだ。",v:"実は、誰がやったか重要じゃないときは省略されることも多いぜ。ジスブックイズリード、だけでも文として成立するんだ。"},{w:"reimu",t:"過去のことを言いたいときは、どこを変えるの？",v:"過去のことを言いたいときは、どこを変えるの？"},{w:"marisa",t:"be動詞の部分だけ変えればいい。過去分詞はそのままで、isをwasやwereに変えるだけだぜ。",v:"ビードウシの部分だけ変えればいい。過去分詞はそのままで、イズをワズやワーに変えるだけだぜ。"},{w:"reimu",t:"未来のことなら？",v:"未来のことなら？"},{w:"marisa",t:"will beを使う。will be readで『読まれるだろう』だ。be動詞の部分を変えるだけで時制が変わるのは便利だろ。",v:"ウィルビーを使う。ウィルビーリードで、読まれるだろう、だ。ビードウシの部分を変えるだけで時制が変わるのは便利だろ。"},{w:"reimu",t:"つまり受動態は『be動詞＋過去分詞』が骨組みで、be動詞だけ時制に合わせて変えればいいんだね！",v:"つまり受動態は、ビードウシ足す過去分詞が骨組みで、ビードウシだけ時制に合わせて変えればいいんだね！"},{w:"marisa",t:"完璧な理解だ。主語が『される側』になっていることと、be動詞＋過去分詞の形、この2点をいつも確認する癖をつけろよ。",v:"完璧な理解だ。主語がされる側になっていることと、ビードウシ足す過去分詞の形、この2点をいつも確認する癖をつけろよ。"}],quiz:[{q:"受動態の基本形は？",cs:["be動詞+過去分詞","have+過去分詞","be+ing","do+動詞"],a:0,f:"be動詞＋過去分詞。haveを使う完了形と混同しないようにだぜ。",d:1},{q:"受動態で動作主を示す前置詞は？",cs:["by","to","for","with"],a:0,f:"by 〜で『〜によって』。動作をする人やものを示すぜ。",d:1},{q:"is written の意味は？",cs:["書かれる","書く","書いた","書いている"],a:0,f:"write→writtenの過去分詞。is writtenで『書かれる』だぜ。",d:1},{q:"能動 He makes it. の受動態は？",cs:["It is made by him.","It made him.","It is making.","He is made."],a:0,f:"目的語itを主語に。It is made by him.だ。動作主はby himだぜ。",d:2},{q:"受動態の疑問文の作り方は？",cs:["be動詞を前に出す","doを使う","haveを使う","willを使う"],a:0,f:"Is it made?のようにbe動詞を主語の前に出すぜ。",d:2},{q:"助動詞付きの受動態は？",cs:["助動詞+be+過去分詞","助動詞+過去分詞","be+助動詞","助動詞+ing"],a:0,f:"can be doneのように助動詞の後はbe＋過去分詞だぜ。",d:2},{q:"be interested ___ (興味がある)は？",cs:["in","by","to","at"],a:0,f:"by以外を使う受動態。be interested inで『〜に興味がある』。慣用表現だぜ。",d:3},{q:"現在完了の受動態は？",cs:["have been+過去分詞","have+過去分詞","be+過去分詞","had+ing"],a:0,f:"have been doneの形。完了形と受動態の合わせ技だぜ。",d:3}]},
  eng_06:{lesson:[{w:"reimu",t:"魔理沙、『比較級』ってどういうときに使う形なの？",v:"魔理沙、比較級ってどういうときに使う形なの？"},{w:"marisa",t:"2つのものを比べて『より〜』と言いたいときに使う形だぜ。例えば『AはBより背が高い』みたいな文だ。",v:"2つのものを比べて、より〜、と言いたいときに使う形だぜ。例えば、エーはビーより背が高い、みたいな文だ。"},{w:"reimu",t:"具体的にはどう作るの？",v:"具体的にはどう作るの？"},{w:"marisa",t:"短い単語のときは、単語の語尾に『−er』をつけるだけだ。tall（背が高い）ならtallerになるぜ。",v:"短い単語のときは、単語の語尾にアーをつけるだけだ。トール、背が高い、ならトーラーになるぜ。"},{w:"reimu",t:"tallerだけで文になるの？",v:"トーラーだけで文になるの？"},{w:"marisa",t:"いや、『誰と比べてるか』を言うために、thanっていう単語とセットで使うんだ。『〜より』って意味だぜ。",v:"いや、誰と比べてるかを言うために、ザンっていう単語とセットで使うんだ。〜より、って意味だぜ。"},{w:"reimu",t:"例文を教えて。",v:"例文を教えて。"},{w:"marisa",t:"He is taller than me. これで『彼は私より背が高い』だ。tallerとthanはいつもペアで出てくると思っておけ。",v:"ヒーイズトーラーザンミー。これで彼は私より背が高い、だ。トーラーとザンはいつもペアで出てくると思っておけ。"},{w:"reimu",t:"短い単語はerをつけるってわかったけど、長い単語はどうするの？",v:"短い単語はアーをつけるってわかったけど、長い単語はどうするの？"},{w:"marisa",t:"beautifulみたいに長い単語には、erをつけずに、単語の『前』にmoreという単語を置くんだ。more beautifulになるぜ。",v:"ビューティフルみたいに長い単語には、アーをつけずに、単語の前にモアという単語を置くんだ。モアビューティフルになるぜ。"},{w:"reimu",t:"語尾に付けるか、前に置くか、単語の長さで変わるんだね。",v:"語尾に付けるか、前に置くか、単語の長さで変わるんだね。"},{w:"marisa",t:"そうだ。次は『最上級』だ。これは『一番〜』、3つ以上の中で一番ってときに使う形だぜ。",v:"そうだ。次は最上級だ。これは、一番〜、3つ以上の中で一番ってときに使う形だぜ。"},{w:"reimu",t:"最上級も同じように作るの？",v:"最上級も同じように作るの？"},{w:"marisa",t:"似てるが少し違う。短い語は語尾に『−est』、長い語は前に『most』をつける。そして必ず単語の前に『the』をつけるんだぜ。",v:"似てるが少し違う。短い語は語尾にエスト、長い語は前にモストをつける。そして必ず単語の前にザをつけるんだぜ。"},{w:"reimu",t:"なんでtheが必要なの？",v:"なんでザが必要なの？"},{w:"marisa",t:"『一番』っていうのは、グループの中でただ1つに決まるものだからだ。theは『これだ！』って1つに絞るときに使う単語なんだぜ。",v:"一番っていうのは、グループの中でただ1つに決まるものだからだ。ザは、これだ！って1つに絞るときに使う単語なんだぜ。"},{w:"reimu",t:"比較級と最上級、両方わかった！もう一つの『同じくらい』の言い方も教えて。",v:"比較級と最上級、両方わかった！もう一つの、同じくらい、の言い方も教えて。"},{w:"marisa",t:"as〜asを使う。as tall as meなら『私と同じ背の高さ』だ。as とasの間には、変化させていない元の形（原級）を挟むぜ。",v:"アズ〜アズを使う。アズトールアズミーなら、私と同じ背の高さ、だ。アズとアズの間には、変化させていない元の形、原級を挟むぜ。"},{w:"reimu",t:"短い語はer/est、長い語はmore/most、同じくらいはas〜as。3つまとめて覚えたよ！",v:"短い語はアー、エスト、長い語はモア、モスト、同じくらいはアズ〜アズ。3つまとめて覚えたよ！"}],quiz:[{q:"tall の比較級は？",cs:["taller","more tall","tallest","talls"],a:0,f:"tallは短い語なので-erをつけてtaller。more tallは誤りだぜ。",d:1},{q:"good の比較級は？",cs:["better","gooder","more good","best"],a:0,f:"goodは不規則変化。good-better-bestと変化するぜ。暗記必須だ。",d:1},{q:"as tall as の意味は？",cs:["同じくらい高い","より高い","最も高い","低い"],a:0,f:"as 形容詞 asで『同じくらい〜』。原級(変化なし)を挟むぜ。",d:1},{q:"beautiful の比較級は？",cs:["more beautiful","beautifuler","most beautiful","beautifullest"],a:0,f:"長い語は前にmore。more beautifulだ。-erはつけないぜ。",d:2},{q:"最上級につける語は？",cs:["the","a","an","more"],a:0,f:"the tallestのように最上級にはtheをつける。『一番』は1つに決まるからだぜ。",d:2},{q:"bad の最上級は？",cs:["worst","baddest","most bad","worse"],a:0,f:"badは不規則。bad-worse-worstと変化するぜ。",d:2},{q:"the+比較級, the+比較級の意味は？",cs:["〜すればするほど…","最も〜","同じくらい","〜より"],a:0,f:"The harder you study, the better.で『勉強するほど良くなる』だぜ。",d:3},{q:"比較級を強調する muchの位置は？",cs:["比較級の前","後ろ","文末","文頭"],a:0,f:"much tallerのように比較級の前。veryは比較級には使えないので注意だぜ。",d:3}]},
  eng_07:{lesson:[{w:"reimu",t:"魔理沙、『仮定法過去』って、普通のifを使った文と何が違うの？",v:"魔理沙、仮定法過去って、普通のイフを使った文と何が違うの？"},{w:"marisa",t:"普通のifは『これから起こるかもしれないこと』を言うんだ。でも仮定法は『現実とは違うこと』を想像して言うときに使うぜ。",v:"普通のイフは、これから起こるかもしれないこと、を言うんだ。でも仮定法は、現実とは違うこと、を想像して言うときに使うぜ。"},{w:"reimu",t:"現実とは違うこと、っていうのがピンとこないな。",v:"現実とは違うこと、っていうのがピンとこないな。"},{w:"marisa",t:"例文で見てみるぜ。If I were a bird, I would fly to you.（もし鳥だったら、君のもとへ飛んでいくのに）。",v:"例文で見てみるぜ。イフアイワーアバード、アイウッドフライトゥーユー。もし鳥だったら、君のもとへ飛んでいくのに。"},{w:"reimu",t:"私は鳥じゃないから、これは『絶対起こらないこと』を想像してる文ってことね。",v:"私は鳥じゃないから、これは絶対起こらないことを想像してる文ってことね。"},{w:"marisa",t:"そうだ。『あり得ない・現実じゃない』ことを言うときに、仮定法というルールを使うんだぜ。",v:"そうだ。あり得ない、現実じゃないことを言うときに、仮定法というルールを使うんだぜ。"},{w:"reimu",t:"さっきの文、wereって出てきたけど、主語はIだよね？Iならwasじゃないの？",v:"さっきの文、ワーって出てきたけど、主語はアイだよね？アイならワズじゃないの？"},{w:"marisa",t:"そこが仮定法の特別ルールなんだ。仮定法では、主語がI/he/sheでも、be動詞は必ずwereを使うのが原則なんだぜ。",v:"そこが仮定法の特別ルールなんだ。仮定法では、主語がアイ、ヒー、シーでも、ビードウシは必ずワーを使うのが原則なんだぜ。"},{w:"reimu",t:"主語が何でもwere、これは覚えておくしかないルールってことね。",v:"主語が何でもワー、これは覚えておくしかないルールってことね。"},{w:"marisa",t:"そうだ。次は後半の『I would fly』の部分だ。このwouldはどういう意味だと思う？",v:"そうだ。次は後半のアイウッドフライの部分だ。このウッドはどういう意味だと思う？"},{w:"reimu",t:"『〜だろう』っていう未来の意味かと思ってた。",v:"〜だろう、っていう未来の意味かと思ってた。"},{w:"marisa",t:"近いが少し違う。仮定法でのwouldは『（現実じゃないけど）もしそうなら〜するだろうに』っていう、ありえない結果を表すんだぜ。",v:"近いが少し違う。仮定法でのウッドは、現実じゃないけど、もしそうなら〜するだろうに、っていう、ありえない結果を表すんだぜ。"},{w:"reimu",t:"would＋動詞の原形、って形で覚えればいいの？",v:"ウッド足す動詞の原形、って形で覚えればいいの？"},{w:"marisa",t:"そうだ。would flyのように、wouldの後ろは必ず動詞の原形だぜ。",v:"そうだ。ウッドフライのように、ウッドの後ろは必ず動詞の原形だぜ。"},{w:"reimu",t:"なんでwereとかwouldみたいな『過去の形』を使うの？現実のことじゃないのに。",v:"なんでワーとかウッドみたいな過去の形を使うの？現実のことじゃないのに。"},{w:"marisa",t:"いい疑問だ。これは時間が過去ってことじゃなくて、『現実から距離をとってる』っていう感覚を表してるんだぜ。",v:"いい疑問だ。これは時間が過去ってことじゃなくて、現実から距離をとってる、っていう感覚を表してるんだぜ。"},{w:"reimu",t:"時間の過去じゃなくて、現実との『距離』を過去形で表現してるんだね。",v:"時間の過去じゃなくて、現実との距離を過去形で表現してるんだね。"},{w:"marisa",t:"その理解で十分だ。まとめると、ifの中はwere、後半はwould＋原形。この2つのセットで『ありえない想像』を表すんだぜ。",v:"その理解で十分だ。まとめると、イフの中はワー、後半はウッド足す原形。この2つのセットで、ありえない想像、を表すんだぜ。"}],quiz:[{q:"仮定法過去が表すのは？",cs:["現在の事実と反対の仮定","過去の事実","未来の予定","現在進行"],a:0,f:"今の現実と違うことを想像する。『もし〜なら(実際は違う)』だぜ。",d:1},{q:"If I ___ a bird（仮定法）に入るのは？",cs:["were","am","was","be"],a:0,f:"仮定法では主語が何でもwereを使うのが原則。If I wereだぜ。",d:1},{q:"仮定法過去の主節の形は？",cs:["would+動詞原形","will+動詞","would+ing","did+動詞"],a:0,f:"would＋動詞の原形で『〜だろうに』。could/mightも使えるぜ。",d:1},{q:"If it rained, I would stay.の意味は？",cs:["雨なら家にいるのに(実際は降ってない)","雨が降った","雨が降る予定","毎回雨だ"],a:0,f:"現実と反対の仮定。実際には雨は降っていないことを含むぜ。",d:2},{q:"仮定法で使える助動詞は？",cs:["would/could/might","will/can","do/does","have"],a:0,f:"過去形の助動詞would/could/mightを使う。現在形は使わないぜ。",d:2},{q:"I wish I ___ taller.に入るのは？",cs:["were","am","will be","be"],a:0,f:"I wish+仮定法で『〜ならなあ』という願望。wereを使うぜ。",d:2},{q:"仮定法過去完了が表すのは？",cs:["過去の事実と反対の仮定","現在の仮定","未来","習慣"],a:0,f:"If I had+過去分詞で『あのとき〜だったら』。過去の後悔を表すぜ。",d:3},{q:"If節のifを省略すると？",cs:["倒置が起きる","変化なし","thatになる","whenになる"],a:0,f:"Were I rich...のようにwereを前に出す倒置が起きるぜ。",d:3}]},
  jpn_gen_01:{lesson:[{w:"reimu",t:"魔理沙、評論文を読んでると、筆者が何を主張したいのか途中で分からなくなっちゃうんだよね…。",v:"魔理沙、評論文を読んでると、筆者が何を主張したいのか途中で分からなくなっちゃうんだよね。"},{w:"marisa",t:"それなら『接続語』に注目するといいぜ。接続語っていうのは『しかし』『つまり』みたいな、文と文をつなぐ言葉だ。",v:"それなら接続語に注目するといいぜ。接続語っていうのは、しかし、つまり、みたいな、文と文をつなぐ言葉だ。"},{w:"reimu",t:"接続語に注目すると、何が分かるの？",v:"接続語に注目すると、何が分かるの？"},{w:"marisa",t:"接続語は『この後どういう内容が来るか』を予告してくれる、文章の道しるべなんだ。まず『しかし』『だが』みたいな逆接から見ていくぜ。",v:"接続語は、この後どういう内容が来るか、を予告してくれる、文章の道しるべなんだ。まず、しかし、だが、みたいな逆接から見ていくぜ。"},{w:"reimu",t:"逆接の後には、何が書かれてることが多いの？",v:"逆接の後には、何が書かれてることが多いの？"},{w:"marisa",t:"筆者の『本当に言いたいこと』が来やすいんだ。評論文には『一般にはAと思われる。しかし実はBだ』っていう型がよく出てくるぜ。",v:"筆者の本当に言いたいことが来やすいんだ。評論文には、一般にはエーと思われる、しかし実はビーだ、っていう型がよく出てくるぜ。"},{w:"reimu",t:"その型だと、AとBどっちが筆者の主張なの？",v:"その型だと、エーとビーどっちが筆者の主張なの？"},{w:"marisa",t:"Bの方だ。Aは『みんなが思ってる、よくある考え』、Bは『それを覆す筆者ならではの考え』ってことが多いんだぜ。",v:"ビーの方だ。エーは、みんなが思ってる、よくある考え、ビーは、それを覆す筆者ならではの考え、ってことが多いんだぜ。"},{w:"reimu",t:"だから逆接の『後ろ』に注目すればいいんだね。他の接続語はどう使うの？",v:"だから逆接の後ろに注目すればいいんだね。他の接続語はどう使うの？"},{w:"marisa",t:"『つまり』と『例えば』もよく出るぜ。この2つは役割が全然違うから、混同しないようにしろよ。",v:"つまり、と、例えば、もよく出るぜ。この2つは役割が全然違うから、混同しないようにしろよ。"},{w:"reimu",t:"どう違うの？",v:"どう違うの？"},{w:"marisa",t:"『つまり』の後は、それまで書いてきたことの『言い換え・まとめ』だ。『例えば』の後は、内容を分かりやすくするための『具体例』だぜ。",v:"つまり、の後は、それまで書いてきたことの言い換え、まとめだ。例えば、の後は、内容を分かりやすくするための具体例だぜ。"},{w:"reimu",t:"主張を探すなら、どっちに注目すればいいの？",v:"主張を探すなら、どっちに注目すればいいの？"},{w:"marisa",t:"『つまり』の後だ。具体例はあくまで『説明のための材料』にすぎない。具体例の部分だけ読んでも、筆者の主張そのものは掴めないぜ。",v:"つまり、の後だ。具体例はあくまで説明のための材料にすぎない。具体例の部分だけ読んでも、筆者の主張そのものは掴めないぜ。"},{w:"reimu",t:"具体例は『分かりやすくする道具』で、主張そのものじゃないってことね。",v:"具体例は、分かりやすくする道具で、主張そのものじゃないってことね。"},{w:"marisa",t:"そうだ。具体例を読んだら、必ず『つまりこれは何が言いたいんだ？』と自分に問いかけて、抽象的なまとめに戻る癖をつけろよ。",v:"そうだ。具体例を読んだら、必ず、つまりこれは何が言いたいんだ？と自分に問いかけて、抽象的なまとめに戻る癖をつけろよ。"},{w:"reimu",t:"『しかし』の後と『つまり』の後に注目すれば、主張が見えてくるんだね！",v:"しかし、の後と、つまり、の後に注目すれば、主張が見えてくるんだね！"},{w:"marisa",t:"その通り。接続語は『次に何が来るか』を教えてくれる標識だ。標識を見ながら読む癖がつけば、評論文はずっと読みやすくなるぜ。",v:"その通り。接続語は、次に何が来るか、を教えてくれる標識だ。標識を見ながら読む癖がつけば、評論文はずっと読みやすくなるぜ。"}],quiz:[{q:"逆接の接続語は？",cs:["しかし","だから","つまり","例えば"],a:0,f:"しかし、は前後で内容が逆転する逆接。後ろに主張が来やすいぜ。",d:1},{q:"具体例を示す語は？",cs:["例えば","ゆえに","しかし","また"],a:0,f:"例えば、の後は具体例。主張そのものではなく説明の材料だぜ。",d:1},{q:"言い換え・要約の語は？",cs:["つまり","しかし","ところで","および"],a:0,f:"つまり、の後は前の内容のまとめや言い換え。主張が凝縮されるぜ。",d:1},{q:"筆者の主張が表れやすい位置は？",cs:["逆接の後","具体例の中","序論の前","引用部分"],a:0,f:"『しかし』などの逆接の後に筆者の本音が来やすいぜ。",d:2},{q:"対比構造で大事なのは？",cs:["2つの違いを捉える","片方だけ読む","具体例を飛ばす","結論を無視"],a:0,f:"AとBを対比する文章は、両者の違いをはっきり掴むのが鍵だぜ。",d:2},{q:"『ゆえに』が示すのは？",cs:["順接・結論","逆接","並列","例示"],a:0,f:"ゆえに、は『だから』と同じ順接。前を理由に結論を導くぜ。",d:2},{q:"段落の要点を一文でまとめる力を？",cs:["要約力","暗記力","計算力","語彙力"],a:0,f:"各段落を一文に圧縮する要約力が評論読解の核心だぜ。",d:3},{q:"筆者が反対意見を挙げる狙いは？",cs:["反論して自説を強める","自説を否定","話をそらす","引用のため"],a:0,f:"あえて反対意見を出し、それに反論することで主張を補強するんだぜ。",d:3}]},
  jpn_gen_02:{lesson:[{w:"reimu",t:"魔理沙、小説の問題で『この時の登場人物の気持ちを答えよ』って聞かれるの、すごく苦手なんだよね…。",v:"魔理沙、小説の問題で、この時の登場人物の気持ちを答えよ、って聞かれるの、すごく苦手なんだよね。"},{w:"marisa",t:"それは無理もないぜ。小説では『悲しかった』みたいに気持ちがそのまま書かれることは、実は少ないんだ。",v:"それは無理もないぜ。小説では、悲しかった、みたいに気持ちがそのまま書かれることは、実は少ないんだ。"},{w:"reimu",t:"直接書いてないなら、どうやって気持ちを当てればいいの？",v:"直接書いてないなら、どうやって気持ちを当てればいいの？"},{w:"marisa",t:"文章のあちこちにある『手がかり』を集めて推理するんだ。手がかりは大きく3つある。",v:"文章のあちこちにある手がかりを集めて推理するんだ。手がかりは大きく3つある。"},{w:"reimu",t:"3つ、教えて！",v:"3つ、教えて！"},{w:"marisa",t:"1つ目は『行動』だ。何をしたか。2つ目は『表情やしぐさ』、顔つきや動作だ。3つ目は『情景描写』、つまり景色の描かれ方だぜ。",v:"1つ目は行動だ。何をしたか。2つ目は表情やしぐさ、顔つきや動作だ。3つ目は情景描写、つまり景色の描かれ方だぜ。"},{w:"reimu",t:"行動や表情はなんとなく分かるけど、景色の描き方が気持ちに関係あるの？",v:"行動や表情はなんとなく分かるけど、景色の描き方が気持ちに関係あるの？"},{w:"marisa",t:"大ありだ。作者は景色を借りて、こっそり気持ちを表現することがよくあるんだぜ。",v:"大ありだ。作者は景色を借りて、こっそり気持ちを表現することがよくあるんだぜ。"},{w:"reimu",t:"例えばどんな感じ？",v:"例えばどんな感じ？"},{w:"marisa",t:"『空が晴れ渡った』という描写があれば、登場人物の心も晴れやかなことが多い。『冷たい雨が降る』なら、心が沈んでいることが多いぜ。",v:"空が晴れ渡った、という描写があれば、登場人物の心も晴れやかなことが多い。冷たい雨が降る、なら、心が沈んでいることが多いぜ。"},{w:"reimu",t:"景色が、登場人物の心を映す鏡みたいになってるんだね。",v:"景色が、登場人物の心を映す鏡みたいになってるんだね。"},{w:"marisa",t:"いい表現だ、その通りだぜ。あと『表現技法』にも目を向けると、もっと深く読めるようになる。",v:"いい表現だ、その通りだぜ。あと表現技法にも目を向けると、もっと深く読めるようになる。"},{w:"reimu",t:"表現技法って？",v:"表現技法って？"},{w:"marisa",t:"比喩（〜のようだ、と例える）、擬人法（物を人みたいに描く）、倒置法（語順を入れ替える）とかだ。これらは作者が『ここを強調したい』ってときに使う道具だぜ。",v:"比喩、〜のようだ、と例える、擬人法、物を人みたいに描く、倒置法、語順を入れ替える、とかだ。これらは作者が、ここを強調したい、ってときに使う道具だぜ。"},{w:"reimu",t:"技法が使われてる場所は、特に注目した方がいいんだね。",v:"技法が使われてる場所は、特に注目した方がいいんだね。"},{w:"marisa",t:"そうだ。最後に1つ、テストで一番よく聞かれるパターンを教えるぜ。それは『心情の変化』だ。",v:"そうだ。最後に1つ、テストで一番よく聞かれるパターンを教えるぜ。それは心情の変化だ。"},{w:"reimu",t:"心情の変化って、気持ちが途中で変わるってこと？",v:"心情の変化って、気持ちが途中で変わるってこと？"},{w:"marisa",t:"そうだ。何か出来事が起きて、その『前』と『後』で気持ちがどう動いたかが、よく問題にされるんだぜ。",v:"そうだ。何か出来事が起きて、その前と後で気持ちがどう動いたかが、よく問題にされるんだぜ。"},{w:"reimu",t:"出来事の前後を比べる、っていう読み方をすればいいんだね。",v:"出来事の前後を比べる、っていう読み方をすればいいんだね。"},{w:"marisa",t:"そうだ。『行動』『表情』『情景』の3つの手がかりを拾いながら、出来事の前後で気持ちがどう変わったかを追っていく。これが小説読解の基本だぜ。",v:"そうだ。行動、表情、情景の3つの手がかりを拾いながら、出来事の前後で気持ちがどう変わったかを追っていく。これが小説読解の基本だぜ。"}],quiz:[{q:"『〜のようだ』で
