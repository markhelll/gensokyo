  world_05:{lesson:[{w:"reimu",t:"魔理沙、『市民革命』ってよく聞く言葉だけど、どういう革命のことなの？",v:"魔理沙、市民革命ってよく聞く言葉だけど、どういう革命のことなの？"},{w:"marisa",t:"市民革命は、それまで王様が思い通りに国を支配していた『専制政治』を、一般の市民たちが倒した革命のことだぜ。",v:"市民革命は、それまで王様が思い通りに国を支配していた専制政治を、一般の市民たちが倒した革命のことだぜ。"},{w:"reimu",t:"市民たちは、革命を通して何を手に入れたの？",v:"市民たちは、革命を通して何を手に入れたの？"},{w:"marisa",t:"『自由』や『権利』を勝ち取ったんだ。この市民革命こそが、今のような近代社会が始まるきっかけになったんだぜ。",v:"自由や権利を勝ち取ったんだ。この市民革命こそが、今のような近代社会が始まるきっかけになったんだぜ。"},{w:"reimu",t:"代表的な市民革命って、どんなものがあるの？",v:"代表的な市民革命って、どんなものがあるの？"},{w:"marisa",t:"3つ覚えておけば十分だ。イギリスの名誉革命、アメリカの独立、そしてフランス革命だぜ。",v:"3つ覚えておけば十分だ。イギリスの名誉革命、アメリカの独立、そしてフランス革命だぜ。"},{w:"reimu",t:"フランス革命のスローガンって、何だか有名だよね？",v:"フランス革命のスローガンって、何だか有名だよね？"},{w:"marisa",t:"『自由・平等・友愛』だ。1789年、人々が立ち上がって絶対王政を倒し、『人権宣言』っていう大事な宣言を出したんだぜ。",v:"自由、平等、友愛だ。1789年、人々が立ち上がって絶対王政を倒し、人権宣言っていう大事な宣言を出したんだぜ。"},{w:"reimu",t:"こういう革命の考え方は、どこから生まれてきたの？",v:"こういう革命の考え方は、どこから生まれてきたの？"},{w:"marisa",t:"『啓蒙思想』っていう新しい考え方が土台になってるぜ。ロックやルソーという思想家が広めたものだ。",v:"啓蒙思想っていう新しい考え方が土台になってるぜ。ロックやルソーという思想家が広めたものだ。"},{w:"reimu",t:"啓蒙思想って、どんな考え方なの？",v:"啓蒙思想って、どんな考え方なの？"},{w:"marisa",t:"『人は生まれながらに、誰にも奪われない権利を持っている』という考え方だ。これを『自然権』と呼ぶぜ。",v:"人は生まれながらに、誰にも奪われない権利を持っている、という考え方だ。これを自然権と呼ぶぜ。"},{w:"reimu",t:"今では当たり前に思えるけど、当時はすごく新しい考え方だったんだろうね。",v:"今では当たり前に思えるけど、当時はすごく新しい考え方だったんだろうね。"},{w:"marisa",t:"その通りだ。それまでは『王様は神様から特別な力を与えられている』っていう考え方が普通だったからな。",v:"その通りだ。それまでは王様は神様から特別な力を与えられている、っていう考え方が普通だったからな。"},{w:"reimu",t:"啓蒙思想が広まると、王様の支配は、どう見られるようになったの？",v:"啓蒙思想が広まると、王様の支配は、どう見られるようになったの？"},{w:"marisa",t:"『王様が支配するのが当然』という考えに、人々が疑問を持つようになったんだ。そして『国を治める力は人民にある』という『人民主権』の考え方につながっていくぜ。",v:"王様が支配するのが当然、という考えに、人々が疑問を持つようになったんだ。そして国を治める力は人民にある、という人民主権の考え方につながっていくぜ。"},{w:"reimu",t:"啓蒙思想が、王の支配を疑う気持ちを生んで、それが市民革命というアクションにつながったんだね。",v:"啓蒙思想が、王の支配を疑う気持ちを生んで、それが市民革命というアクションにつながったんだね。"},{w:"marisa",t:"そうだ。『新しい考え方（啓蒙思想）→王の支配への疑問→市民革命→自由と権利の獲得』という流れを押さえておくと、近代史全体がつながって見えてくるぜ。",v:"そうだ。新しい考え方、啓蒙思想、王の支配への疑問、市民革命、自由と権利の獲得、という流れを押さえておくと、近代史全体がつながって見えてくるぜ。"},{w:"reimu",t:"思想という、目に見えないものが、実際に世界を変える革命を引き起こしたんだね！",v:"思想という、目に見えないものが、実際に世界を変える革命を引き起こしたんだね！"}],quiz:[{q:"フランス革命のスローガンは？",cs:["自由・平等・友愛","富国強兵","王権神授","鎖国攘夷"],a:0,f:"自由・平等・友愛(博愛)。近代の理念を象徴する言葉だぜ。",d:1},{q:"アメリカ独立宣言が出された年は？",cs:["1776年","1789年","1688年","1804年"],a:0,f:"1776年。イギリスからの独立を宣言したぜ。",d:1},{q:"フランス革命が始まった年は？",cs:["1789年","1776年","1688年","1815年"],a:0,f:"1789年のバスティーユ牢獄襲撃が革命の始まりだぜ。",d:1},{q:"イギリス名誉革命(1688)の結果は？",cs:["立憲君主制と権利章典","共和政","絶対王政","帝政"],a:0,f:"権利章典で議会が王より優位の立憲君主制が確立したぜ。",d:2},{q:"アメリカ独立戦争の相手国は？",cs:["イギリス","フランス","スペイン","オランダ"],a:0,f:"宗主国イギリスから独立を勝ち取ったぜ。",d:2},{q:"フランス人権宣言が示したのは？",cs:["人間の自由と平等の権利","王の絶対権","教会支配","身分制"],a:0,f:"人は生まれながら自由で平等という近代人権の原則を宣言したぜ。",d:2},{q:"市民革命を支えた思想は？",cs:["啓蒙思想(ロック・ルソー)","王権神授説","封建思想","重商主義"],a:0,f:"人民主権や自然権を説く啓蒙思想が革命の理論的支柱だぜ。",d:3},{q:"ナポレオンの功績の一つは？",cs:["ナポレオン法典の制定","王政復古","鎖国","十字軍"],a:0,f:"法の下の平等などを定めた法典で、近代法に影響を与えたぜ。",d:3}]},
  world_06:{lesson:[{w:"reimu",t:"魔理沙、『産業革命』ってどこで始まったの？",v:"魔理沙、産業革命ってどこで始まったの？"},{w:"marisa",t:"18世紀のイギリスで始まったんだぜ。きっかけになったのは、ワットという人が改良した『蒸気機関』だ。",v:"18世紀のイギリスで始まったんだぜ。きっかけになったのは、ワットという人が改良した蒸気機関だ。"},{w:"reimu",t:"蒸気機関があると、それまでと何が変わるの？",v:"蒸気機関があると、それまでと何が変わるの？"},{w:"marisa",t:"それまで人の手で行っていた作業を、機械の力で行えるようになるんだ。『手作業』から『機械生産』への大転換だぜ。",v:"それまで人の手で行っていた作業を、機械の力で行えるようになるんだ。手作業から機械生産への大転換だぜ。"},{w:"reimu",t:"特にどんな産業が発展したの？",v:"特にどんな産業が発展したの？"},{w:"marisa",t:"『綿織物工業』が一気に発展したぜ。布を作る作業が機械化されて、ものすごい量の布を短時間で作れるようになったんだ。",v:"綿織物工業が一気に発展したぜ。布を作る作業が機械化されて、ものすごい量の布を短時間で作れるようになったんだ。"},{w:"reimu",t:"機械で作れるようになると、社会の仕組みにも変化があったの？",v:"機械で作れるようになると、社会の仕組みにも変化があったの？"},{w:"marisa",t:"あったぜ。工場を持って経営する『資本家』と、その工場で働く『労働者』という、2つの新しい階級が生まれたんだ。",v:"あったぜ。工場を持って経営する資本家と、その工場で働く労働者という、2つの新しい階級が生まれたんだ。"},{w:"reimu",t:"資本家と労働者、それぞれの立場は何が違うの？",v:"資本家と労働者、それぞれの立場は何が違うの？"},{w:"marisa",t:"資本家は工場や機械を所有してお金を出す側、労働者は実際にそこで働いて賃金をもらう側、という違いがあるんだぜ。",v:"資本家は工場や機械を所有してお金を出す側、労働者は実際にそこで働いて賃金をもらう側、という違いがあるんだぜ。"},{w:"reimu",t:"産業革命のあと、『帝国主義』っていう言葉も出てくるよね。これはどう関係してるの？",v:"産業革命のあと、帝国主義っていう言葉も出てくるよね。これはどう関係してるの？"},{w:"marisa",t:"工業が発展すると、製品をたくさん作れるようになる。すると今度は『材料をどこから手に入れるか』『作った製品をどこで売るか』が問題になるんだぜ。",v:"工業が発展すると、製品をたくさん作れるようになる。すると今度は、材料をどこから手に入れるか、作った製品をどこで売るか、が問題になるんだぜ。"},{w:"reimu",t:"材料の調達先や、製品の販売先が必要になったってことね。",v:"材料の調達先や、製品の販売先が必要になったってことね。"},{w:"marisa",t:"そうだ。そこで工業国（イギリスなど）は、アジアやアフリカを『植民地』にして、材料の調達先・製品の販売先として利用するようになったんだぜ。",v:"そうだ。そこで工業国、イギリスなどは、アジアやアフリカを植民地にして、材料の調達先、製品の販売先として利用するようになったんだぜ。"},{w:"reimu",t:"植民地を取り合うようになると、国どうしの関係はどうなるの？",v:"植民地を取り合うようになると、国どうしの関係はどうなるの？"},{w:"marisa",t:"いろんな国が植民地を奪い合うようになって、国際的な緊張が高まっていったんだ。これが、やがて『第一次世界大戦』が起きる、遠い原因の1つにもなるんだぜ。",v:"いろんな国が植民地を奪い合うようになって、国際的な緊張が高まっていったんだ。これが、やがて第一次世界大戦が起きる、遠い原因の1つにもなるんだぜ。"},{w:"reimu",t:"蒸気機関の発明から始まって、工業の発展、社会の階級分化、植民地争い、そして世界大戦まで、長い連鎖があるんだね！",v:"蒸気機関の発明から始まって、工業の発展、社会の階級分化、植民地争い、そして世界大戦まで、長い連鎖があるんだね！"}],quiz:[{q:"産業革命が最初に起きた国は？",cs:["イギリス","フランス","ドイツ","アメリカ"],a:0,f:"18世紀のイギリスで世界初の産業革命が起きたぜ。",d:1},{q:"産業革命の動力源は？",cs:["蒸気機関","電気","原子力","水車のみ"],a:0,f:"ワットが改良した蒸気機関が機械を動かしたぜ。",d:1},{q:"帝国主義の主な目的は？",cs:["植民地の獲得","平和","宗教布教のみ","文化交流"],a:0,f:"工業に必要な原料と製品を売る市場を求めた植民地拡大だぜ。",d:1},{q:"産業革命で最初に発展した産業は？",cs:["綿工業","農業","漁業","林業"],a:0,f:"紡績機や織機の発明で綿織物工業が急成長したぜ。",d:2},{q:"産業革命が生んだ社会の変化は？",cs:["資本家と労働者の階級が出現","身分制強化","農村回帰","鎖国"],a:0,f:"工場を持つ資本家と賃金で働く労働者という階級が生まれたぜ。",d:2},{q:"帝国主義で列強が進出した地域は？",cs:["アジア・アフリカ","ヨーロッパのみ","北極","南極"],a:0,f:"原料と市場を求めアジアやアフリカを植民地化したぜ。",d:2},{q:"産業革命がもたらした問題は？",cs:["労働問題や環境問題","人口減少","農業崩壊のみ","鎖国"],a:0,f:"低賃金・長時間労働や、工場による公害などが生じたぜ。",d:3},{q:"列強の植民地争奪が招いたものは？",cs:["国際的緊張(第一次大戦の遠因)","永久平和","鎖国","封建復活"],a:0,f:"植民地をめぐる対立が高まり、世界大戦の遠因になったぜ。",d:3}]},
  geo_01:{lesson:[{w:"reimu",t:"魔理沙、『緯度』と『経度』って、いつもどっちがどっちか混乱しちゃうんだよね…。",v:"魔理沙、緯度と経度って、いつもどっちがどっちか混乱しちゃうんだよね。"},{w:"marisa",t:"区別の仕方はシンプルだ。『緯度』は南北の位置、『経度』は東西の位置を表してるんだぜ。",v:"区別の仕方はシンプルだ。緯度は南北の位置、経度は東西の位置を表してるんだぜ。"},{w:"reimu",t:"それぞれ、どこが基準の0度になるの？",v:"それぞれ、どこが基準の0度になるの？"},{w:"marisa",t:"緯度の基準は『赤道』、これが緯度0度だ。経度の基準は、イギリスを通る『本初子午線』、これが経度0度になるぜ。",v:"緯度の基準は赤道、これが緯度0度だ。経度の基準は、イギリスを通る本初子午線、これが経度0度になるぜ。"},{w:"reimu",t:"この緯度・経度って、『時差』にも関係あるの？",v:"この緯度、経度って、時差にも関係あるの？"},{w:"marisa",t:"経度がすごく関係あるぜ。地球は1日、つまり24時間で1回転している。回転の角度は360度だ。",v:"経度がすごく関係あるぜ。地球は1日、つまり24時間で1回転している。回転の角度は360度だ。"},{w:"reimu",t:"24時間で360度、ってことは、1時間あたりだとどれくらい回るの？",v:"24時間で360度、ってことは、1時間あたりだとどれくらい回るの？"},{w:"marisa",t:"360を24で割ればいい。360÷24=15だ。つまり、経度が15度違うごとに、時間が1時間ずれるんだぜ。",v:"360を24で割ればいい。360わる24は15だ。つまり、経度が15度違うごとに、時間が1時間ずれるんだぜ。"},{w:"reimu",t:"日本の標準時って、どの経度が基準になってるの？",v:"日本の標準時って、どの経度が基準になってるの？"},{w:"marisa",t:"日本は東経135度を基準にしてる。これは兵庫県の明石市を通る経線なんだぜ。",v:"日本は東経135度を基準にしてる。これは兵庫県の明石市を通る経線なんだぜ。"},{w:"reimu",t:"『日付変更線』っていう言葉も聞くけど、これは何なの？",v:"日付変更線っていう言葉も聞くけど、これは何なの？"},{w:"marisa",t:"経度180度のあたりに引かれている、特別な線だ。この線をまたいで進むと、日付が1日変わるんだぜ。",v:"経度180度のあたりに引かれている、特別な線だ。この線をまたいで進むと、日付が1日変わるんだぜ。"},{w:"reimu",t:"なんで180度の場所に、そんな特別な線を引く必要があるの？",v:"なんで180度の場所に、そんな特別な線を引く必要があるの？"},{w:"marisa",t:"東に進むほど時間が進んでいく。地球を1周してしまうと、計算上『1日分のズレ』が生まれてしまう。それを調整するための線なんだぜ。",v:"東に進むほど時間が進んでいく。地球を1周してしまうと、計算上1日分のズレが生まれてしまう。それを調整するための線なんだぜ。"},{w:"reimu",t:"実際に2つの地点の時差を計算するときは、どうすればいいの？",v:"実際に2つの地点の時差を計算するときは、どうすればいいの？"},{w:"marisa",t:"2つの地点の経度の差を求めて、それを15で割るだけだ。さっきの『15度で1時間』の関係を使うんだぜ。",v:"2つの地点の経度の差を求めて、それを15で割るだけだ。さっきの15度で1時間の関係を使うんだぜ。"},{w:"reimu",t:"経度の差を15で割れば時差が出る、っていう公式さえ覚えておけば、どんな2点間の時差も計算できるんだね！",v:"経度の差を15で割れば時差が出る、っていう公式さえ覚えておけば、どんな2点間の時差も計算できるんだね！"}],quiz:[{q:"赤道からの南北の位置は？",cs:["緯度","経度","標高","方位"],a:0,f:"緯度が南北の位置を表す。赤道が0度だぜ。",d:1},{q:"本初子午線が通る都市は？",cs:["ロンドン","東京","パリ","ニューヨーク"],a:0,f:"イギリスのロンドン(旧グリニッジ天文台)を通り経度0度の基準だぜ。",d:1},{q:"経度何度で1時間の時差？",cs:["15度","30度","45度","10度"],a:0,f:"360度÷24時間=15度。15度ごとに1時間ずれるぜ。",d:1},{q:"日本の標準時の経度は？",cs:["東経135度","東経120度","東経150度","東経100度"],a:0,f:"兵庫県明石市を通る東経135度が日本の基準だぜ。",d:2},{q:"経度差90度の時差は？",cs:["6時間","3時間","9時間","12時間"],a:0,f:"90÷15=6時間。経度差を15で割れば時差が出るぜ。",d:2},{q:"日付変更線はおよそ経度何度？",cs:["180度","0度","90度","135度"],a:0,f:"経度180度付近。またぐと日付が1日変わるぜ。",d:2},{q:"東経135度が正午のとき経度0度は？",cs:["午前3時","午後9時","正午","午後3時"],a:0,f:"135÷15=9時間差。西は時間が遅れるので正午−9時間=午前3時だぜ。",d:3},{q:"メルカトル図法の特徴は？",cs:["角度が正確だが高緯度ほど面積が拡大","面積が正確","距離が正確","全て正確"],a:0,f:"航海用で角度は正しいが、高緯度ほど実際より大きく描かれるぜ。",d:3}]},
  geo_02:{lesson:[{w:"reimu",t:"魔理沙、世界の気候って『熱帯』とか『寒帯』みたいに分かれてるけど、これってどうやって決めてるの？",v:"魔理沙、世界の気候って熱帯とか寒帯みたいに分かれてるけど、これってどうやって決めてるの？"},{w:"marisa",t:"ケッペンという学者が、2つのデータを基準にして世界の気候を分類したんだぜ。",v:"ケッペンという学者が、2つのデータを基準にして世界の気候を分類したんだぜ。"},{w:"reimu",t:"その2つのデータって何？",v:"その2つのデータって何？"},{w:"marisa",t:"『気温』と『降水量』だ。この2つの組み合わせ方で、世界の気候を大きく5つのグループに分けたんだぜ。",v:"気温と降水量だ。この2つの組み合わせ方で、世界の気候を大きく5つのグループに分けたんだぜ。"},{w:"reimu",t:"5つのグループって、それぞれ何なの？",v:"5つのグループって、それぞれ何なの？"},{w:"marisa",t:"熱帯・乾燥帯・温帯・冷帯（亜寒帯）・寒帯の5つだ。これは赤道から北極や南極に向かって、順番に並んでいくイメージだぜ。",v:"熱帯、乾燥帯、温帯、冷帯、寒帯の5つだ。これは赤道から北極や南極に向かって、順番に並んでいくイメージだぜ。"},{w:"reimu",t:"赤道に近いところから順に説明してくれる？",v:"赤道に近いところから順に説明してくれる？"},{w:"marisa",t:"まず赤道周辺の『熱帯』。これは1年中暑い気候だ。逆に北極や南極周辺の『寒帯』は1年中寒い気候だぜ。",v:"まず赤道周辺の熱帯。これは1年中暑い気候だ。逆に北極や南極周辺の寒帯は1年中寒い気候だぜ。"},{w:"reimu",t:"熱帯と寒帯は、両極端な気候ってことだね。間の『温帯』はどんな感じなの？",v:"熱帯と寒帯は、両極端な気候ってことだね。間の温帯はどんな感じなの？"},{w:"marisa",t:"温帯は熱帯と寒帯の『中間』の気候だ。日本のように、はっきりした四季があるのが特徴だぜ。",v:"温帯は熱帯と寒帯の中間の気候だ。日本のように、はっきりした四季があるのが特徴だぜ。"},{w:"reimu",t:"気温だけじゃなく、『降水量』も関係してくる気候帯はあるの？",v:"気温だけじゃなく、降水量も関係してくる気候帯はあるの？"},{w:"marisa",t:"あるぜ。『乾燥帯』だ。これは雨がとても少ない場所のことで、砂漠が広がっていることが多いんだぜ。",v:"あるぜ。乾燥帯だ。これは雨がとても少ない場所のことで、砂漠が広がっていることが多いんだぜ。"},{w:"reimu",t:"なるほど、気温だけじゃなくて、雨の量も気候を決める大事な要素なんだね。",v:"なるほど、気温だけじゃなくて、雨の量も気候を決める大事な要素なんだね。"},{w:"marisa",t:"そうだ。気温と降水量、両方の組み合わせを見ることで、より細かく気候を分類できるようになるんだぜ。",v:"そうだ。気温と降水量、両方の組み合わせを見ることで、より細かく気候を分類できるようになるんだぜ。"},{w:"reimu",t:"日本は、この5つのうちどの気候帯に入るの？",v:"日本は、この5つのうちどの気候帯に入るの？"},{w:"marisa",t:"日本の大部分は『温帯』だ。特に『温暖湿潤気候』っていう、もう少し細かい種類に分類されるぜ。",v:"日本の大部分は温帯だ。特に温暖湿潤気候っていう、もう少し細かい種類に分類されるぜ。"},{w:"reimu",t:"『温暖湿潤気候』って、どんな特徴があるの？",v:"温暖湿潤気候って、どんな特徴があるの？"},{w:"marisa",t:"四季がはっきりしていて、しかも雨も多いのが特徴だ。日本の天気って、まさにそんな感じだろ？",v:"四季がはっきりしていて、しかも雨も多いのが特徴だ。日本の天気って、まさにそんな感じだろ？"},{w:"reimu",t:"確かに、日本は四季もあるし、雨もよく降るもんね。気温と降水量、この2つの視点で世界を見ると、気候の違いが分かりやすくなるね！",v:"確かに、日本は四季もあるし、雨もよく降るもんね。気温と降水量、この2つの視点で世界を見ると、気候の違いが分かりやすくなるね！"}],quiz:[{q:"気候区分を作った学者は？",cs:["ケッペン","メルカトル","コロンブス","ダーウィン"],a:0,f:"ドイツのケッペンが気温と降水量で気候を分類したぜ。",d:1},{q:"一年中暑い気候帯は？",cs:["熱帯","寒帯","冷帯","乾燥帯"],a:0,f:"赤道付近の熱帯。一年を通して高温だぜ。",d:1},{q:"日本の大部分の気候帯は？",cs:["温帯","熱帯","寒帯","乾燥帯"],a:0,f:"温帯。四季があり過ごしやすい気候だぜ。",d:1},{q:"砂漠が広がる気候帯は？",cs:["乾燥帯","熱帯","温帯","冷帯"],a:0,f:"降水量が極端に少ない乾燥帯に砂漠が広がるぜ。",d:2},{q:"気候区分の2大要素は？",cs:["気温と降水量","標高と緯度","風と海流","土壌と植生"],a:0,f:"ケッペンは気温と降水量の組み合わせで分類したぜ。",d:2},{q:"熱帯雨林気候の特徴は？",cs:["一年中高温多雨","乾燥","寒冷","四季"],a:0,f:"年中高温で雨が多く、密林(熱帯雨林)が広がるぜ。",d:2},{q:"地中海性気候の特徴は？",cs:["夏は乾燥し冬に雨が降る","夏に雨・冬乾燥","年中多雨","年中乾燥"],a:0,f:"夏は乾いてオリーブ栽培、冬に雨が降るのが特徴だぜ。",d:3},{q:"冷帯(亜寒帯)が分布するのは？",cs:["北半球の高緯度","赤道付近","南半球","砂漠"],a:0,f:"主にユーラシアや北米の北半球高緯度に広がるぜ。",d:3}]},
  geo_03:{lesson:[{w:"reimu",t:"魔理沙、日本の地形ってどんな特徴があるの？",v:"魔理沙、日本の地形ってどんな特徴があるの？"},{w:"marisa",t:"一番の特徴は『山がとても多い』ことだぜ。日本の国土のうち、なんと約4分の3が山地なんだ。",v:"一番の特徴は山がとても多いことだぜ。日本の国土のうち、なんと約4分の3が山地なんだ。"},{w:"reimu",t:"4分の3も山地だと、平らな土地はあまりないんだね。",v:"4分の3も山地だと、平らな土地はあまりないんだね。"},{w:"marisa",t:"そうだ。平野（平らな場所）はかなり狭いんだぜ。この『山が多い』っていう特徴が、他のいろんな地形にも影響してるんだ。",v:"そうだ。平野、平らな場所はかなり狭いんだぜ。この山が多いっていう特徴が、他のいろんな地形にも影響してるんだ。"},{w:"reimu",t:"例えば、どんな影響があるの？",v:"例えば、どんな影響があるの？"},{w:"marisa",t:"『川』への影響がわかりやすいぜ。日本は山地が多くて国土も狭いから、川の長さがとても短くなるんだ。",v:"川への影響がわかりやすいぜ。日本は山地が多くて国土も狭いから、川の長さがとても短くなるんだ。"},{w:"reimu",t:"川が短いと、流れ方にも違いが出るの？",v:"川が短いと、流れ方にも違いが出るの？"},{w:"marisa",t:"出るぜ。短い距離で山から海まで一気に下るから、流れがとても速い『急流』になるんだ。大陸の大きな川みたいに、ゆったり流れることは少ないんだぜ。",v:"出るぜ。短い距離で山から海まで一気に下るから、流れがとても速い急流になるんだ。大陸の大きな川みたいに、ゆったり流れることは少ないんだぜ。"},{w:"reimu",t:"海岸線の様子も、何か特徴があるの？",v:"海岸線の様子も、何か特徴があるの？"},{w:"marisa",t:"あるぜ。日本には、複雑に入り組んだ『リアス海岸』という海岸がある。三陸海岸が特に有名だぜ。",v:"あるぜ。日本には、複雑に入り組んだリアス海岸という海岸がある。三陸海岸が特に有名だぜ。"},{w:"reimu",t:"入り組んでると、何か良いことがあるの？",v:"入り組んでると、何か良いことがあるの？"},{w:"marisa",t:"波が穏やかな入り江ができるから、船を停めやすい『良い漁港』になりやすいんだぜ。",v:"波が穏やかな入り江ができるから、船を停めやすい良い漁港になりやすいんだぜ。"},{w:"reimu",t:"地形の話はわかった！気候についても教えて。",v:"地形の話はわかった！気候についても教えて。"},{w:"marisa",t:"日本は南北にすごく長い国だから、地域による気候の違いが大きいんだ。さらに『季節風（モンスーン）』の影響も強く受けるぜ。",v:"日本は南北にすごく長い国だから、地域による気候の違いが大きいんだ。さらに季節風、モンスーンの影響も強く受けるぜ。"},{w:"reimu",t:"季節風って、季節によって吹く方向が変わる風のことだよね？",v:"季節風って、季節によって吹く方向が変わる風のことだよね？"},{w:"marisa",t:"そうだ。冬は『北西』から吹いてくる。この風が日本海の上を通るとき、たくさんの水分を吸い込むんだぜ。",v:"そうだ。冬は北西から吹いてくる。この風が日本海の上を通るとき、たくさんの水分を吸い込むんだぜ。"},{w:"reimu",t:"水分を吸い込んだ風は、その後どうなるの？",v:"水分を吸い込んだ風は、その後どうなるの？"},{w:"marisa",t:"日本海側にぶつかって、たくさんの『雪』を降らせるんだ。だから日本海側の地域は、冬に大雪になりやすいんだぜ。",v:"日本海側にぶつかって、たくさんの雪を降らせるんだ。だから日本海側の地域は、冬に大雪になりやすいんだぜ。"},{w:"reimu",t:"夏は、季節風の向きが変わるんだよね？",v:"夏は、季節風の向きが変わるんだよね？"},{w:"marisa",t:"そうだ。夏は『南東』から季節風が吹く。これが太平洋側を蒸し暑くする原因になるんだぜ。",v:"そうだ。夏は南東から季節風が吹く。これが太平洋側を蒸し暑くする原因になるんだぜ。"},{w:"reimu",t:"『山が多い→川が急流、複雑な海岸』、『季節風→日本海側は雪、太平洋側は蒸し暑い』。地形と気候、それぞれの理由がつながって理解できたよ！",v:"山が多い、川が急流、複雑な海岸、季節風、日本海側は雪、太平洋側は蒸し暑い。地形と気候、それぞれの理由がつながって理解できたよ！"}],quiz:[{q:"日本の国土で山地が占める割合は約？",cs:["4分の3","2分の1","4分の1","全部"],a:0,f:"およそ75%が山地。平野が少ないのが日本の特徴だぜ。",d:1},{q:"日本の川の特徴は？",cs:["短くて急流","長く緩やか","水量が一定","凍る"],a:0,f:"山がちで国土が狭いため、川は短く流れが急だぜ。",d:1},{q:"複雑に入り組んだ海岸を何という？",cs:["リアス海岸","砂浜海岸","断崖","干潟"],a:0,f:"のこぎりの歯のように入り組んだリアス海岸だぜ。",d:1},{q:"日本の気候に影響する風は？",cs:["季節風(モンスーン)","偏西風のみ","貿易風","無風"],a:0,f:"夏と冬で向きが変わる季節風が気候を大きく左右するぜ。",d:2},{q:"日本海側の冬の特徴は？",cs:["雪が多い","乾燥","高温","無風"],a:0,f:"北西の季節風が水分を含み、日本海側に大雪を降らせるぜ。",d:2},{q:"太平洋側の夏の特徴は？",cs:["高温多雨","乾燥","降雪","寒冷"],a:0,f:"南東の季節風で蒸し暑く、雨が多くなるぜ。",d:2},{q:"扇状地ができる場所は？",cs:["山地から平地への出口","河口","海岸","山頂"],a:0,f:"川が山から平地に出る所に土砂が扇形に積もってできるぜ。",d:3},{q:"三角州ができる場所は？",cs:["河口付近","山地","台地","盆地"],a:0,f:"川が海に注ぐ河口に細かい土砂が積もってできる平地だぜ。",d:3}]},
  geo_04:{lesson:[{w:"reimu",t:"魔理沙、世界にはいろんな種類の農業があるよね？なんでそんなに違いがあるの？",v:"魔理沙、世界にはいろんな種類の農業があるよね？なんでそんなに違いがあるの？"},{w:"marisa",t:"その土地の『気候』や『歴史』に合わせて、それぞれ違う形に発達してきたからだぜ。地域ごとに見ていくぞ。",v:"その土地の気候や歴史に合わせて、それぞれ違う形に発達してきたからだぜ。地域ごとに見ていくぞ。"},{w:"reimu",t:"まずは日本がある、モンスーンアジアから教えて。",v:"まずは日本がある、モンスーンアジアから教えて。"},{w:"marisa",t:"モンスーンアジアは雨がたくさん降るのが特徴だ。だから、たくさんの水を必要とする『稲作』が盛んになったんだぜ。",v:"モンスーンアジアは雨がたくさん降るのが特徴だ。だから、たくさんの水を必要とする稲作が盛んになったんだぜ。"},{w:"reimu",t:"雨の量が、農業の種類を決めてるんだね。ヨーロッパはどうなの？",v:"雨の量が、農業の種類を決めてるんだね。ヨーロッパはどうなの？"},{w:"marisa",t:"ヨーロッパでは『混合農業』が中心だ。これは『作物を育てること』と『家畜を育てること』を組み合わせた農業なんだぜ。",v:"ヨーロッパでは混合農業が中心だ。これは作物を育てることと家畜を育てることを組み合わせた農業なんだぜ。"},{w:"reimu",t:"組み合わせる、っていうのは、具体的にどういうことなの？",v:"組み合わせる、っていうのは、具体的にどういうことなの？"},{w:"marisa",t:"例えば、麦を育てつつ、牛や豚も飼うんだ。家畜のフンが肥料になったりして、お互いに助け合う仕組みになってるぜ。",v:"例えば、麦を育てつつ、牛や豚も飼うんだ。家畜のフンが肥料になったりして、お互いに助け合う仕組みになってるぜ。"},{w:"reimu",t:"作物と家畜が、うまく結びついてるんだね。ヨーロッパには他にどんな農業があるの？",v:"作物と家畜が、うまく結びついてるんだね。ヨーロッパには他にどんな農業があるの？"},{w:"marisa",t:"『酪農』も盛んだぜ。乳牛を飼って、牛乳やチーズなどの乳製品を作る農業のことだ。",v:"酪農も盛んだぜ。乳牛を飼って、牛乳やチーズなどの乳製品を作る農業のことだ。"},{w:"reimu",t:"アメリカの農業は、何が特徴的なの？",v:"アメリカの農業は、何が特徴的なの？"},{w:"marisa",t:"アメリカは『広い土地』と『機械』を使った、すごく大規模な『企業的農業』が特徴だぜ。",v:"アメリカは広い土地と機械を使った、すごく大規模な企業的農業が特徴だぜ。"},{w:"reimu",t:"『企業的』っていうのは、どういう意味なの？",v:"企業的っていうのは、どういう意味なの？"},{w:"marisa",t:"個人の農家というより、まるで会社（企業）のように、効率よく大量に農作物を生産する、っていう意味だぜ。",v:"個人の農家というより、まるで会社、企業のように、効率よく大量に農作物を生産する、っていう意味だぜ。"},{w:"reimu",t:"日本の小さな田んぼと比べると、スケールが全然違いそうだね。",v:"日本の小さな田んぼと比べると、スケールが全然違いそうだね。"},{w:"marisa",t:"そうだ。広い土地が活かせる気候・地形と、機械を使いこなす技術が組み合わさって、大規模化できているんだぜ。",v:"そうだ。広い土地が活かせる気候、地形と、機械を使いこなす技術が組み合わさって、大規模化できているんだぜ。"},{w:"reimu",t:"農業の話の延長で、『食料問題』っていうのも聞いたことあるけど、これはどういう問題なの？",v:"農業の話の延長で、食料問題っていうのも聞いたことあるけど、これはどういう問題なの？"},{w:"marisa",t:"これは深刻な問題だぜ。先進国では食べ物が余っているのに、発展途上国では『飢餓』、つまり食料が足りない状態が起きているんだ。",v:"これは深刻な問題だぜ。先進国では食べ物が余っているのに、発展途上国では飢餓、つまり食料が足りない状態が起きているんだ。"},{w:"reimu",t:"地球全体で見ると、食べ物の量が足りないわけじゃないんだね？",v:"地球全体で見ると、食べ物の量が足りないわけじゃないんだね？"},{w:"marisa",t:"そうなんだ。問題は『量』じゃなく『分配』、つまり食べ物がどこに行き渡るか、その偏りにあるんだぜ。",v:"そうなんだ。問題は量じゃなく分配、つまり食べ物がどこに行き渡るか、その偏りにあるんだぜ。"},{w:"reimu",t:"気候や歴史が農業の形を決めて、その一方で『分配の格差』が今も大きな課題として残ってる、ってことだね！",v:"気候や歴史が農業の形を決めて、その一方で分配の格差が今も大きな課題として残ってる、ってことだね！"}],quiz:[{q:"モンスーンアジアで盛んな農業は？",cs:["稲作","酪農","遊牧","企業的農業"],a:0,f:"雨が多いアジアでは米作り(稲作)が盛んだぜ。",d:1},{q:"乳牛を飼い乳製品を作る農業は？",cs:["酪農","稲作","遊牧","焼畑"],a:0,f:"牛乳やチーズなどを生産する酪農だぜ。",d:1},{q:"乾燥地で家畜と移動する農業は？",cs:["遊牧","稲作","酪農","園芸"],a:0,f:"水や草を求めて家畜と移動する遊牧だぜ。",d:1},{q:"作物栽培と家畜飼育を組合せた農業は？",cs:["混合農業","単作","遊牧","焼畑"],a:0,f:"ヨーロッパで発達した混合農業だぜ。",d:2},{q:"アメリカの農業の特徴は？",cs:["大規模で企業的","小規模","自給的","遊牧中心"],a:0,f:"広大な土地と機械化による大規模な企業的農業だぜ。",d:2},{q:"地中海式農業の代表的な作物は？",cs:["オリーブ・ぶどう","稲","小麦のみ","茶"],a:0,f:"夏の乾燥に強いオリーブやぶどうを栽培するぜ。",d:2},{q:"プランテーション農業とは？",cs:["熱帯で単一作物を大規模栽培","自給農業","混合農業","酪農"],a:0,f:"旧植民地で輸出用の単一作物を大量生産する農業だぜ。",d:3},{q:"世界の食料問題の本質は？",cs:["先進国の飽食と途上国の飢餓という分配格差","食料の均等","生産過剰のみ","不足のみ"],a:0,f:"食料の総量より、分配の偏りが根本的な問題なんだぜ。",d:3}]},
  civics_01:{lesson:[{w:"reimu",t:"魔理沙、日本国憲法の『三大原則』って何だっけ？",v:"魔理沙、日本国憲法の三大原則って何だっけ？"},{w:"marisa",t:"『国民主権』『基本的人権の尊重』『平和主義』の3つだ。これは日本国憲法を理解する上で絶対に欠かせない、土台になる考え方だぜ。",v:"国民主権、基本的人権の尊重、平和主義の3つだ。これは日本国憲法を理解する上で絶対に欠かせない、土台になる考え方だぜ。"},{w:"reimu",t:"1つ目の『国民主権』って、どういう意味なの？",v:"1つ目の国民主権って、どういう意味なの？"},{w:"marisa",t:"『主権』っていうのは『国のあり方を最終的に決める力』のことだ。それが国民にある、っていうのが国民主権だぜ。",v:"主権っていうのは、国のあり方を最終的に決める力、のことだ。それが国民にある、っていうのが国民主権だぜ。"},{w:"reimu",t:"つまり、王様や一部の人じゃなく、私たち国民みんなが、国の方向を決める力を持ってるってことだね。",v:"つまり、王様や一部の人じゃなく、私たち国民みんなが、国の方向を決める力を持ってるってことだね。"},{w:"marisa",t:"その通りだ。2つ目の『基本的人権の尊重』に進むぜ。これは、人が生まれながらに持っている権利を、大切にするという考え方だ。",v:"その通りだ。2つ目の基本的人権の尊重に進むぜ。これは、人が生まれながらに持っている権利を、大切にするという考え方だ。"},{w:"reimu",t:"基本的人権には、具体的にどんな種類があるの？",v:"基本的人権には、具体的にどんな種類があるの？"},{w:"marisa",t:"色々あるが、代表的なのは『自由権』（自由に考え、行動する権利）、『平等権』（差別されない権利）、『生存権』（健康な生活を送る権利）だぜ。",v:"色々あるが、代表的なのは自由権、自由に考え、行動する権利、平等権、差別されない権利、生存権、健康な生活を送る権利だぜ。"},{w:"reimu",t:"3つ目の『平和主義』は、憲法のどこに書かれてるの？",v:"3つ目の平和主義は、憲法のどこに書かれてるの？"},{w:"marisa",t:"憲法の『第9条』に書かれているぜ。日本は戦争をしない、そして戦力（軍隊のような力）を持たない、と定めているんだ。",v:"憲法の第9条に書かれているぜ。日本は戦争をしない、そして戦力、軍隊のような力を持たない、と定めているんだ。"},{w:"reimu",t:"戦争をしない、っていうのは、日本国憲法だけの特徴なの？",v:"戦争をしない、っていうのは、日本国憲法だけの特徴なの？"},{w:"marisa",t:"世界の憲法と比べても、かなり際立った特徴だぜ。これが日本国憲法の大きな個性の1つだと言われてるんだ。",v:"世界の憲法と比べても、かなり際立った特徴だぜ。これが日本国憲法の大きな個性の1つだと言われてるんだ。"},{w:"reimu",t:"ところで、天皇陛下って、今の憲法ではどんな立場なの？",v:"ところで、天皇陛下って、今の憲法ではどんな立場なの？"},{w:"marisa",t:"今の憲法では、天皇は政治の権限を持たないんだ。『日本国と国民統合の象徴』という、特別な立場にいるぜ。",v:"今の憲法では、天皇は政治の権限を持たないんだ。日本国と国民統合の象徴という、特別な立場にいるぜ。"},{w:"reimu",t:"『象徴』っていうのは、どういう意味なの？",v:"象徴っていうのは、どういう意味なの？"},{w:"marisa",t:"政治を実際に動かす力は持たないけど、日本という国や国民をまとめる、大切な存在として位置づけられているってことだぜ。",v:"政治を実際に動かす力は持たないけど、日本という国や国民をまとめる、大切な存在として位置づけられているってことだぜ。"},{w:"reimu",t:"国民主権・基本的人権の尊重・平和主義、この3つの柱で日本国憲法ができている、ってことがよく分かったよ！",v:"国民主権、基本的人権の尊重、平和主義、この3つの柱で日本国憲法ができている、ってことがよく分かったよ！"}],quiz:[{q:"日本国憲法の三大原則でないのは？",cs:["王権神授","国民主権","基本的人権の尊重","平和主義"],a:0,f:"王権神授は王の支配を正当化する古い考えで、原則ではないぜ。",d:1},{q:"政治を決める力が国民にある原則は？",cs:["国民主権","平和主義","三権分立","法の支配"],a:0,f:"国の主権者は国民とする国民主権だぜ。",d:1},{q:"戦争放棄を定めた条文は？",cs:["第9条","第1条","第25条","第14条"],a:0,f:"憲法第9条が戦争放棄と戦力不保持を定めているぜ。",d:1},{q:"基本的人権の尊重の具体例は？",cs:["自由権・平等権","納税の義務","勤労の義務","兵役"],a:0,f:"思想の自由などの自由権、差別されない平等権などが保障されるぜ。",d:2},{q:"日本国憲法での天皇の地位は？",cs:["日本国と国民統合の象徴","主権者である元首","行政の長","軍の最高指揮官"],a:0,f:"政治的権限を持たない象徴。これを象徴天皇制というぜ。",d:2},{q:"憲法第25条が保障するのは？",cs:["生存権","参政権","自由権","平等権"],a:0,f:"健康で文化的な最低限度の生活を営む権利、生存権だぜ。",d:2},{q:"憲法改正の発議に必要な賛成は？",cs:["各議院の総議員の3分の2以上","過半数","4分の1","全員"],a:0,f:"衆参それぞれ総議員の3分の2以上。その後国民投票で過半数が必要だぜ。",d:3},{q:"国民の三大義務でないのは？",cs:["投票の義務","教育の義務","勤労の義務","納税の義務"],a:0,f:"投票は権利であって義務ではない。三大義務は教育・勤労・納税だぜ。",d:3}]},
  civics_02:{lesson:[{w:"reimu",t:"魔理沙、『三権分立』ってよく聞くけど、なんでそんな仕組みが必要なの？",v:"魔理沙、三権分立ってよく聞くけど、なんでそんな仕組みが必要なの？"},{w:"marisa",t:"一番大きな理由は『権力が1か所に集まりすぎると、暴走する危険があるから』だぜ。",v:"一番大きな理由は、権力が1か所に集まりすぎると、暴走する危険があるから、だぜ。"},{w:"reimu",t:"暴走するって、具体的にどういうこと？",v:"暴走するって、具体的にどういうこと？"},{w:"marisa",t:"例えば、もし1つの組織が『法律を作る力』も『法律を実行する力』も『裁く力』も全部持ってたら、その組織は誰にも止められなくなるだろ？",v:"例えば、もし1つの組織が、法律を作る力も、法律を実行する力も、裁く力も全部持ってたら、その組織は誰にも止められなくなるだろ？"},{w:"reimu",t:"確かに、それだと暴走しても誰もブレーキをかけられないね。",v:"確かに、それだと暴走しても誰もブレーキをかけられないね。"},{w:"marisa",t:"そこで、力を3つに分けて、それぞれ別の組織に担当させるんだ。それが『立法』『行政』『司法』の3つだぜ。",v:"そこで、力を3つに分けて、それぞれ別の組織に担当させるんだ。それが立法、行政、司法の3つだぜ。"},{w:"reimu",t:"それぞれ、どんな役割をしてるの？",v:"それぞれ、どんな役割をしてるの？"},{w:"marisa",t:"『立法』は法律を作ること、『行政』は法律を実行して政治を動かすこと、『司法』は法律に基づいて裁くことだぜ。",v:"立法は法律を作ること、行政は法律を実行して政治を動かすこと、司法は法律に基づいて裁くことだぜ。"},{w:"reimu",t:"それぞれ、どの組織が担当してるの？",v:"それぞれ、どの組織が担当してるの？"},{w:"marisa",t:"立法は『国会』、行政は『内閣』、司法は『裁判所』が担当してるぜ。",v:"立法は国会、行政は内閣、司法は裁判所が担当してるぜ。"},{w:"reimu",t:"3つに分けるだけで、本当に暴走を防げるの？",v:"3つに分けるだけで、本当に暴走を防げるの？"},{w:"marisa",t:"分けるだけじゃなく、お互いに『監視し合う』仕組みも作ってあるんだ。だから、より確実に暴走を防げるんだぜ。",v:"分けるだけじゃなく、お互いに監視し合う仕組みも作ってあるんだ。だから、より確実に暴走を防げるんだぜ。"},{w:"reimu",t:"監視し合うって、例えばどんなことができるの？",v:"監視し合うって、例えばどんなことができるの？"},{w:"marisa",t:"例えば、国会は内閣を『信用できない』と判断したら、不信任の決議ができる。裁判所は、法律が憲法に違反していないかをチェックできるぜ。",v:"例えば、国会は内閣を信用できないと判断したら、不信任の決議ができる。裁判所は、法律が憲法に違反していないかをチェックできるぜ。"},{w:"reimu",t:"それぞれが、他の力を抑えるブレーキの役目を持ってるんだね。",v:"それぞれが、他の力を抑えるブレーキの役目を持ってるんだね。"},{w:"marisa",t:"そうだ。この『互いにブレーキをかけ合う』仕組みを『抑制と均衡』と呼ぶぜ。",v:"そうだ。この、互いにブレーキをかけ合う、仕組みを抑制と均衡と呼ぶぜ。"},{w:"reimu",t:"『均衡』っていうのは、バランスが取れてる、っていう意味だよね。",v:"均衡っていうのは、バランスが取れてる、っていう意味だよね。"},{w:"marisa",t:"その通りだ。どれか1つの力だけが強くなりすぎないように、3つがバランスを取り合ってるんだぜ。これが民主主義を守る大事な仕組みなんだ。",v:"その通りだ。どれか1つの力だけが強くなりすぎないように、3つがバランスを取り合ってるんだぜ。これが民主主義を守る大事な仕組みなんだ。"},{w:"reimu",t:"力を分けるだけじゃなく、お互いにチェックし合う仕組みまでセットになってるから、三権分立は信頼できる仕組みになってるんだね！",v:"力を分けるだけじゃなく、お互いにチェックし合う仕組みまでセットになってるから、三権分立は信頼できる仕組みになってるんだね！"}],quiz:[{q:"立法を担当するのは？",cs:["国会","内閣","裁判所","天皇"],a:0,f:"国会が法律を作る立法権を持つぜ。",d:1},{q:"行政を担当するのは？",cs:["内閣","国会","裁判所","知事"],a:0,f:"内閣が法律に基づき政治を行う行政権を持つぜ。",d:1},{q:"司法を担当するのは？",cs:["裁判所","国会","内閣","警察"],a:0,f:"裁判所が法律に基づき裁く司法権を持つぜ。",d:1},{q:"三権分立の目的は？",cs:["権力の集中と暴走を防ぐ","効率化のみ","予算節約","人員削減"],a:0,f:"権力が1か所に集まらないよう分散させ、独裁を防ぐためだぜ。",d:2},{q:"毎年定期的に開かれる国会は？",cs:["常会(通常国会)","臨時会","特別会","参議院"],a:0,f:"毎年1月に召集される常会(通常国会)だぜ。",d:2},{q:"内閣総理大臣を指名するのは？",cs:["国会","天皇","裁判所","国民投票"],a:0,f:"国会が国会議員の中から指名するぜ。",d:2},{q:"法律が憲法に反していないか審査する権限は？",cs:["違憲審査権","立法権","行政権","予算権"],a:0,f:"裁判所が持つ違憲審査権。憲法の番人と呼ばれるぜ。",d:3},{q:"衆議院が内閣不信任を決議すると内閣は？",cs:["総辞職か衆議院解散","無視できる","裁判する","増税する"],a:0,f:"10日以内に総辞職するか、衆議院を解散しなければならないぜ。",d:3}]},
  civics_03:{lesson:[{w:"reimu",t:"魔理沙、お店に並んでる物の『値段』って、そもそもどうやって決まってるの？",v:"魔理沙、お店に並んでる物の値段って、そもそもどうやって決まってるの？"},{w:"marisa",t:"『需要』と『供給』、この2つのバランスで決まるんだぜ。これが市場経済の基本ルールだ。",v:"需要と供給、この2つのバランスで決まるんだぜ。これが市場経済の基本ルールだ。"},{w:"reimu",t:"『需要』と『供給』って、それぞれ何のことなの？",v:"需要と供給って、それぞれ何のことなの？"},{w:"marisa",t:"『需要』は『買いたい人がどれだけいるか』、『供給』は『売りたい人がどれだけいるか』のことだぜ。",v:"需要は、買いたい人がどれだけいるか、供給は、売りたい人がどれだけいるか、のことだぜ。"},{w:"reimu",t:"この2つのバランスが、値段にどう影響するの？",v:"この2つのバランスが、値段にどう影響するの？"},{w:"marisa",t:"欲しい人（需要）がたくさんいて、商品の数（供給）が少ないと、値段は『上がる』んだぜ。",v:"欲しい人、需要がたくさんいて、商品の数、供給が少ないと、値段は上がるんだぜ。"},{w:"reimu",t:"なんで欲しい人が多いと、値段が上がるの？",v:"なんで欲しい人が多いと、値段が上がるの？"},{w:"marisa",t:"商品の数が限られてるなら、『高くても買いたい』という人が買えるようになる。お店側も、高くしても売れるなら高くするだろ？",v:"商品の数が限られてるなら、高くても買いたい、という人が買えるようになる。お店側も、高くしても売れるなら高くするだろ？"},{w:"reimu",t:"逆に、商品が余ってしまったときは、どうなるの？",v:"逆に、商品が余ってしまったときは、どうなるの？"},{w:"marisa",t:"『供給』が『需要』より多い、つまり物が余ってる状態だ。この場合、値段は『下がる』んだぜ。",v:"供給が需要より多い、つまり物が余ってる状態だ。この場合、値段は下がるんだぜ。"},{w:"reimu",t:"余ってるのに、なんで値段が下がるの？",v:"余ってるのに、なんで値段が下がるの？"},{w:"marisa",t:"売れ残ると困るから、お店側が『安くしてもいいから買ってほしい』と値下げするんだ。それで値段が下がっていくんだぜ。",v:"売れ残ると困るから、お店側が、安くしてもいいから買ってほしい、と値下げするんだ。それで値段が下がっていくんだぜ。"},{w:"reimu",t:"需要と供給のバランスで、自然に値段が決まっていくんだね。じゃあ、もし1つの会社だけが、その商品を売ってる状態だったら、どうなるの？",v:"需要と供給のバランスで、自然に値段が決まっていくんだね。じゃあ、もし1つの会社だけが、その商品を売ってる状態だったら、どうなるの？"},{w:"marisa",t:"それは『独占』っていう状態だ。競争相手がいないから、その会社は値段を自由に、好きなように決められてしまうんだぜ。",v:"それは独占っていう状態だ。競争相手がいないから、その会社は値段を自由に、好きなように決められてしまうんだぜ。"},{w:"reimu",t:"競争相手がいないと、買う側にとって、何か困ることがあるの？",v:"競争相手がいないと、買う側にとって、何か困ることがあるの？"},{w:"marisa",t:"そうだ。会社が高い値段をつけても、他に買う場所がないから、消費者は仕方なく高く買わされてしまうんだぜ。",v:"そうだ。会社が高い値段をつけても、他に買う場所がないから、消費者は仕方なく高く買わされてしまうんだぜ。"},{w:"reimu",t:"それは消費者にとって、すごく不利な状況だね。何か対策はあるの？",v:"それは消費者にとって、すごく不利な状況だね。何か対策はあるの？"},{w:"marisa",t:"あるぜ。『独占禁止法』という法律で、健全な競争が保たれるように守られているんだ。",v:"あるぜ。独占禁止法という法律で、健全な競争が保たれるように守られているんだ。"},{w:"reimu",t:"なんで『競争』があることが、消費者にとって良いことになるの？",v:"なんで競争があることが、消費者にとって良いことになるの？"},{w:"marisa",t:"会社どうしが競い合うと、お客さんに選んでもらうために、値段を安くしたり、サービスを良くしたりする努力をするんだぜ。",v:"会社どうしが競い合うと、お客さんに選んでもらうために、値段を安くしたり、サービスを良くしたりする努力をするんだぜ。"},{w:"reimu",t:"需要と供給のバランスで値段が動くこと、そして競争があることが消費者にとって良い結果につながること、両方つながって理解できたよ！",v:"需要と供給のバランスで値段が動くこと、そして競争があることが消費者にとって良い結果につながること、両方つながって理解できたよ！"}],quiz:[{q:"価格を決める2つの要素は？",cs:["需要と供給","生産と消費だけ","政府の命令","くじ引き"],a:0,f:"買いたい量(需要)と売りたい量(供給)のバランスで決まるぜ。",d:1},{q:"欲しい人が増えると価格は？",cs:["上がる","下がる","変化なし","ゼロになる"],a:0,f:"需要が増えると品薄になり価格は上がるぜ。",d:1},{q:"商品が余ると価格は？",cs:["下がる","上がる","変化なし","2倍になる"],a:0,f:"供給過剰になると売れ残り、値下げで価格が下がるぜ。",d:1},{q:"市場経済の特徴は？",cs:["価格を通じた自由な取引","政府が全て決定","物々交換のみ","配給制"],a:0,f:"市場での需要と供給によって価格や生産量が決まる仕組みだぜ。",d:2},{q:"独占の問題点は？",cs:["価格が高くなりやすい","価格が下がる","品質が必ず向上","競争が激化"],a:0,f:"競争相手がいないため企業が高い価格をつけやすく消費者に不利だぜ。",d:2},{q:"需要曲線の形は？",cs:["右下がり","右上がり","水平","垂直"],a:0,f:"価格が高いほど買う量が減るので右下がりになるぜ。",d:2},{q:"インフレーションとは？",cs:["物価が継続的に上昇すること","物価の下落","価格の固定","失業の増加"],a:0,f:"物価が持続的に上がり、お金の価値が下がる現象だぜ。",d:3},{q:"独占禁止法の目的は？",cs:["公正で自由な競争を守る","独占を促進","価格を統制","輸入を禁止"],a:0,f:"健全な競争を保ち、消費者の利益を守るための法律だぜ。",d:3}]},
  civics_04:{lesson:[{w:"reimu",t:"魔理沙、『国際連合』って、結局何をするための組織なの？",v:"魔理沙、国際連合って、結局何をするための組織なの？"},{w:"marisa",t:"世界の『平和』と『安全』を守るための組織だぜ。第二次世界大戦という大きな戦争の反省から、1945年に作られたんだ。",v:"世界の平和と安全を守るための組織だぜ。第二次世界大戦という大きな戦争の反省から、1945年に作られたんだ。"},{w:"reimu",t:"国際連合の中で、特に重要な組織ってあるの？",v:"国際連合の中で、特に重要な組織ってあるの？"},{w:"marisa",t:"『安全保障理事会』が中心になる組織だぜ。世界の平和に関わる、大事なことを決める役割を持ってるんだ。",v:"安全保障理事会が中心になる組織だぜ。世界の平和に関わる、大事なことを決める役割を持ってるんだ。"},{w:"reimu",t:"『常任理事国』っていうのも聞くけど、これは何なの？",v:"常任理事国っていうのも聞くけど、これは何なの？"},{w:"marisa",t:"安全保障理事会の中で、特別な立場にいる5つの国だ。アメリカ・イギリス・フランス・中国・ロシアの5か国だぜ。",v:"安全保障理事会の中で、特別な立場にいる5つの国だ。アメリカ、イギリス、フランス、中国、ロシアの5か国だぜ。"},{w:"reimu",t:"なんでこの5か国だけ、特別な立場なの？",v:"なんでこの5か国だけ、特別な立場なの？"},{w:"marisa",t:"この5か国だけが、『拒否権』というすごく強い権限を持っているからだぜ。",v:"この5か国だけが、拒否権というすごく強い権限を持っているからだぜ。"},{w:"reimu",t:"『拒否権』って、どういう権限なの？",v:"拒否権って、どういう権限なの？"},{w:"marisa",t:"5か国のうち、たとえ1か国だけでも反対すれば、その重要な決議自体が成立しなくなる、っていう権限だぜ。",v:"5か国のうち、たとえ1か国だけでも反対すれば、その重要な決議自体が成立しなくなる、っていう権限だぜ。"},{w:"reimu",t:"1か国の反対だけで、決議全体が止まっちゃうの？それってすごく強い権限だね。",v:"1か国の反対だけで、決議全体が止まっちゃうの？それってすごく強い権限だね。"},{w:"marisa",t:"そうなんだ。だからこそ、5つの常任理事国は、国際社会の中でとても大きな影響力を持っているんだぜ。",v:"そうなんだ。だからこそ、5つの常任理事国は、国際社会の中でとても大きな影響力を持っているんだぜ。"},{w:"reimu",t:"日本は、国際連合や世界に対して、どんな協力をしてるの？",v:"日本は、国際連合や世界に対して、どんな協力をしてるの？"},{w:"marisa",t:"大きく2つの活動があるぜ。1つは『ODA』、発展途上国にお金や技術を提供して支援する活動だ。",v:"大きく2つの活動があるぜ。1つはオーディーエー、発展途上国にお金や技術を提供して支援する活動だ。"},{w:"reimu",t:"もう1つは？",v:"もう1つは？"},{w:"marisa",t:"『PKO』、平和維持活動だ。争いが起きている地域に人を送って、平和を保つための活動に参加してるんだぜ。",v:"ピーケーオー、平和維持活動だ。争いが起きている地域に人を送って、平和を保つための活動に参加してるんだぜ。"},{w:"reimu",t:"ODAはお金や技術の支援、PKOは実際に人を送る平和への協力、ってことだね。",v:"オーディーエーはお金や技術の支援、ピーケーオーは実際に人を送る平和への協力、ってことだね。"},{w:"marisa",t:"その通りだ。国連が世界全体の平和の中心となって、日本のような国々が、それぞれの形で協力している、っていう関係になってるんだぜ。",v:"その通りだ。国連が世界全体の平和の中心となって、日本のような国々が、それぞれの形で協力している、っていう関係になってるんだぜ。"},{w:"reimu",t:"国連という大きな仕組みの中で、常任理事国の強い権限と、日本のような国の協力、両方があって世界の平和が支えられてるんだね！",v:"国連という大きな仕組みの中で、常任理事国の強い権限と、日本のような国の協力、両方があって世界の平和が支えられてるんだね！"}],quiz:[{q:"国際連合の設立年は？",cs:["1945年","1920年","1989年","2000年"],a:0,f:"第二次世界大戦が終わった1945年に発足したぜ。",d:1},{q:"国連の平和維持活動の略称は？",cs:["PKO","ODA","WHO","NGO"],a:0,f:"紛争地で停戦監視などを行うPKOだぜ。",d:1},{q:"途上国への政府開発援助の略称は？",cs:["ODA","PKO","NGO","WTO"],a:0,f:"政府が行う資金・技術援助のODAだぜ。",d:1},{q:"安全保障理事会の常任理事国の数は？",cs:["5か国","10か国","3か国","15か国"],a:0,f:"米・英・仏・中・ロの5か国が常任理事国だぜ。",d:2},{q:"常任理事国が持つ特別な権利は？",cs:["拒否権","二重投票権","議長権","免税権"],a:0,f:"1国でも反対すると決議が成立しない拒否権だぜ。",d:2},{q:"世界保健機関の略称は？",cs:["WHO","WTO","ILO","FAO"],a:0,f:"健康・医療を担当する世界保健機関WHOだぜ。",d:2},{q:"国連総会の議決の特徴は？",cs:["一国一票で平等","大国優先","人口に比例","拒否権あり"],a:0,f:"全加盟国が平等に一国一票を持つのが総会の原則だぜ。",d:3},{q:"地球温暖化対策の現在の国際枠組みは？",cs:["パリ協定","京都議定書のみ","ODA","PKO"],a:0,f:"2015年採択のパリ協定が現在の枠組みだぜ。",d:3}]},
  phy_01:{lesson:[{w:"reimu",t:"魔理沙、『速さ』ってどうやって計算するの？ただ距離を時間で割るだけ、で合ってる？",v:"魔理沙、速さってどうやって計算するの？ただ距離を時間で割るだけ、で合ってる？"},{w:"marisa",t:"ああ、それで合ってるぜ。『速さ＝距離÷時間』だ。例えば100mを20秒で走れば、100÷20で秒速5mになるんだ。",v:"ああ、それで合ってるぜ。速さイコール距離わる時間だ。例えば100メートルを20秒で走れば、100わる20で秒速5メートルになるんだ。"},{w:"reimu",t:"『秒速5m』っていうのは、どういう意味なの？",v:"秒速5メートルっていうのは、どういう意味なの？"},{w:"marisa",t:"『1秒間に5m進む速さ』っていう意味だぜ。速さは『1秒あたり、どれだけ距離を進むか』を表してるんだ。",v:"1秒間に5メートル進む速さ、っていう意味だぜ。速さは、1秒あたり、どれだけ距離を進むか、を表してるんだ。"},{w:"reimu",t:"じゃあ『加速度』って言葉も聞くけど、これは『速さ』と何が違うの？",v:"じゃあ加速度って言葉も聞くけど、これは速さと何が違うの？"},{w:"marisa",t:"速さは『1秒あたりの距離』だったよな。加速度は『1秒あたりの“速度の変化”』を表してるんだぜ。",v:"速さは、1秒あたりの距離、だったよな。加速度は、1秒あたりの速度の変化、を表してるんだぜ。"},{w:"reimu",t:"『速度の変化』っていうのが、ちょっとイメージしづらいな。",v:"速度の変化っていうのが、ちょっとイメージしづらいな。"},{w:"marisa",t:"例を出すぜ。1秒ごとに、速度が秒速2mずつ増えていく場合、これは『加速度2m/s²（メートル毎秒毎秒）』というふうに表現するんだ。",v:"例を出すぜ。1秒ごとに、速度が秒速2メートルずつ増えていく場合、これは加速度2メートル毎秒毎秒というふうに表現するんだ。"},{w:"reimu",t:"単位が『メートル毎秒毎秒』って、ちょっと変わった形だね。",v:"単位が、メートル毎秒毎秒、って、ちょっと変わった形だね。"},{w:"marisa",t:"『毎秒』が2回出てくるのは、『速度（毎秒の距離）』が『毎秒』どれだけ変わるか、を表してるからなんだ。だから2回つくんだぜ。",v:"毎秒が2回出てくるのは、速度、毎秒の距離が毎秒どれだけ変わるか、を表してるからなんだ。だから2回つくんだぜ。"},{w:"reimu",t:"速さと加速度の関係を、グラフで見ることもできるって聞いたんだけど。",v:"速さと加速度の関係を、グラフで見ることもできるって聞いたんだけど。"},{w:"marisa",t:"あるぜ。縦軸に『速度』、横軸に『時間』を取った『v-tグラフ（速度・時間グラフ）』っていうのがすごく便利なんだ。",v:"あるぜ。縦軸に速度、横軸に時間を取った、ブイティーグラフ、速度時間グラフっていうのがすごく便利なんだ。"},{w:"reimu",t:"このグラフから、何が読み取れるの？",v:"このグラフから、何が読み取れるの？"},{w:"marisa",t:"グラフの『傾き』が『加速度』を表してる。そしてグラフの線の下にある『面積』が、『移動距離』を表すんだぜ。",v:"グラフの傾きが加速度を表してる。そしてグラフの線の下にある面積が、移動距離を表すんだぜ。"},{w:"reimu",t:"傾きが加速度っていうのは、どうイメージすればいいの？",v:"傾きが加速度っていうのは、どうイメージすればいいの？"},{w:"marisa",t:"速度が一定（変化しない）なら、グラフは水平な直線、つまり傾き0になる。加速してるなら、グラフは右上がりの直線になるんだぜ。",v:"速度が一定、変化しないなら、グラフは水平な直線、つまり傾き0になる。加速してるなら、グラフは右上がりの直線になるんだぜ。"},{w:"reimu",t:"傾きが急になればなるほど、加速度も大きいってこと？",v:"傾きが急になればなるほど、加速度も大きいってこと？"},{w:"marisa",t:"その通りだ。傾きが急＝速度の変化が速い＝加速度が大きい、っていう対応関係になってるんだぜ。",v:"その通りだ。傾きが急、速度の変化が速い、加速度が大きい、っていう対応関係になってるんだぜ。"},{w:"reimu",t:"速さは『距離÷時間』、加速度は『速度の変化÷時間』。似てるけど、何を割っているかが違うんだね！",v:"速さは距離わる時間、加速度は速度の変化わる時間。似てるけど、何を割っているかが違うんだね！"}],quiz:[{q:"速さの求め方は？",cs:["距離÷時間","時間÷距離","距離×時間","距離+時間"],a:0,f:"速さ=距離÷時間。1秒あたりに進む距離だぜ。",d:1},{q:"100mを25秒で走る速さは？",cs:["4m/s","2m/s","25m/s","400m/s"],a:0,f:"100÷25=4。秒速4メートルだぜ。",d:1},{q:"加速度の単位は？",cs:["m/s²","m/s","m","s"],a:0,f:"メートル毎秒毎秒。1秒ごとの速度の変化を表すぜ。",d:1},{q:"v-tグラフの傾きが表すのは？",cs:["加速度","距離","時間","質量"],a:0,f:"速度の変化の割合=傾き=加速度だぜ。",d:2},{q:"v-tグラフの面積が表すのは？",cs:["移動距離","加速度","速さ","力"],a:0,f:"グラフと時間軸で囲まれた面積が移動距離になるぜ。",d:2},{q:"等速直線運動のv-tグラフは？",cs:["水平な直線","右上がり","曲線","垂直"],a:0,f:"速度が一定だから傾き0、水平な直線になるぜ。",d:2},{q:"初速0、加速度2m/s²で3秒後の速度は？",cs:["6m/s","2m/s","3m/s","9m/s"],a:0,f:"v=at=2×3=6。毎秒2ずつ増え3秒で秒速6メートルだぜ。",d:3},{q:"自由落下で使う重力加速度は約？",cs:["9.8m/s²","1m/s²","100m/s²","0"],a:0,f:"約9.8メートル毎秒毎秒。物が落ちるとこの割合で速くなるぜ。",d:3}]},
  phy_02:{lesson:[{w:"reimu",t:"魔理沙、『ニュートンの運動の法則』って、3つあるんだよね？",v:"魔理沙、ニュートンの運動の法則って、3つあるんだよね？"},{w:"marisa",t:"そうだ。『慣性の法則』『運動方程式』『作用反作用の法則』の3つだ。順番に1つずつ説明していくぜ。",v:"そうだ。慣性の法則、運動方程式、作用反作用の法則の3つだ。順番に1つずつ説明していくぜ。"},{w:"reimu",t:"まず『慣性の法則』から教えて。",v:"まず慣性の法則から教えて。"},{w:"marisa",t:"『力が働いていなければ、物体は止まっているならそのまま止まり続け、動いているなら同じ速さで動き続ける』という法則だぜ。",v:"力が働いていなければ、物体は止まっているならそのまま止まり続け、動いているなら同じ速さで動き続ける、という法則だぜ。"},{w:"reimu",t:"それって、電車が急に発進したときに、体が後ろに倒れそうになる現象のことかな？",v:"それって、電車が急に発進したときに、体が後ろに倒れそうになる現象のことかな？"},{w:"marisa",t:"その通り！体は『止まったまま』でいようとするから、電車だけが先に進んで、結果的に体が後ろに残るように感じるんだ。これが慣性だぜ。",v:"その通り！体は止まったままでいようとするから、電車だけが先に進んで、結果的に体が後ろに残るように感じるんだ。これが慣性だぜ。"},{w:"reimu",t:"次の『運動方程式』は？",v:"次の運動方程式は？"},{w:"marisa",t:"これが3つの中で一番重要な法則だぜ。『F=ma』、つまり『力＝質量×加速度』という式で表されるんだ。",v:"これが3つの中で一番重要な法則だぜ。エフイコールエムエー、つまり力イコール質量かける加速度という式で表されるんだ。"},{w:"reimu",t:"この式は、何を表しているの？",v:"この式は、何を表しているの？"},{w:"marisa",t:"物体に加える『力』が大きいほど、物体は『大きく加速する』ということだ。逆に物体の『質量』が大きいほど、同じ力でも加速しにくくなるぜ。",v:"物体に加える力が大きいほど、物体は大きく加速する、ということだ。逆に物体の質量が大きいほど、同じ力でも加速しにくくなるぜ。"},{w:"reimu",t:"重いものを動かすのが大変なのは、質量が大きいから加速しにくいってことだね。",v:"重いものを動かすのが大変なのは、質量が大きいから加速しにくいってことだね。"},{w:"marisa",t:"そうだ。最後は『作用反作用の法則』だ。これは『物を押すと、同じ大きさの力で、逆方向に押し返される』という法則だぜ。",v:"そうだ。最後は作用反作用の法則だ。これは、物を押すと、同じ大きさの力で、逆方向に押し返される、という法則だぜ。"},{w:"reimu",t:"押し返されるって、具体的にはどういうことなの？",v:"押し返されるって、具体的にはどういうことなの？"},{w:"marisa",t:"壁をドンと押したら、自分も壁から押された感じがするだろ。あれが、まさに作用反作用が働いている瞬間なんだぜ。",v:"壁をドンと押したら、自分も壁から押された感じがするだろ。あれが、まさに作用反作用が働いている瞬間なんだぜ。"},{w:"reimu",t:"力って、いつも『ペア』で発生してるんだね。",v:"力って、いつも、ペア、で発生してるんだね。"},{w:"marisa",t:"そうだ。力は必ず対（ペア）で生まれる。これが作用反作用の法則だぜ。",v:"そうだ。力は必ず対、ペアで生まれる。これが作用反作用の法則だぜ。"},{w:"reimu",t:"『慣性』『F=ma』『作用反作用』、それぞれ別の場面を説明してる法則なんだね。3つ揃って、運動についてかなり詳しく説明できるようになるんだ！",v:"慣性、エフイコールエムエー、作用反作用、それぞれ別の場面を説明してる法則なんだね。3つ揃って、運動についてかなり詳しく説明できるようになるんだ！"}],quiz:[{q:"運動方程式は？",cs:["F=ma","F=mv","E=mc²","v=at"],a:0,f:"力=質量×加速度。力学の最重要公式だぜ。",d:1},{q:"慣性の法則の内容は？",cs:["力がなければ運動状態を保つ","必ず止まる","加速する","回転する"],a:0,f:"外から力が働かなければ静止か等速直線運動を続けるぜ。",d:1},{q:"作用反作用の法則は？",cs:["力は対で逆向き同じ大きさ","一方向のみ","力が消える","2倍になる"],a:0,f:"押せば同じ大きさで逆向きに押し返される。力は必ずペアだぜ。",d:1},{q:"質量2kgに4Nの力、加速度は？",cs:["2m/s²","8m/s²","0.5m/s²","6m/s²"],a:0,f:"a=F/m=4÷2=2。F=maを変形して求めるぜ。",d:2},{q:"質量3kg、加速度2m/s²のときの力は？",cs:["6N","1.5N","5N","9N"],a:0,f:"F=ma=3×2=6ニュートンだぜ。",d:2},{q:"力の単位ニュートンを基本単位で表すと？",cs:["kg・m/s²","kg/m","m/s","kg・m"],a:0,f:"F=maより質量×加速度=kg・m/s²だぜ。",d:2},{q:"摩擦力の向きは？",cs:["運動を妨げる向き","運動方向と同じ","上向き","下向き"],a:0,f:"物体が動こうとする向きと逆に働き、運動を妨げるぜ。",d:3},{q:"電車の急発進で体が後ろに倒れるのは？",cs:["慣性の法則","作用反作用","重力","摩擦"],a:0,f:"体が静止を続けようとする慣性のためだぜ。",d:3}]},
  phy_03:{lesson:[{w:"reimu",t:"魔理沙、物理で言う『仕事』って、普段使う『仕事』とは意味が違うんだよね？",v:"魔理沙、物理で言う仕事って、普段使う仕事とは意味が違うんだよね？"},{w:"marisa",t:"そうだ。物理での『仕事』は『物体に力を加えて、実際に動かすこと』を指すぜ。",v:"そうだ。物理での仕事は、物体に力を加えて、実際に動かすこと、を指すぜ。"},{w:"reimu",t:"これって、どうやって計算するの？",v:"これって、どうやって計算するの？"},{w:"marisa",t:"計算式はシンプルだ。『仕事＝力×動かした距離』だぜ。",v:"計算式はシンプルだ。仕事イコール力かける動かした距離だぜ。"},{w:"reimu",t:"具体的な数字で見せてもらえる？",v:"具体的な数字で見せてもらえる？"},{w:"marisa",t:"10Nの力を使って、5m動かしたとする。10×5＝50。これで『50J（ジュール）』の仕事をした、ということになるぜ。",v:"10ニュートンの力を使って、5メートル動かしたとする。10かける5は50。これで50ジュールの仕事をした、ということになるぜ。"},{w:"reimu",t:"『J(ジュール)』っていうのは、仕事を表す単位なんだね。",v:"ジュールっていうのは、仕事を表す単位なんだね。"},{w:"marisa",t:"そうだ。さて、この『仕事』と深く関係する言葉が『エネルギー』だ。エネルギーは『仕事をする能力』のことなんだぜ。",v:"そうだ。さて、この仕事と深く関係する言葉がエネルギーだ。エネルギーは、仕事をする能力、のことなんだぜ。"},{w:"reimu",t:"『仕事をする能力』って、つまりどういうこと？",v:"仕事をする能力って、つまりどういうこと？"},{w:"marisa",t:"『これから物を動かせるだけの力を持っている状態』ってことだぜ。エネルギーには色々種類があるが、基本となるのは2つ、『運動エネルギー』と『位置エネルギー』だ。",v:"これから物を動かせるだけの力を持っている状態、ってことだぜ。エネルギーには色々種類があるが、基本となるのは2つ、運動エネルギーと位置エネルギーだ。"},{w:"reimu",t:"運動エネルギーと位置エネルギー、それぞれどんなエネルギーなの？",v:"運動エネルギーと位置エネルギー、それぞれどんなエネルギーなの？"},{w:"marisa",t:"『運動エネルギー』は、動いている物が持つエネルギーだ。『位置エネルギー』は、高い場所にある物が持つエネルギーだぜ。",v:"運動エネルギーは、動いている物が持つエネルギーだ。位置エネルギーは、高い場所にある物が持つエネルギーだぜ。"},{w:"reimu",t:"振り子の動きって、この2つのエネルギーが関係してるって聞いたことあるんだけど。",v:"振り子の動きって、この2つのエネルギーが関係してるって聞いたことあるんだけど。"},{w:"marisa",t:"鋭いところに気づいたな。振り子が一番下に来たとき、運動エネルギーが最大になる。逆に一番上（端）まで来たとき、位置エネルギーが最大になるんだぜ。",v:"鋭いところに気づいたな。振り子が一番下に来たとき、運動エネルギーが最大になる。逆に一番上、端まで来たとき、位置エネルギーが最大になるんだぜ。"},{w:"reimu",t:"動きながら、2つのエネルギーの大きさが入れ替わっていくんだね。",v:"動きながら、2つのエネルギーの大きさが入れ替わっていくんだね。"},{w:"marisa",t:"そうだ。でも、ここで超重要なポイントがある。この2つのエネルギーを『足した合計』は、常に一定で変わらないんだぜ。",v:"そうだ。でも、ここで超重要なポイントがある。この2つのエネルギーを足した合計は、常に一定で変わらないんだぜ。"},{w:"reimu",t:"片方が増えたら、もう片方が同じだけ減って、合計はいつも同じってことね。",v:"片方が増えたら、もう片方が同じだけ減って、合計はいつも同じってことね。"},{w:"marisa",t:"その通りだ。これを『力学的エネルギー保存則』と呼ぶぜ。エネルギーは『形』を変えても、『総量』はちゃんと保たれるんだ。",v:"その通りだ。これを力学的エネルギー保存則と呼ぶぜ。エネルギーは形を変えても、総量はちゃんと保たれるんだ。"},{w:"reimu",t:"仕事は『力×距離』、エネルギーは『仕事をする能力』で、種類は変わっても合計は一定。物理のエネルギーの世界がよく分かったよ！",v:"仕事は力かける距離、エネルギーは仕事をする能力で、種類は変わっても合計は一定。物理のエネルギーの世界がよく分かったよ！"}],quiz:[{q:"仕事の求め方は？",cs:["力×距離","力÷距離","力+距離","距離÷力"],a:0,f:"仕事=力×動かした距離。力の向きに動かすのがポイントだぜ。",d:1},{q:"仕事の単位は？",cs:["J(ジュール)","N","W","kg"],a:0,f:"仕事もエネルギーも単位はジュールだぜ。",d:1},{q:"動いている物体が持つエネルギーは？",cs:["運動エネルギー","位置エネルギー","熱","光"],a:0,f:"速さを持つ物が蓄える運動エネルギーだぜ。",d:1},{q:"5Nの力で4m動かす仕事は？",cs:["20J","9J","1.25J","20N"],a:0,f:"5×4=20。仕事は20ジュール。単位はJだぜ。",d:2},{q:"高い所にある物体が持つエネルギーは？",cs:["位置エネルギー","運動エネルギー","電気","音"],a:0,f:"高さに応じて蓄える位置(ポテンシャル)エネルギーだぜ。",d:2},{q:"1秒あたりの仕事を表す量は？",cs:["仕事率(W)","仕事(J)","力(N)","距離(m)"],a:0,f:"仕事率はワット。仕事を時間で割った値だぜ。",d:2},{q:"力学的エネルギー保存則とは？",cs:["運動+位置エネルギーの和が一定","運動だけ一定","熱が増える","エネルギーが消滅"],a:0,f:"摩擦がなければ運動と位置のエネルギーの和は常に一定だぜ。",d:3},{q:"振り子の最下点で最大になるのは？",cs:["運動エネルギー","位置エネルギー","両方0","摩擦"],a:0,f:"最下点では速さが最大なので運動エネルギーが最大だぜ。",d:3}]},
  phy_04:{lesson:[{w:"reimu",t:"魔理沙、『波』って、物理的にはどういう現象のことなの？",v:"魔理沙、波って、物理的にはどういう現象のことなの？"},{w:"marisa",t:"波は『振動が、次々と隣に伝わっていく現象』のことだぜ。",v:"波は、振動が、次々と隣に伝わっていく現象、のことだぜ。"},{w:"reimu",t:"イメージしやすい例ってある？",v:"イメージしやすい例ってある？"},{w:"marisa",t:"水面に石を落とすと、輪っかがどんどん広がっていくだろ。あれが、まさに波の動きそのものなんだぜ。",v:"水面に石を落とすと、輪っかがどんどん広がっていくだろ。あれが、まさに波の動きそのものなんだぜ。"},{w:"reimu",t:"波を説明するときに、何か専門的な言葉があるんだよね？",v:"波を説明するときに、何か専門的な言葉があるんだよね？"},{w:"marisa",t:"波を表す要素は3つある。『波長』『振動数』、そして『速さ』だ。",v:"波を表す要素は3つある。波長、振動数、そして速さだ。"},{w:"reimu",t:"『波長』って何のこと？",v:"波長って何のこと？"},{w:"marisa",t:"波の『山から山まで（または谷から谷まで）の長さ』のことだぜ。",v:"波の、山から山まで、または谷から谷までの長さ、のことだぜ。"},{w:"reimu",t:"『振動数』は？",v:"振動数は？"},{w:"marisa",t:"『1秒間に振動する回数』のことだ。1秒間に多く振動すれば、振動数は大きくなるぜ。",v:"1秒間に振動する回数、のことだ。1秒間に多く振動すれば、振動数は大きくなるぜ。"},{w:"reimu",t:"波長・振動数・速さ、この3つには、何か関係があるの？",v:"波長、振動数、速さ、この3つには、何か関係があるの？"},{w:"marisa",t:"あるぜ。すごく大事な式だから、絶対覚えとけよ。『波の速さ＝波長×振動数』だ。",v:"あるぜ。すごく大事な式だから、絶対覚えとけよ。波の速さイコール波長かける振動数だ。"},{w:"reimu",t:"この式は、何を教えてくれるの？",v:"この式は、何を教えてくれるの？"},{w:"marisa",t:"波長と振動数が分かれば、波がどれくらいの速さで進んでいるかが計算できる、ってことだぜ。",v:"波長と振動数が分かれば、波がどれくらいの速さで進んでいるかが計算できる、ってことだぜ。"},{w:"reimu",t:"『音』とか『光』も、波の仲間なんだよね？",v:"音とか光も、波の仲間なんだよね？"},{w:"marisa",t:"そうだ。『音』は空気の振動が波として伝わっているものだ。『光』も波の性質を持っているぜ。",v:"そうだ。音は空気の振動が波として伝わっているものだ。光も波の性質を持っているぜ。"},{w:"reimu",t:"光が波だと、何か特別な現象が起きるの？",v:"光が波だと、何か特別な現象が起きるの？"},{w:"marisa",t:"光が水中に入ると、進む方向が曲がる『屈折』っていう現象が起きるぜ。コップの水にストローを入れると、折れて見えるあの現象だ。",v:"光が水中に入ると、進む方向が曲がる屈折っていう現象が起きるぜ。コップの水にストローを入れると、折れて見えるあの現象だ。"},{w:"reimu",t:"音についても、振動数が関係してるって聞いたことあるんだけど。",v:"音についても、振動数が関係してるって聞いたことあるんだけど。"},{w:"marisa",t:"そうだ。振動数が大きいほど、音は『高く』聞こえるんだぜ。キンキンした高い声は、振動数が多いんだ。",v:"そうだ。振動数が大きいほど、音は高く聞こえるんだぜ。キンキンした高い声は、振動数が多いんだ。"},{w:"reimu",t:"波長・振動数・速さの関係、そして音や光もこの仲間だっていう視点を持つと、世界の見え方が変わってくるね！",v:"波長、振動数、速さの関係、そして音や光もこの仲間だっていう視点を持つと、世界の見え方が変わってくるね！"}],quiz:[{q:"波の速さの公式は？",cs:["波長×振動数","波長÷振動数","波長+振動数","振動数÷波長"],a:0,f:"速さ=波長×振動数。波の最重要公式だぜ。",d:1},{q:"音を伝えるのは？",cs:["空気の振動","光","電気","磁気"],a:0,f:"音は空気などの振動が波として伝わるんだぜ。",d:1},{q:"振動数の単位は？",cs:["Hz(ヘルツ)","m","s","J"],a:0,f:"1秒間の振動回数を表すヘルツだぜ。",d:1},{q:"波長2m、振動数3Hzの波の速さは？",cs:["6m/s","1.5m/s","5m/s","0.67m/s"],a:0,f:"速さ=波長×振動数=2×3=6m/sだぜ。",d:2},{q:"音が高いとき振動数は？",cs:["大きい","小さい","ゼロ","関係ない"],a:0,f:"振動数が大きいほど音は高くなるぜ。",d:2},{q:"光が水中に入って曲がる現象は？",cs:["屈折","反射","回折","干渉"],a:0,f:"異なる物質で速さが変わり進路が曲がる屈折だぜ。",d:2},{q:"音速340m/s、振動数170Hzの波長は？",cs:["2m","0.5m","340m","170m"],a:0,f:"波長=速さ÷振動数=340÷170=2mだぜ。",d:3},{q:"2つの波が重なって強め合う現象は？",cs:["干渉","屈折","反射","減衰"],a:0,f:"山と山が重なると振幅が大きくなる干渉だぜ。",d:3}]},
  phy_05:{lesson:[{w:"reimu",t:"魔理沙、『オームの法則』ってどういう法則だっけ？",v:"魔理沙、オームの法則ってどういう法則だっけ？"},{w:"marisa",t:"電気の世界の3つの量、『電圧』『電流』『抵抗』の関係を表す式だぜ。『電圧＝電流×抵抗』、V=IRと書くんだ。",v:"電気の世界の3つの量、電圧、電流、抵抗の関係を表す式だぜ。電圧イコール電流かける抵抗、ブイイコールアイアールと書くんだ。"},{w:"reimu",t:"正直、電流と電圧の違いが、いまいちピンとこないんだよね…。",v:"正直、電流と電圧の違いが、いまいちピンとこないんだよね。"},{w:"marisa",t:"よくある悩みだ。『水』で例えると分かりやすいぜ。電気を、パイプの中を流れる水だと考えるんだ。",v:"よくある悩みだ。水で例えると分かりやすいぜ。電気を、パイプの中を流れる水だと考えるんだ。"},{w:"reimu",t:"水で考えると、電流とか電圧は何になるの？",v:"水で考えると、電流とか電圧は何になるの？"},{w:"marisa",t:"『電流』は『水が流れる量』に対応する。『電圧』は『水を押し出す力（圧力）』に対応するぜ。",v:"電流は、水が流れる量、に対応する。電圧は、水を押し出す力、圧力、に対応するぜ。"},{w:"reimu",t:"じゃあ『抵抗』は？",v:"じゃあ抵抗は？"},{w:"marisa",t:"『抵抗』は『水の流れにくさ』だ。パイプが細かったり、詰まってたりすると水が流れにくいだろ。それが抵抗だぜ。",v:"抵抗は、水の流れにくさ、だ。パイプが細かったり、詰まってたりすると水が流れにくいだろ。それが抵抗だぜ。"},{w:"reimu",t:"抵抗が大きいと、電流にはどんな影響があるの？",v:"抵抗が大きいと、電流にはどんな影響があるの？"},{w:"marisa",t:"抵抗が大きいほど、電流は流れにくくなる。例えば、同じ電圧でも抵抗が2倍になれば、電流は半分になるんだぜ。",v:"抵抗が大きいほど、電流は流れにくくなる。例えば、同じ電圧でも抵抗が2倍になれば、電流は半分になるんだぜ。"},{w:"reimu",t:"実際に数字を使って、計算してみたいな。",v:"実際に数字を使って、計算してみたいな。"},{w:"marisa",t:"いいぜ。電流が2A（アンペア）、抵抗が3Ω（オーム）のとき、電圧はどうなる？V=IRに当てはめてみろ。",v:"いいぜ。電流が2アンペア、抵抗が3オームのとき、電圧はどうなる？ブイイコールアイアールに当てはめてみろ。"},{w:"reimu",t:"V=2×3だから、電圧は6Vになる！",v:"ブイイコール2かける3だから、電圧は6ボルトになる！"},{w:"marisa",t:"正解だ！ただの代入だけで、ちゃんと答えが出せるだろ。",v:"正解だ！ただの代入だけで、ちゃんと答えが出せるだろ。"},{w:"reimu",t:"逆に、電圧と抵抗が分かってて、電流を求めたいときは、どうすればいいの？",v:"逆に、電圧と抵抗が分かってて、電流を求めたいときは、どうすればいいの？"},{w:"marisa",t:"その場合は、V=IRの式を『変形』して使うんだ。両辺をRで割れば、I＝V/Rになるぜ。",v:"その場合は、ブイイコールアイアールの式を変形して使うんだ。両辺をアールで割れば、アイイコールブイわるアールになるぜ。"},{w:"reimu",t:"1つの式を変形すれば、電圧・電流・抵抗のどれが分かっていても、残りの1つを計算できるんだね。",v:"1つの式を変形すれば、電圧、電流、抵抗のどれが分かっていても、残りの1つを計算できるんだね。"},{w:"marisa",t:"その通りだ。V=IR、これ1つの式を覚えておけば、電圧・電流・抵抗、3つの関係を全部扱えるようになるぜ。",v:"その通りだ。ブイイコールアイアール、これ1つの式を覚えておけば、電圧、電流、抵抗、3つの関係を全部扱えるようになるぜ。"}],quiz:[{q:"オームの法則は？",cs:["V=IR","V=I/R","V=I+R","I=VR"],a:0,f:"電圧=電流×抵抗。電気回路の基本法則だぜ。",d:1},{q:"電流の単位は？",cs:["A(アンペア)","V","Ω","W"],a:0,f:"電流の大きさを表すアンペアだぜ。",d:1},{q:"抵抗の単位は？",cs:["Ω(オーム)","A","V","J"],a:0,f:"電流の流れにくさを表すオームだぜ。",d:1},{q:"電流2A、抵抗3Ωの電圧は？",cs:["6V","1.5V","5V","0.67V"],a:0,f:"V=IR=2×3=6ボルトだぜ。",d:2},{q:"電圧12V、抵抗4Ωの電流は？",cs:["3A","48A","8A","16A"],a:0,f:"I=V/R=12÷4=3アンペア。式を変形して求めるぜ。",d:2},{q:"直列回路の電流の特徴は？",cs:["どこでも同じ","場所で変わる","ゼロ","2倍になる"],a:0,f:"直列では電流の通り道が1本なのでどこも同じ大きさだぜ。",d:2},{q:"並列接続した抵抗の合成抵抗は？",cs:["各抵抗より小さくなる","大きくなる","変わらない","ゼロ"],a:0,f:"電流の道が増えるので全体の抵抗は小さくなるぜ。",d:3},{q:"電力の求め方は？",cs:["P=VI","P=V/I","P=V+I","P=V−I"],a:0,f:"電力=電圧×電流。1秒あたりに使う電気エネルギーだぜ。",d:3}]},
  chem_01:{lesson:[{w:"reimu",t:"魔理沙、『原子』ってどんな構造をしてるの？",v:"魔理沙、原子ってどんな構造をしてるの？"},{w:"marisa",t:"原子は、中心に『原子核』があって、その周りを『電子』が回っている、っていう構造をしてるんだぜ。",v:"原子は、中心に原子核があって、その周りを電子が回っている、っていう構造をしてるんだぜ。"},{w:"reimu",t:"何かイメージしやすい例えはある？",v:"何かイメージしやすい例えはある？"},{w:"marisa",t:"太陽系のイメージに近いぜ。中心の太陽が『原子核』、その周りを回る惑星が『電子』、みたいな感じだ。",v:"太陽系のイメージに近いぜ。中心の太陽が原子核、その周りを回る惑星が電子、みたいな感じだ。"},{w:"reimu",t:"『原子核』自体は、何でできてるの？",v:"原子核自体は、何でできてるの？"},{w:"marisa",t:"原子核は、さらに2種類の粒からできてるぜ。プラスの電気を持つ『陽子』と、電気を持たない『中性子』だ。",v:"原子核は、さらに2種類の粒からできてるぜ。プラスの電気を持つ陽子と、電気を持たない中性子だ。"},{w:"reimu",t:"『原子番号』って言葉も聞くけど、これは何の数なの？",v:"原子番号って言葉も聞くけど、これは何の数なの？"},{w:"marisa",t:"原子番号は『陽子の数』のことだぜ。",v:"原子番号は陽子の数のことだぜ。"},{w:"reimu",t:"陽子の数が、何かそんなに重要なの？",v:"陽子の数が、何かそんなに重要なの？"},{w:"marisa",t:"すごく重要だ。陽子の数が変わると、それはもう『別の元素』になるんだぜ。水素は陽子が1個、炭素は陽子が6個、っていう感じだ。",v:"すごく重要だ。陽子の数が変わると、それはもう別の元素になるんだぜ。水素は陽子が1個、炭素は陽子が6個、っていう感じだ。"},{w:"reimu",t:"陽子の数が、その原子の『正体』を決めている、ってことだね。",v:"陽子の数が、その原子の正体を決めている、ってことだね。"},{w:"marisa",t:"その通りだ。学校で見る『周期表』も、この陽子の数（原子番号）の順番に元素を並べたものなんだぜ。",v:"その通りだ。学校で見る周期表も、この陽子の数、原子番号の順番に元素を並べたものなんだぜ。"},{w:"reimu",t:"周期表って、ただ番号順に並んでるだけなの？",v:"周期表って、ただ番号順に並んでるだけなの？"},{w:"marisa",t:"そこがすごいポイントなんだ。番号順に並べただけなのに、『性質が似ている元素』が、なぜか『縦の列』にきれいに並ぶようになってるんだぜ。",v:"そこがすごいポイントなんだ。番号順に並べただけなのに、性質が似ている元素が、なぜか縦の列にきれいに並ぶようになってるんだぜ。"},{w:"reimu",t:"この『縦の列』には、名前があるの？",v:"この縦の列には、名前があるの？"},{w:"marisa",t:"縦の列を『族』、横の行を『周期』と呼ぶぜ。",v:"縦の列を族、横の行を周期と呼ぶぜ。"},{w:"reimu",t:"なんで縦に並べると、性質が似てくるの？",v:"なんで縦に並べると、性質が似てくるの？"},{w:"marisa",t:"同じ『族』にある元素は、一番外側にある電子（最外殻電子）の数が同じになるんだ。この『一番外側の電子の数』が、化学的な性質を大きく左右するんだぜ。",v:"同じ族にある元素は、一番外側にある電子、最外殻電子の数が同じになるんだ。この一番外側の電子の数が、化学的な性質を大きく左右するんだぜ。"},{w:"reimu",t:"『陽子の数で元素の種類が決まる』、そして『一番外側の電子の数で性質が決まる』。原子の仕組みが、すごくつながって理解できたよ！",v:"陽子の数で元素の種類が決まる、そして一番外側の電子の数で性質が決まる。原子の仕組みが、すごくつながって理解できたよ！"}],quiz:[{q:"原子の中心にあるのは？",cs:["原子核","電子","分子","イオン"],a:0,f:"中心に原子核があり、その周りを電子が回るぜ。",d:1},{q:"原子核を構成するのは？",cs:["陽子と中性子","電子のみ","陽子のみ","分子"],a:0,f:"プラスの陽子と電気を持たない中性子からできているぜ。",d:1},{q:"原子番号は何の数？",cs:["陽子の数","中性子の数","電子殻の数","質量"],a:0,f:"陽子の数が原子番号。これで元素の種類が決まるぜ。",d:1},{q:"元素を原子番号順に並べた表は？",cs:["周期表","元素図","分子表","イオン表"],a:0,f:"原子番号順に並べた周期表だぜ。",d:2},{q:"質量数の求め方は？",cs:["陽子数+中性子数","陽子数のみ","電子数","陽子×中性子"],a:0,f:"原子核に含まれる陽子と中性子の数の合計だぜ。",d:2},{q:"同位体とは？",cs:["陽子数が同じで中性子数が違う原子","全く別の元素","イオン","分子"],a:0,f:"同じ元素だが中性子数が違い質量が異なる原子だぜ。",d:2},{q:"周期表の縦の列を何という？",cs:["族","周期","殻","価"],a:0,f:"縦が族、横が周期。同じ族は似た性質を持つぜ。",d:3},{q:"最外殻電子の数が同じ元素の性質は？",cs:["似ている","全く違う","必ず同じ","無関係"],a:0,f:"最外殻電子(価電子)が同じだと化学的性質が似るぜ。",d:3}]},
  chem_02:{lesson:[{w:"reimu",t:"魔理沙、原子と原子をくっつける『化学結合』って、いくつ種類があるの？",v:"魔理沙、原子と原子をくっつける化学結合って、いくつ種類があるの？"},{w:"marisa",t:"主に3つあるぜ。『イオン結合』『共有結合』『金属結合』だ。それぞれ全然違う仕組みでくっついてるんだぜ。",v:"主に3つあるぜ。イオン結合、共有結合、金属結合だ。それぞれ全然違う仕組みでくっついてるんだぜ。"},{w:"reimu",t:"1つ目の『イオン結合』から教えて。",v:"1つ目のイオン結合から教えて。"},{w:"marisa",t:"イオン結合は、プラスの電気を持つ『陽イオン』と、マイナスの電気を持つ『陰イオン』が、電気の力で引き合ってくっつく結合だぜ。",v:"イオン結合は、プラスの電気を持つ陽イオンと、マイナスの電気を持つ陰イオンが、電気の力で引き合ってくっつく結合だぜ。"},{w:"reimu",t:"プラスとマイナスが引き合うのって、磁石みたいな感じなのかな。",v:"プラスとマイナスが引き合うのって、磁石みたいな感じなのかな。"},{w:"marisa",t:"そのイメージで大体合ってるぜ。実際の例で言うと、食塩、つまり『塩化ナトリウム』がこのイオン結合でできているんだ。",v:"そのイメージで大体合ってるぜ。実際の例で言うと、食塩、つまり塩化ナトリウムがこのイオン結合でできているんだ。"},{w:"reimu",t:"食塩の中では、何と何が引き合ってるの？",v:"食塩の中では、何と何が引き合ってるの？"},{w:"marisa",t:"『ナトリウムイオン』というプラスのイオンと、『塩化物イオン』というマイナスのイオンが、お互いに引き合ってるんだぜ。",v:"ナトリウムイオンというプラスのイオンと、塩化物イオンというマイナスのイオンが、お互いに引き合ってるんだぜ。"},{w:"reimu",t:"2つ目の『共有結合』は、イオン結合とどう違うの？",v:"2つ目の共有結合は、イオン結合とどう違うの？"},{w:"marisa",t:"共有結合は『引き合う』んじゃなくて、原子どうしが『電子を出し合って、一緒に共有する』ことでくっつく結合だぜ。",v:"共有結合は、引き合う、んじゃなくて、原子どうしが、電子を出し合って、一緒に共有する、ことでくっつく結合だぜ。"},{w:"reimu",t:"共有結合の代表的な例は？",v:"共有結合の代表的な例は？"},{w:"marisa",t:"水素分子や、私たちが毎日飲んでいる『水』の分子が、この共有結合でできてるぜ。",v:"水素分子や、私たちが毎日飲んでいる水の分子が、この共有結合でできてるぜ。"},{w:"reimu",t:"3つ目の『金属結合』は、また違う仕組みなんだよね？",v:"3つ目の金属結合は、また違う仕組みなんだよね？"},{w:"marisa",t:"そうだ。金属結合は、金属の中を自由に動き回る『自由電子』というものが、金属の原子どうしをつなぎとめている結合だぜ。",v:"そうだ。金属結合は、金属の中を自由に動き回る自由電子というものが、金属の原子どうしをつなぎとめている結合だぜ。"},{w:"reimu",t:"この『自由電子』が、金属の何か特別な性質と関係してるの？",v:"この自由電子が、金属の何か特別な性質と関係してるの？"},{w:"marisa",t:"大ありだ。電子が自由に動き回れるからこそ、金属は『電気をよく通す』んだぜ。",v:"大ありだ。電子が自由に動き回れるからこそ、金属は電気をよく通すんだぜ。"},{w:"reimu",t:"金属が電気を通すのは、自由電子が動いて電気を運んでくれてるからなんだね。",v:"金属が電気を通すのは、自由電子が動いて電気を運んでくれてるからなんだね。"},{w:"marisa",t:"その通りだ。『引き合う（イオン結合）』『共有する（共有結合）』『自由電子でつながる（金属結合）』、この3つの仕組みの違いを押さえておけば、化学結合はもう怖くないぜ。",v:"その通りだ。引き合う、イオン結合、共有する、共有結合、自由電子でつながる、金属結合、この3つの仕組みの違いを押さえておけば、化学結合はもう怖くないぜ。"}],quiz:[{q:"陽イオンと陰イオンが引き合う結合は？",cs:["イオン結合","共有結合","金属結合","水素結合"],a:0,f:"プラスとマイナスのイオンが電気的に引き合うイオン結合だぜ。",d:1},{q:"原子が電子を共有する結合は？",cs:["共有結合","イオン結合","金属結合","なし"],a:0,f:"電子を出し合って共有する共有結合だぜ。",d:1},{q:"食塩(塩化ナトリウム)の結合は？",cs:["イオン結合","共有結合","金属結合","水素結合"],a:0,f:"ナトリウムイオンと塩化物イオンのイオン結合だぜ。",d:1},{q:"金属結合の特徴は？",cs:["自由電子が動き回る","電子を共有","イオンの引力","結合なし"],a:0,f:"自由電子のおかげで電気や熱をよく通すぜ。",d:2},{q:"水分子の結合は？",cs:["共有結合","イオン結合","金属結合","なし"],a:0,f:"水素と酸素が電子を共有する共有結合だぜ。",d:2},{q:"イオン結合でできた物質の性質は？",cs:["融点が高い","燃えやすい","気体である","柔らかい"],a:0,f:"イオンが強く引き合うため融点が高く固いぜ。",d:2},{q:"金属が電気を通す理由は？",cs:["自由電子が移動するから","イオンがあるから","共有電子対","中性子"],a:0,f:"金属内を自由に動く自由電子が電気を運ぶぜ。",d:3},{q:"共有結合の結晶ダイヤモンドの特徴は？",cs:["非常に硬い","柔らかい","電気をよく通す","低融点"],a:0,f:"炭素が強い共有結合で全体につながり非常に硬いぜ。",d:3}]},
  chem_04:{lesson:[{w:"reimu",t:"魔理沙、『化学反応式』って、結局何を表してるものなの？",v:"魔理沙、化学反応式って、結局何を表してるものなの？"},{w:"marisa",t:"化学反応が起きる『前』と『後』を、化学式を使って表したものだぜ。",v:"化学反応が起きる前と後を、化学式を使って表したものだぜ。"},{w:"reimu",t:"式の中に、矢印があるよね。これは何を表してるの？",v:"式の中に、矢印があるよね。これは何を表してるの？"},{w:"marisa",t:"矢印の『左側』が、反応する前の物質（『反応物』）、矢印の『右側』が、反応してできた物質（『生成物』）を表してるぜ。",v:"矢印の左側が、反応する前の物質、反応物、矢印の右側が、反応してできた物質、生成物を表してるぜ。"},{w:"reimu",t:"化学反応式を書くときに、何か大事なルールはあるの？",v:"化学反応式を書くときに、何か大事なルールはあるの？"},{w:"marisa",t:"とても大事なルールがあるぜ。『反応の前と後で、原子の数はまったく変わらない』というルールだ。",v:"とても大事なルールがあるぜ。反応の前と後で、原子の数はまったく変わらない、というルールだ。"},{w:"reimu",t:"原子の数が変わらない、っていうのは、どういうことなの？",v:"原子の数が変わらない、っていうのは、どういうことなの？"},{w:"marisa",t:"反応の前にあった原子は、反応の後も、形を変えて『必ずどこかに存在している』っていうことだぜ。原子が消えたり、新しく増えたりはしないんだ。",v:"反応の前にあった原子は、反応の後も、形を変えて必ずどこかに存在している、っていうことだぜ。原子が消えたり、新しく増えたりはしないんだ。"},{w:"reimu",t:"だから、矢印の左と右で、原子の数を『揃える』必要があるんだね。",v:"だから、矢印の左と右で、原子の数を揃える必要があるんだね。"},{w:"marisa",t:"そうだ。その『揃える』ために使うのが『係数』、化学式の前につける数字だぜ。実際に、水素が燃える反応で見てみるぜ。",v:"そうだ。その揃えるために使うのが係数、化学式の前につける数字だぜ。実際に、水素が燃える反応で見てみるぜ。"},{w:"reimu",t:"水素が燃えると、何ができるの？",v:"水素が燃えると、何ができるの？"},{w:"marisa",t:"水素と酸素が反応して『水』ができるんだ。式は『2H₂＋O₂→2H₂O』になるぜ。",v:"水素と酸素が反応して水ができるんだ。式は2エイチツー足すオーツー、矢印、2エイチツーオーになるぜ。"},{w:"reimu",t:"この式の『2』っていう数字が、さっき言ってた『係数』なんだね。",v:"この式の2っていう数字が、さっき言ってた係数なんだね。"},{w:"marisa",t:"そうだ。係数の2をつけることで、矢印の左側と右側、両方で水素原子の数・酸素原子の数がきちんと一致するように調整してあるんだぜ。",v:"そうだ。係数の2をつけることで、矢印の左側と右側、両方で水素原子の数、酸素原子の数がきちんと一致するように調整してあるんだぜ。"},{w:"reimu",t:"なんで、わざわざ原子の数を揃えなきゃいけないルールがあるの？",v:"なんで、わざわざ原子の数を揃えなきゃいけないルールがあるの？"},{w:"marisa",t:"それは『原子は、反応の中で生まれたり、消えたりしない』からだぜ。反応の前後で、原子の組み合わせ方だけが変わるんだ。",v:"それは、原子は、反応の中で生まれたり、消えたりしない、からだぜ。反応の前後で、原子の組み合わせ方だけが変わるんだ。"},{w:"reimu",t:"この『原子は消えない』っていう考え方には、名前があるの？",v:"この、原子は消えない、っていう考え方には、名前があるの？"},{w:"marisa",t:"あるぜ。これを『質量保存の法則』と呼ぶんだ。反応の前後で、全体の重さ（質量）は変わらない、っていう法則だぜ。",v:"あるぜ。これを質量保存の法則と呼ぶんだ。反応の前後で、全体の重さ、質量は変わらない、っていう法則だぜ。"},{w:"reimu",t:"『矢印の左が反応物、右が生成物』、そして『原子の数は係数で揃える』。化学反応式の見方が、しっかり分かったよ！",v:"矢印の左が反応物、右が生成物、そして、原子の数は係数で揃える。化学反応式の見方が、しっかり分かったよ！"}],quiz:[{q:"化学反応式の矢印の左は？",cs:["反応物","生成物","触媒","溶媒"],a:0,f:"反応する前の物質、反応物だぜ。",d:1},{q:"化学反応式の矢印の右は？",cs:["生成物","反応物","触媒","気体"],a:0,f:"反応してできた物質、生成物だぜ。",d:1},{q:"係数をつける理由は？",cs:["両辺で原子の数をそろえる","見た目のため","ランダム","重さのため"],a:0,f:"反応前後で原子数が等しくなるよう係数で調整するぜ。",d:1},{q:"2H₂+O₂→2H₂Oで水素原子は両辺それぞれ何個？",cs:["4個","2個","6個","8個"],a:0,f:"左は2×2=4個、右も2×2=4個でそろっているぜ。",d:2},{q:"化学反応の前後で保存されるのは？",cs:["原子の数と質量","体積","気体の数","温度"],a:0,f:"原子は消えず質量も変わらない。質量保存の法則だぜ。",d:2},{q:"C+O₂→CO₂の各係数は？",cs:["すべて1","すべて2","すべて3","すべて0"],a:0,f:"炭素1、酸素1、二酸化炭素1で原子数が合うぜ。",d:2},{q:"2Mg+O₂→2MgOでMgの係数は？",cs:["2","1","3","4"],a:0,f:"右辺の酸素を合わせるためMgは2が必要だぜ。",d:3},{q:"化学反応式で気体の発生を示す記号は？",cs:["↑","↓","→","="],a:0,f:"上向きの矢印で気体が発生することを表すぜ。",d:3}]},
  chem_05:{lesson:[{w:"reimu",t:"魔理沙、『酸』と『塩基』って、何が違うものなの？",v:"魔理沙、酸と塩基って、何が違うものなの？"},{w:"marisa",t:"一番の違いは、水に溶けたときに『出すイオンの種類』だぜ。",v:"一番の違いは、水に溶けたときに出すイオンの種類だぜ。"},{w:"reimu",t:"それぞれ、どんなイオンを出すの？",v:"それぞれ、どんなイオンを出すの？"},{w:"marisa",t:"『酸』は『水素イオン』を出す。『塩基』は『水酸化物イオン』を出すんだぜ。",v:"酸は水素イオンを出す。塩基は水酸化物イオンを出すんだぜ。"},{w:"reimu",t:"普段の生活の中で感じる感覚的な違いって、何かあるの？",v:"普段の生活の中で感じる感覚的な違いって、何かあるの？"},{w:"marisa",t:"あるぜ。『酸』はすっぱい味がする。『塩基』はぬるぬるした感触があるんだ。",v:"あるぜ。酸はすっぱい味がする。塩基はぬるぬるした感触があるんだ。"},{w:"reimu",t:"具体的な例だと、どんなものがあるの？",v:"具体的な例だと、どんなものがあるの？"},{w:"marisa",t:"レモンは『酸性』の代表だ。石けんは『塩基性』の代表だぜ。",v:"レモンは酸性の代表だ。石けんは塩基性の代表だぜ。"},{w:"reimu",t:"酸性なのか塩基性なのか、っていうのは、どうやって測るの？",v:"酸性なのか塩基性なのか、っていうのは、どうやって測るの？"},{w:"marisa",t:"『pH（ピーエイチ）』っていう数値で表すんだ。",v:"ピーエイチっていう数値で表すんだ。"},{w:"reimu",t:"pHの数値には、どんな決まりがあるの？",v:"ピーエイチの数値には、どんな決まりがあるの？"},{w:"marisa",t:"pH7が『中性』、それより小さいと『酸性』、それより大きいと『塩基性』になるぜ。",v:"ピーエイチ7が中性、それより小さいと酸性、それより大きいと塩基性になるぜ。"},{w:"reimu",t:"数値が小さいほど、酸性が『強い』ってことなの？",v:"数値が小さいほど、酸性が強いってことなの？"},{w:"marisa",t:"そうだ。pHが小さいほど酸性が強くなる。pH1なら、すごく強い酸だ。逆にpH13なら、すごく強い塩基になるぜ。",v:"そうだ。ピーエイチが小さいほど酸性が強くなる。ピーエイチ1なら、すごく強い酸だ。逆にピーエイチ13なら、すごく強い塩基になるぜ。"},{w:"reimu",t:"酸と塩基を混ぜると、何が起きるの？",v:"酸と塩基を混ぜると、何が起きるの？"},{w:"marisa",t:"『中和』っていう反応が起きるぜ。酸の『水素イオン』と、塩基の『水酸化物イオン』が結びついて、『水』になるんだ。",v:"中和っていう反応が起きるぜ。酸の水素イオンと、塩基の水酸化物イオンが結びついて、水になるんだ。"},{w:"reimu",t:"水になるだけで終わりなの？",v:"水になるだけで終わりなの？"},{w:"marisa",t:"いや、それだけじゃないぜ。水ができると同時に、もう1つ、『塩（えん）』っていう物質もできるんだ。",v:"いや、それだけじゃないぜ。水ができると同時に、もう1つ、塩、えんっていう物質もできるんだ。"},{w:"reimu",t:"『酸＝水素イオンを出す』『塩基＝水酸化物イオンを出す』、そして『pH7が中性の境目』。整理してよく分かったよ！",v:"酸イコール水素イオンを出す、塩基イコール水酸化物イオンを出す、そして、ピーエイチ7が中性の境目。整理してよく分かったよ！"}],quiz:[{q:"酸が水に溶けて出すイオンは？",cs:["水素イオンH⁺","水酸化物イオン","ナトリウムイオン","塩化物イオン"],a:0,f:"酸は水素イオン(H⁺)を出す。これが酸性の正体だぜ。",d:1},{q:"塩基が水に溶けて出すイオンは？",cs:["水酸化物イオンOH⁻","水素イオン","炭素","酸素"],a:0,f:"塩基は水酸化物イオン(OH⁻)を出すぜ。",d:1},{q:"中性のpHは？",cs:["7","0","14","1"],a:0,f:"pH7が中性。水が代表だぜ。",d:1},{q:"pH3は何性？",cs:["酸性","塩基性","中性","無関係"],a:0,f:"7より小さいので酸性。数値が小さいほど酸が強いぜ。",d:2},{q:"酸と塩基が反応して生じるのは？",cs:["塩と水","気体だけ","金属","酸のみ"],a:0,f:"中和反応で塩と水ができるぜ。",d:2},{q:"塩酸の化学式は？",cs:["HCl","NaOH","H₂O","CO₂"],a:0,f:"水素と塩素からなるHClで代表的な酸だぜ。",d:2},{q:"pHが小さいほど酸性は？",cs:["強い","弱い","中性","塩基性"],a:0,f:"pHが小さいほど水素イオンが多く酸性が強いぜ。",d:3},{q:"BTB溶液が酸性で示す色は？",cs:["黄色","青色","緑色","赤色"],a:0,f:"酸性で黄色、中性で緑色、塩基性で青色を示すぜ。",d:3}]},
  bio_02:{lesson:[{w:"reimu",t:"魔理沙、『DNA』ってよく聞くけど、何の略なの？",v:"魔理沙、ディーエヌエーってよく聞くけど、何の略なの？"},{w:"marisa",t:"『デオキシリボ核酸』の略だぜ。生き物の『設計図』、つまり遺伝情報を記録している物質なんだ。",v:"デオキシリボ核酸の略だぜ。生き物の設計図、つまり遺伝情報を記録している物質なんだ。"},{w:"reimu",t:"『設計図』っていうのは、どういう意味なの？",v:"設計図っていうのは、どういう意味なの？"},{w:"marisa",t:"体をどう作るか、どんな特徴を持つか、っていう情報が全部詰まっている、っていう意味だぜ。",v:"体をどう作るか、どんな特徴を持つか、っていう情報が全部詰まっている、っていう意味だぜ。"},{w:"reimu",t:"DNAって、見た目はどんな形をしてるの？",v:"ディーエヌエーって、見た目はどんな形をしてるの？"},{w:"marisa",t:"すごく特徴的な形だぜ。2本の長い鎖が、ねじれながら組み合わさった『二重らせん構造』をしてるんだ。",v:"すごく特徴的な形だぜ。2本の長い鎖が、ねじれながら組み合わさった二重らせん構造をしてるんだ。"},{w:"reimu",t:"その鎖の中に、どうやって情報が記録されてるの？",v:"その鎖の中に、どうやって情報が記録されてるの？"},{w:"marisa",t:"『塩基』という4種類のパーツの『並び順』で記録されてるんだぜ。略してA・T・G・Cと呼ぶ。",v:"塩基という4種類のパーツの並び順で記録されてるんだぜ。略してエー、ティー、ジー、シーと呼ぶ。"},{w:"reimu",t:"4種類の並び順、っていうのは、何かに似てるイメージはある？",v:"4種類の並び順、っていうのは、何かに似てるイメージはある？"},{w:"marisa",t:"文字の並び方で意味が変わる『暗号』みたいなものだぜ。4種類の文字（塩基）の組み合わせ方で、色んな情報を表現してるんだ。",v:"文字の並び方で意味が変わる暗号みたいなものだぜ。4種類の文字、塩基の組み合わせ方で、色んな情報を表現してるんだ。"},{w:"reimu",t:"2本の鎖は、どうやってくっついているの？",v:"2本の鎖は、どうやってくっついているの？"},{w:"marisa",t:"塩基が『ペア』になってつながってるんだ。しかも、誰とペアになるかは、決まったルールがあるぜ。",v:"塩基がペアになってつながってるんだ。しかも、誰とペアになるかは、決まったルールがあるぜ。"},{w:"reimu",t:"どういうルールなの？",v:"どういうルールなの？"},{w:"marisa",t:"『A』は必ず『T』と、『G』は必ず『C』と結びつく。このルールを『相補性』と呼ぶぜ。",v:"エーは必ずティーと、ジーは必ずシーと結びつく。このルールを相補性と呼ぶぜ。"},{w:"reimu",t:"このルール、何か役に立つことがあるの？",v:"このルール、何か役に立つことがあるの？"},{w:"marisa",t:"すごく役に立つぜ。この決まりがあるおかげで、片方の鎖を見るだけで、もう片方の並びが自動的に分かるんだ。",v:"すごく役に立つぜ。この決まりがあるおかげで、片方の鎖を見るだけで、もう片方の並びが自動的に分かるんだ。"},{w:"reimu",t:"もう片方が分かると、何が便利になるの？",v:"もう片方が分かると、何が便利になるの？"},{w:"marisa",t:"DNAを正確に『複製』、つまりコピーできるようになるんだぜ。これが、細胞が分裂しても同じ情報を伝えられる理由なんだ。",v:"ディーエヌエーを正確に複製、つまりコピーできるようになるんだぜ。これが、細胞が分裂しても同じ情報を伝えられる理由なんだ。"},{w:"reimu",t:"二重らせんの形、4つの塩基のペアのルール、そしてそれが複製を可能にしていること。DNAの仕組みがつながって理解できたよ！",v:"二重らせんの形、4つの塩基のペアのルール、そしてそれが複製を可能にしていること。ディーエヌエーの仕組みがつながって理解できたよ！"}],quiz:[{q:"DNAの正式名称は？",cs:["デオキシリボ核酸","リボ核酸","アミノ酸","タンパク質"],a:0,f:"デオキシリボ核酸の略。遺伝情報を担う物質だぜ。",d:1},{q:"DNAの構造は？",cs:["二重らせん","一本鎖","三重","環状のみ"],a:0,f:"2本の鎖がねじれた二重らせん構造だぜ。",d:1},{q:"DNAの塩基は何種類？",cs:["4種類","2種類","20種類","6種類"],a:0,f:"A・T・G・Cの4種類の並びで情報を記録するぜ。",d:1},{q:"塩基Aと必ず対になるのは？",cs:["T","G","C","A"],a:0,f:"アデニン(A)はチミン(T)と結びつくぜ。",d:2},{q:"塩基Gと必ず対になるのは？",cs:["C","A","T","G"],a:0,f:"グアニン(G)はシトシン(C)と結びつくぜ。",d:2},{q:"DNAが複製されるときの仕組みは？",cs:["元の鎖を鋳型にする","新規に作る","ランダム","複製不可"],a:0,f:"既存の鎖を鋳型にして相補的な鎖を作るぜ。",d:2},{q:"DNAからタンパク質ができる流れは？",cs:["DNA→RNA→タンパク質","直接タンパク質","RNA→DNA","変化なし"],a:0,f:"転写でRNAを作り、翻訳でタンパク質を合成するぜ。",d:3},{q:"DNAの情報を写し取るはたらきは？",cs:["転写","複製","翻訳","分解"],a:0,f:"DNAの情報をRNAに写し取るのが転写だぜ。",d:3}]},
  bio_03:{lesson:[{w:"reimu",t:"魔理沙、夏でも冬でも、私たちの体温ってあまり変わらないよね。なんでなの？",v:"魔理沙、夏でも冬でも、私たちの体温ってあまり変わらないよね。なんでなの？"},{w:"marisa",t:"体の中の環境を、いつも『一定』に保ってくれる仕組みがあるからだぜ。これを『恒常性』、または『ホメオスタシス』と呼ぶんだ。",v:"体の中の環境を、いつも一定に保ってくれる仕組みがあるからだぜ。これを恒常性、またはホメオスタシスと呼ぶんだ。"},{w:"reimu",t:"一定に保たれているのは、体温だけなの？",v:"一定に保たれているのは、体温だけなの？"},{w:"marisa",t:"体温だけじゃないぜ。『血糖値』（血液中の糖の量）とか、体内の『水分量』なんかも、同じように一定に保たれてるんだ。",v:"体温だけじゃないぜ。血糖値、血液中の糖の量とか、体内の水分量なんかも、同じように一定に保たれてるんだ。"},{w:"reimu",t:"こういう調節は、体の中で誰が担当してるの？",v:"こういう調節は、体の中で誰が担当してるの？"},{w:"marisa",t:"主に2つの仕組みが担当してるぜ。『自律神経』と『ホルモン』だ。",v:"主に2つの仕組みが担当してるぜ。自律神経とホルモンだ。"},{w:"reimu",t:"自律神経とホルモン、それぞれどういう働きをするの？",v:"自律神経とホルモン、それぞれどういう働きをするの？"},{w:"marisa",t:"この2つが、お互いに協力し合いながら、体の状態をちょうどいいバランスに調整してくれているんだぜ。",v:"この2つが、お互いに協力し合いながら、体の状態をちょうどいいバランスに調整してくれているんだぜ。"},{w:"reimu",t:"具体的に『血糖値』が、どうやって調節されてるか教えてくれる？",v:"具体的に血糖値が、どうやって調節されてるか教えてくれる？"},{w:"marisa",t:"血糖値の調節には、『すい臓』というところから出るホルモンが活躍するぜ。",v:"血糖値の調節には、すい臓というところから出るホルモンが活躍するぜ。"},{w:"reimu",t:"すい臓は、どんなホルモンを出すの？",v:"すい臓は、どんなホルモンを出すの？"},{w:"marisa",t:"2種類のホルモンを出すぜ。『インスリン』が血糖値を『下げる』、『グルカゴン』が血糖値を『上げる』んだ。",v:"2種類のホルモンを出すぜ。インスリンが血糖値を下げる、グルカゴンが血糖値を上げるんだ。"},{w:"reimu",t:"上げる係と下げる係、2つあるのには、何か理由があるの？",v:"上げる係と下げる係、2つあるのには、何か理由があるの？"},{w:"marisa",t:"血糖値が高くなりすぎたらインスリンで下げ、低くなりすぎたらグルカゴンで上げる。両方あるからこそ、ちょうどいい範囲に保てるんだぜ。",v:"血糖値が高くなりすぎたらインスリンで下げ、低くなりすぎたらグルカゴンで上げる。両方あるからこそ、ちょうどいい範囲に保てるんだぜ。"},{w:"reimu",t:"上げる力と下げる力、両方があるからこそ、安定したバランスが保てるんだね。",v:"上げる力と下げる力、両方があるからこそ、安定したバランスが保てるんだね。"},{w:"marisa",t:"そうだ。体温も、水分量も、血糖値も、みんな同じように『上げる仕組み』と『下げる仕組み』、両方が働いて、ちょうどいい状態を保っているんだぜ。",v:"そうだ。体温も、水分量も、血糖値も、みんな同じように、上げる仕組みと下げる仕組み、両方が働いて、ちょうどいい状態を保っているんだぜ。"},{w:"reimu",t:"『恒常性』っていう大きな仕組みを、『自律神経』と『ホルモン』が、上げ下げのバランスを取りながら支えてるんだね！",v:"恒常性っていう大きな仕組みを、自律神経とホルモンが、上げ下げのバランスを取りながら支えてるんだね！"}],quiz:[{q:"体内環境を一定に保つことを？",cs:["恒常性","遺伝","進化","代謝"],a:0,f:"恒常性(ホメオスタシス)。体内を安定に保つ仕組みだぜ。",d:1},{q:"血糖値を下げるホルモンは？",cs:["インスリン","グルカゴン","アドレナリン","成長ホルモン"],a:0,f:"すい臓から出るインスリンが血糖値を下げるぜ。",d:1},{q:"恒常性を調節する2つは？",cs:["自律神経とホルモン","骨と筋肉","皮膚のみ","髪"],a:0,f:"自律神経とホルモンが協力して調節するぜ。",d:1},{q:"血糖値を上げるホルモンは？",cs:["グルカゴン","インスリン","エストロゲン","メラトニン"],a:0,f:"すい臓から出るグルカゴンが血糖値を上げるぜ。",d:2},{q:"インスリンを分泌する器官は？",cs:["すい臓","肝臓","腎臓","心臓"],a:0,f:"すい臓のランゲルハンス島から分泌されるぜ。",d:2},{q:"体温調節の中枢がある場所は？",cs:["間脳の視床下部","小脳","心臓","肺"],a:0,f:"間脳の視床下部が体温調節の司令塔だぜ。",d:2},{q:"交感神経が働くと心拍は？",cs:["速くなる","遅くなる","止まる","変化なし"],a:0,f:"興奮や緊張時に交感神経が働き心拍が速くなるぜ。",d:3},{q:"免疫で抗体を作るのは？",cs:["白血球(リンパ球)","赤血球","血小板","血しょう"],a:0,f:"リンパ球が抗体を作り、侵入した異物を排除するぜ。",d:3}]},
  bio_04:{lesson:[{w:"reimu",t:"魔理沙、『植生の遷移』ってどういうことを言ってるの？",v:"魔理沙、植生の遷移ってどういうことを言ってるの？"},{w:"marisa",t:"何も植物が生えていない『裸地』から始まって、生えている植物の種類が、時間とともに移り変わっていって、最後には森林になる、っていう変化のことだぜ。",v:"何も植物が生えていない裸地から始まって、生えている植物の種類が、時間とともに移り変わっていって、最後には森林になる、っていう変化のことだぜ。"},{w:"reimu",t:"植物の種類は、どんな順番で変わっていくの？",v:"植物の種類は、どんな順番で変わっていくの？"},{w:"marisa",t:"決まった順番があるぜ。『コケ→草原→低木→陽樹林→陰樹林』という順に進んでいくんだ。",v:"決まった順番があるぜ。コケ、草原、低木、陽樹林、陰樹林という順に進んでいくんだ。"},{w:"reimu",t:"なんで、この順番になるの？",v:"なんで、この順番になるの？"},{w:"marisa",t:"最初の裸地には、土も栄養もほとんどないんだ。だから、まずは過酷な環境でも生きられる『コケ』のような植物が先に生えるんだぜ。",v:"最初の裸地には、土も栄養もほとんどないんだ。だから、まずは過酷な環境でも生きられるコケのような植物が先に生えるんだぜ。"},{w:"reimu",t:"コケが生えると、何が変わるの？",v:"コケが生えると、何が変わるの？"},{w:"marisa",t:"コケなどが少しずつ『土』を作っていくんだ。土ができてくると、今度は『草』が生えられるようになる。そうやって、だんだん大きな植物が育てる環境に変わっていくんだぜ。",v:"コケなどが少しずつ土を作っていくんだ。土ができてくると、今度は草が生えられるようになる。そうやって、だんだん大きな植物が育てる環境に変わっていくんだぜ。"},{w:"reimu",t:"『陽樹』と『陰樹』っていうのも出てきたけど、これは何が違うの？",v:"陽樹と陰樹っていうのも出てきたけど、これは何が違うの？"},{w:"marisa",t:"『陽樹』は『明るい場所』を好む木、『陰樹』は『日陰』でも育つことができる木だぜ。",v:"陽樹は明るい場所を好む木、陰樹は日陰でも育つことができる木だぜ。"},{w:"reimu",t:"森が育っていくと、なんで最終的に『陰樹』が残るの？",v:"森が育っていくと、なんで最終的に陰樹が残るの？"},{w:"marisa",t:"森が茂って木が増えてくると、地面に届く光が減って、日陰の場所が増えていくんだ。陽樹は日陰では育ちにくいから、最終的に陰樹だけが生き残るんだぜ。",v:"森が茂って木が増えてくると、地面に届く光が減って、日陰の場所が増えていくんだ。陽樹は日陰では育ちにくいから、最終的に陰樹だけが生き残るんだぜ。"},{w:"reimu",t:"陰樹が残った後、植生の変化は、ずっと続いていくの？",v:"陰樹が残った後、植生の変化は、ずっと続いていくの？"},{w:"marisa",t:"いや、ここで変化が止まって、安定した状態になるんだ。この最終的な安定状態を『極相』、または『クライマックス』と呼ぶぜ。",v:"いや、ここで変化が止まって、安定した状態になるんだ。この最終的な安定状態を極相、またはクライマックスと呼ぶぜ。"},{w:"reimu",t:"『裸地→コケ→草原→低木→陽樹林→陰樹林（極相）』っていう一連の流れ、それぞれの段階がなぜ起きるのか、ちゃんとつながって理解できたよ！",v:"裸地、コケ、草原、低木、陽樹林、陰樹林、極相っていう一連の流れ、それぞれの段階がなぜ起きるのか、ちゃんとつながって理解できたよ！"}],quiz:[{q:"植生が移り変わることを？",cs:["遷移","恒常性","代謝","遺伝"],a:0,f:"時間とともに植物の種類が移り変わる遷移だぜ。",d:1},{q:"遷移の最後の安定した状態を？",cs:["極相","裸地","草原","荒原"],a:0,f:"これ以上変化しない安定状態、極相(クライマックス)だぜ。",d:1},{q:"何もない裸地から始まる遷移は？",cs:["一次遷移","二次遷移","逆遷移","停止"],a:0,f:"土壌も生物もない裸地から始まる一次遷移だぜ。",d:1},{q:"一次遷移の最初に現れるのは？",cs:["地衣類・コケ","大木","陰樹","草原"],a:0,f:"乾燥に強い地衣類やコケが先駆者として現れるぜ。",d:2},{q:"陽樹と陰樹の違いは？",cs:["陽樹は日光を好む","同じ","陰樹は枯れる","陽樹は水中"],a:0,f:"陽樹は明るい所、陰樹は日陰でも育つ。これが遷移の鍵だぜ。",d:2},{q:"山火事の跡地から始まる遷移は？",cs:["二次遷移","一次遷移","極相","荒原"],a:0,f:"土壌が残っているので二次遷移として進むぜ。",d:2},{q:"二次遷移が一次より速い理由は？",cs:["土壌や種子が残っているから","水が多い","気温が高い","光が強い"],a:0,f:"すでに土壌や種子があるため、早く植物が育つぜ。",d:3},{q:"日本の暖温帯の極相林に多いのは？",cs:["陰樹林(照葉樹林)","草原","砂漠","針葉樹のみ"],a:0,f:"日陰でも育つ陰樹、照葉樹などの林が極相になるぜ。",d:3}]},
  bio_05:{lesson:[{w:"reimu",t:"魔理沙、『生態系』って言葉、よく聞くんだけど、正確には何のことを言ってるの？",v:"魔理沙、生態系って言葉、よく聞くんだけど、正確には何のことを言ってるの？"},{w:"marisa",t:"ある場所に住んでいる『生物全部』と、それを取り巻く『環境』、この2つをまとめた『全体』のことを指すぜ。",v:"ある場所に住んでいる生物全部と、それを取り巻く環境、この2つをまとめた全体のことを指すぜ。"},{w:"reimu",t:"生態系の中の生物は、どんな種類に分けられるの？",v:"生態系の中の生物は、どんな種類に分けられるの？"},{w:"marisa",t:"『役割』によって、大きく3つに分けられるぜ。『生産者』『消費者』『分解者』だ。",v:"役割によって、大きく3つに分けられるぜ。生産者、消費者、分解者だ。"},{w:"reimu",t:"それぞれ、どんな役割を持ってるの？",v:"それぞれ、どんな役割を持ってるの？"},{w:"marisa",t:"『生産者』は、光合成で自分で栄養を作る植物だ。『消費者』は、その生産者（や他の動物）を食べる動物。『分解者』は、死がいなどを分解する菌類だぜ。",v:"生産者は、光合成で自分で栄養を作る植物だ。消費者は、その生産者、や他の動物を食べる動物。分解者は、死がいなどを分解する菌類だぜ。"},{w:"reimu",t:"この3つの間で、『エネルギー』はどうやって流れていくの？",v:"この3つの間で、エネルギーはどうやって流れていくの？"},{w:"marisa",t:"全部のエネルギーは『太陽の光』から始まるぜ。光合成で植物がエネルギーを取り込み、それが『植物→草食動物→肉食動物』という順に伝わっていくんだ。",v:"全部のエネルギーは太陽の光から始まるぜ。光合成で植物がエネルギーを取り込み、それが植物、草食動物、肉食動物という順に伝わっていくんだ。"},{w:"reimu",t:"『植物→草食動物→肉食動物』っていう関係は、何か名前があるの？",v:"植物、草食動物、肉食動物っていう関係は、何か名前があるの？"},{w:"marisa",t:"これを『食物連鎖』と呼ぶぜ。『食べる・食べられる』の関係が、鎖のようにつながっているからだ。",v:"これを食物連鎖と呼ぶぜ。食べる、食べられるの関係が、鎖のようにつながっているからだ。"},{w:"reimu",t:"食物連鎖の中で、エネルギーの流れる『向き』には、何か決まりがあるの？",v:"食物連鎖の中で、エネルギーの流れる向きには、何か決まりがあるの？"},{w:"marisa",t:"エネルギーは『一方向』にしか流れないぜ。植物から草食動物、草食動物から肉食動物へ、と進むだけで、逆には戻らないんだ。",v:"エネルギーは一方向にしか流れないぜ。植物から草食動物、草食動物から肉食動物へ、と進むだけで、逆には戻らないんだ。"},{w:"reimu",t:"食物連鎖の中で、生物の『数』にも、何か特徴があるの？",v:"食物連鎖の中で、生物の数にも、何か特徴があるの？"},{w:"marisa",t:"あるぜ。食物連鎖の『上位』にいくほど、生物の数は『少なくなる』んだ。",v:"あるぜ。食物連鎖の上位にいくほど、生物の数は少なくなるんだ。"},{w:"reimu",t:"なんで上位の生物ほど、数が少なくなるの？",v:"なんで上位の生物ほど、数が少なくなるの？"},{w:"marisa",t:"1段階上に進むたびに、伝わるエネルギーの量がどんどん減っていくからだぜ。少ないエネルギーしか受け取れないから、上位の生物は多くの数を維持できないんだ。",v:"1段階上に進むたびに、伝わるエネルギーの量がどんどん減っていくからだぜ。少ないエネルギーしか受け取れないから、上位の生物は多くの数を維持できないんだ。"},{w:"reimu",t:"『生産者・消費者・分解者』という役割分担、そして『食物連鎖』というエネルギーの流れ。生態系の仕組みが、全部つながって理解できたよ！",v:"生産者、消費者、分解者という役割分担、そして食物連鎖というエネルギーの流れ。生態系の仕組みが、全部つながって理解できたよ！"}],quiz:[{q:"光合成で有機物を作る生物は？",cs:["生産者","消費者","分解者","捕食者"],a:0,f:"植物など、自分で栄養を作る生産者だぜ。",d:1},{q:"他の生物を食べる生物は？",cs:["消費者","生産者","分解者","光合成者"],a:0,f:"植物や他の動物を食べる消費者だぜ。",d:1},{q:"死がいや排出物を分解する生物は？",cs:["分解者","生産者","消費者","捕食者"],a:0,f:"菌類や細菌などの分解者。物質を循環させるぜ。",d:1},{q:"生態系のエネルギーの最終的な源は？",cs:["太陽","土","水","風"],a:0,f:"太陽の光エネルギーが生態系を支える源だぜ。",d:2},{q:"食物連鎖でのエネルギーの流れは？",cs:["一方向","双方向","循環する","停止する"],a:0,f:"植物から上位へ一方向に流れ、戻らないぜ。",d:2},{q:"生産者と上位の消費者の数量の関係は？",cs:["上位ほど少ない","上位ほど多い","同じ","無関係"],a:0,f:"ピラミッド状で、上位の消費者ほど数が少なくなるぜ。",d:2},{q:"炭素が生態系を循環する形は？",cs:["二酸化炭素と有機物","水のみ","酸素だけ","窒素"],a:0,f:"光合成と呼吸を通じて二酸化炭素と有機物の形で循環するぜ。",d:3},{q:"生態系のバランスが崩れる原因は？",cs:["外来種の侵入や環境破壊","食物連鎖","光合成","分解"],a:0,f:"外来種の侵入や人間による環境破壊でバランスが崩れるぜ。",d:3}]},

  {id:"math",name:"数学Ⅰ",topic:"二次関数・平方完成",emoji:"📐",ac:C.red,
   styles:{yukkuri:[{w:"reimu",t:"ねえ魔理沙、y=x²−4x+3 の頂点ってどう求めるの？",v:"ねえ魔理沙、二次関数の頂点ってどう求めるの？"},{w:"marisa",t:"平方完成するんだぜ。x²−4x を (x−2)²−4 に変えるのさ。",v:"平方完成するんだぜ。エックス2乗マイナス4エックスを、エックスマイナス2の2乗マイナス4に変えるのさ。"},{w:"reimu",t:"なんで −4 が出るの？",v:"なんでマイナス4が出るの？"},{w:"marisa",t:"(x−2)² を展開すると x²−4x+4。+4 が余計だから引いて消すんだ。これで帳尻が合うぜ！",v:"エックスマイナス2の2乗を展開するとエックス2乗マイナス4エックスプラス4になる。プラス4が余計だから引いて消すんだ。"},{w:"marisa",t:"y=(x−2)²−1。頂点は (2, −1) だぜ！",v:"ワイイコールエックスマイナス2の2乗マイナス1。頂点は2、マイナス1だぜ！"},{w:"reimu",t:"(x−p)²+q なら頂点 (p,q) が直接読めるのね！",v:"エックスマイナスピーの2乗プラスキューの形なら、頂点のピーとキューが直接読めるのね！"},],manzai:[{w:"marisa",t:"どうも〜、二次関数で頂点を探す者です〜",v:"どうも〜、二次関数で頂点を探す者です〜"},{w:"reimu",t:"何しに来たのよ。y=x²−4x+3 の頂点は？",v:"何しに来たのよ。エックス2乗マイナス4エックスプラス3の頂点は？"},{w:"marisa",t:"平方完成したらええんや！x²−4x を…ほい、(x−2)²−4！",v:"平方完成したらええんや！ほい、エックスマイナス2の2乗マイナス4！"},{w:"reimu",t:"なんで急に −4 引いたの？",v:"なんで急にマイナス4引いたの？"},{w:"marisa",t:"広げたら +4 余るやろ、それ消しただけや！",v:"広げたらプラス4余るやろ、それ消しただけや！"},{w:"reimu",t:"つまり (x−2)²−1 で頂点 (2,−1)。普通に賢いな",v:"つまりエックスマイナス2の2乗マイナス1で、頂点は2、マイナス1。普通に賢いな"},{w:"marisa",t:"せやろ？もうええわ、ありがとうございました〜",v:"せやろ？もうええわ、ありがとうございました〜"},],class:[{w:"marisa",t:"では頂点の求め方を解説します。y=x²−4x+3 を見てください。",v:"では頂点の求め方を解説します。エックス2乗マイナス4エックスプラス3を見てください。"},{w:"marisa",t:"ポイントは平方完成。x²−4x を (x−2)² の形に直します。",v:"ポイントは平方完成です。エックス2乗マイナス4エックスを、エックスマイナス2の2乗の形に直します。"},{w:"reimu",t:"先生、その −2 はどこから？",v:"先生、そのマイナス2はどこから？"},{w:"marisa",t:"x の係数 −4 の半分です。(x−2)²=x²−4x+4 なので +4 を引いて調整。",v:"エックスの係数マイナス4の半分、マイナス2を使います。展開するとプラス4が余るので引いて調整します。"},{w:"marisa",t:"結果 y=(x−2)²−1。頂点は (2, −1) です。",v:"結果、エックスマイナス2の2乗マイナス1、頂点は2、マイナス1です。"},{w:"reimu",t:"平方完成すれば一発で分かるんですね！",v:"平方完成すれば一発で分かるんですね！"},],quiz:[{w:"reimu",t:"さあ！今夜の挑戦は二次関数！頂点はどこだ〜！？",v:"さあ！今夜の挑戦は二次関数！頂点はどこだ〜！？"},{w:"marisa",t:"ヒントは…平方完成だァ！x²−4x を変身させろ！",v:"ヒントは平方完成だァ！エックス2乗マイナス4エックスを変身させろ！"},{w:"reimu",t:"変身！？",v:"変身！？"},{w:"marisa",t:"(x−2)²−4 にな！+4 を引いて消す、これがテクだ！",v:"エックスマイナス2の2乗マイナス4にな！プラス4を引いて消す、これがテクだ！"},{w:"marisa",t:"答えは…ジャジャン！頂点 (2, −1)！",v:"答えは、ジャジャン！頂点2、マイナス1！"},{w:"reimu",t:"正解〜！(x−p)²+q なら頂点 (p,q)！",v:"正解〜！エックスマイナスピーの2乗プラスキューの形なら、頂点のピーとキューがそのまま読める！"},],},
   quiz:[{q:"y=(x−3)²+1 の頂点は？",cs:["(3,1)","(−3,1)","(3,−1)","(1,3)"],a:0,f:"(x−p)²+q は頂点(p,q)。(3,1)だぜ。",d:1},{q:"y=(x+2)²−5 の頂点は？",cs:["(−2,−5)","(2,−5)","(−2,5)","(2,5)"],a:0,f:"(x+2)²=(x−(−2))²と考えるとp=−2。(x+p)²の形は符号が逆になるから注意！q=−5なので頂点は(−2,−5)だぜ。",d:1},{q:"y=x²−4x+3 の頂点は？",cs:["(2,−1)","(−2,7)","(4,3)","(2,1)"],a:0,f:"x²−4x+3=(x−2)²−4+3=(x−2)²−1。(−4)の半分の2乗=4を引いて調整。頂点は(2,−1)だぜ。",d:2},{q:"y=x²+6x+5 を平方完成すると？",cs:["(x+3)²−4","(x+3)²+5","(x−3)²−4","(x+6)²−31"],a:0,f:"6の半分は3。(x+3)²=x²+6x+9 なので+9が余る→引く。(x+3)²−9+5=(x+3)²−4だぜ。",d:2},{q:"y=x²−2x+3 の最小値は？",cs:["2","1","3","−1"],a:0,f:"(x−1)²+2 と変形すると、(x−1)²は0以上なのでx=1のとき最小。最小値は+2だぜ。",d:2},{q:"y=2x²−8x+9 の頂点の x 座標は？",cs:["2","−2","4","8"],a:0,f:"2でくくると2(x²−4x)+9=2(x−2)²−8+9=2(x−2)²+1。頂点のx座標は2だぜ。",d:3},{q:"y=−x²+4x−1 の頂点の y 座標は？",cs:["3","−5","1","−1"],a:0,f:"−(x²−4x)−1=−(x−2)²+4−1=−(x−2)²+3。上に凸なのでy座標の最大値=3が頂点だぜ。",d:3},{q:"頂点(1,−2)で上に開く式は？",cs:["y=(x−1)²−2","y=(x+1)²−2","y=(x−1)²+2","y=x²−2"],a:0,f:"上に開く→a>0。頂点(1,−2)をy=(x−p)²+qに当てはめるとp=1,q=−2。y=(x−1)²−2だぜ。",d:3},]},
  {id:"eng",name:"英語",topic:"現在完了",emoji:"🔤",ac:C.purple,
   styles:{yukkuri:[{w:"reimu",t:"魔理沙、I have lived here for ten years. ってどういう意味？",v:"魔理沙、アイハブリブドヒアフォーテンイヤーズってどういう意味？"},{w:"marisa",t:"have/has＋過去分詞で『ずっと〜している』継続を表すぜ。",v:"ハブまたはハズに、かこけいをつけて、ずっとしているという継続を表すんだぜ。"},{w:"reimu",t:"過去形と何が違うの？",v:"かこけいと何が違うの？"},{w:"marisa",t:"過去形は「昔あったこと（今は関係ない）」。現在完了は「過去から今もつながっていること」を表すんだ。",v:"かこけいは昔あったことで今は関係ない。げんざいかんりょうは過去から今もつながっていることを表すんだ。"},{w:"marisa",t:"他に経験(have been to)や完了(have just〜)もあるぞ。",v:"他にも、ハブビーントゥーで経験、ハブジャストで完了の意味もあるぞ。"},{w:"reimu",t:"for は期間、since は起点ね！",v:"フォーは期間、シンスは起点ね！"},],manzai:[{w:"marisa",t:"I have lived here for ten years！",v:"アイハブリブドヒアフォーテンイヤーズ！"},{w:"reimu",t:"急に英語しゃべんな。意味は？",v:"急に英語しゃべんな。意味は？"},{w:"marisa",t:"『10年ここに住んどる』や。have＋過去分詞で継続やで",v:"10年ここに住んどる、や。ハブにかこけいをつけて継続を表すんやで"},{w:"reimu",t:"ほな過去形でええやん",v:"ほなかこけいでええやん"},{w:"marisa",t:"あかん！過去形は『昔住んでた』、今おらんのや。現在完了は今もおる！",v:"あかん！かこけいは昔住んでた、今はおらんのや。現在完了は今もおる！"},{w:"reimu",t:"なるほど、今も継続してるかどうかが違うんやな",v:"なるほど、今も続いてるかどうかが違うんやな"},{w:"marisa",t:"そういうこっちゃ！もうええわ〜",v:"そういうこっちゃ！もうええわ〜"},],class:[{w:"marisa",t:"現在完了形を学びます。have/has＋過去分詞が基本形です。",v:"げんざいかんりょうけいを学びます。ハブまたはハズに、かこけいをつけるのが基本です。"},{w:"marisa",t:"意味は3つ。継続・経験・完了です。",v:"意味は3つ。継続、経験、完了です。"},{w:"reimu",t:"先生、過去形との違いは？",v:"先生、かこけいとの違いは？"},{w:"marisa",t:"過去形は過去の一点。現在完了は過去と現在をつなぐ表現です。",v:"かこけいは過去の一点、現在完了は過去と現在をつなぎます。"},{w:"marisa",t:"期間は for、起点は since を使います。",v:"期間はフォー、起点はシンスです。"},{w:"reimu",t:"継続・経験・完了、3つ覚えます！",v:"継続、経験、完了、覚えます！"},],quiz:[{w:"reimu",t:"英語クイズ！I have lived の意味、分かるか〜！？",v:"英語クイズ！アイハブリブドの意味、分かるか〜！？"},{w:"marisa",t:"キーワードは have＋過去分詞ァ！",v:"キーワードはハブまたはハズに、かこけいをつけることァ！"},{w:"reimu",t:"それで！？",v:"それで！？"},{w:"marisa",t:"『ずっと住んでる』！過去形と違って今も継続だ！",v:"ずっと住んでる！今も継続だ！"},{w:"marisa",t:"for は期間、since は起点も覚えとけ！",v:"フォーは期間、シンスは起点も覚えとけ！"},{w:"reimu",t:"継続・経験・完了の3つ、出題されるぞ〜！",v:"継続、経験、完了の3つ、出題されるぞ〜！"},],},
   quiz:[{q:"現在完了の形は？",cs:["have/has+過去分詞","have+ing形","had+過去形","be+過去分詞"],a:0,f:"have/has＋過去分詞が基本。主語がI/you/we/theyならhave、he/she/itならhasになるぞ。",d:1},{q:"「パリに行ったことがある」I have ___ to Paris.",cs:["been","gone","went","go"],a:0,f:"経験はhave been to。have gone toは今もそこにいる意味なので別物だ。be→beenの変化も覚えよう。",d:1},{q:"I have ___ in Tokyo since 2015.（live）",cs:["lived","live","living","lives"],a:0,f:"過去分詞 lived だ。",d:2},{q:"I've known him ___ 2020.（〜から）",cs:["since","for","in","at"],a:0,f:"起点だから since。",d:2},{q:"She has ___ eaten lunch.（もう）",cs:["already","yet","since","for"],a:0,f:"肯定文の『もう』は already。",d:2},{q:"I have studied English ___ three years.",cs:["for","since","in","from"],a:0,f:"期間には for。",d:3},{q:"Have you finished ___?（まだ〜？）",cs:["yet","already","just","since"],a:0,f:"yetは疑問文・否定文で「まだ」。alreadyは肯定文で「もう」。この2つはセットで覚えるんだぜ。",d:3},{q:"have gone to と have been to の違いは？",cs:["gone=不在/been=経験","gone=経験/been=不在","同じ","両方不可"],a:0,f:"He has gone to Paris=今もパリにいる（不在）。He has been to Paris=行ったことがある（今はここにいる）。違いは大きいぞ！",d:3},]},
  {id:"chem",name:"化学基礎",topic:"物質量 mol",emoji:"⚗️",ac:C.green,

   quiz:[{q:"アボガドロ定数は約いくつ？",cs:["6.0×10²³","3.0×10⁸","1.6×10⁻¹⁹","9.8"],a:0,f:"約6.0×10²³個。これが1molの粒子数で「アボガドロ定数」という。鉛筆を1ダース=12本と数えるように、原子・分子をまとめて数える単位だぜ。",d:1},{q:"水 H₂O の分子量は？（H=1,O=16）",cs:["18","17","16","34"],a:0,f:"1+1+16=18。",d:1},{q:"炭素 12 g は何 mol？（C=12）",cs:["1 mol","12 mol","0.5 mol","2 mol"],a:0,f:"ちょうど1モル。",d:1},{q:"水 36 g は何 mol？（H₂O=18）",cs:["2 mol","1 mol","18 mol","0.5 mol"],a:0,f:"36÷18=2モル。",d:2},{q:"NaCl の式量は？（Na=23,Cl=35.5）",cs:["58.5","18","28","44"],a:0,f:"NaClのように原子がイオン結合したものは分子でないので「式量」を使う。Na=23＋Cl=35.5=58.5だぜ。",d:2},{q:"0.5 mol の CO₂ の質量は？（CO₂=44）",cs:["22 g","44 g","11 g","88 g"],a:0,f:"44×0.5=22グラム。",d:2},{q:"mol = 質量 ÷ ?",cs:["モル質量","密度","体積","原子番号"],a:0,f:"モルは質量わるモル質量。",d:3},{q:"標準状態で 2 mol の気体の体積は？",cs:["44.8 L","22.4 L","11.2 L","2 L"],a:0,f:"標準状態（0℃・1気圧）では気体1molは22.4L。これをモル体積という。2molなら22.4×2=44.8Lだぜ。",d:3},]},

function doSpeak(text,who,on){
  if(!on||typeof window==="undefined"||!window.speechSynthesis)return;
  try{
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP";
    var vs=window.speechSynthesis.getVoices();
    var v=vs.find(function(x){return /ja/i.test(x.lang);});
    if(v)u.voice=v;
    u.pitch=who==="reimu"?1.65:0.78;
    u.rate=who==="reimu"?1.1:1.05;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function stopSpeak(){try{window.speechSynthesis.cancel();}catch(e){}}
